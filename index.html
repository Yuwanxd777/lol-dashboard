<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>LOL數據表</title>
<link rel="icon" type="image/png" sizes="64x64" href="img/favicon.png?v=2">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  :root{
    --bg:#0b0e14; --card:#141926; --card2:#1c2333; --line:#2a3345;
    --tx:#e8ecf4; --tx2:#8b98ad; --acc:#4f8ef7; --acc2:#7c5cff; --gold:#f5b942;
    --green:#5dd39e; --red:#e05c5c; --gap:14px; /* 全站統一間距 */
  }
  *{box-sizing:border-box}
  /* ══ 版面/縮放鐵則（新增分頁或改版面前先讀；違反任一條，縮放就會再壞）══
     1) html,body overflow-x:hidden 是「最後防線」：可能超寬的內容必須放進自己的橫捲容器
        （表格包 .tblwrap→JS 自動掛 hscroll；其他容器自設 overflow-x:auto），否則超出部分被吃掉、看不到也捲不到。
        1b) grid/flex 項目必須 min-width:0（.grid>* 已全域設；新版面自己設）——否則內含 max-content 表格會把
        1fr 軌道撐爆成內容寬：整頁隱形超寬被吃掉、表格「自認沒超框」不掛 hscroll（200%縮放曾因此無捲軸又被裁）。
     2) 內容的響應式斷點一律寫 @container mainc (...)，不准寫 @media——網站縮放(#main width=100/倍率%)
        只有 container query 跟著觸發；@media 只留給 header 與 main 自身。
     3) 凡「量視窗/容器寬高後寫死 px」的版面（fillTableWidth、Tier、模擬BP…）都要能被重算：
        走 refitLayout 管線（樣式重算，不動 DOM 結構），或自掛 resize 監聽（debounce＋curView guard）。
        3b) 座標系鐵則：getBoundingClientRect/innerHeight＝「視覺」px、clientWidth/offsetWidth/scrollWidth/style＝「版面」px；
        rect 量到的長度要進版面計算（欄寬、池寬、高度）一律除以 window._zoomF，否則網站縮放時全部歪掉。
     4) 網站縮放(applyZoom)改完樣式會補發一次 window resize 事件＝縮放後全站重排的總開關。
     5) 瀏覽器100%＋網站100% 不得出現左右捲軸：表格小幅超寬(≤12%)先走 pt1/pt2 縮左右內距塞回去（不是裁字），
        塞不下才 hscroll＋視窗底浮動代理捲軸(#hsb 自動接手畫面外的橫捲軸)。 */
  html,body{overflow-x:hidden} /* 全站禁止左右滑動（見鐵則1：內容必須自己收進橫捲容器） */
  html{scrollbar-gutter:stable} /* 永遠保留垂直捲軸的槽位：有無捲軸時內容不會左右位移(切分頁不跳動) */
  /* 圓體字的垂直度量對齊微軟正黑體（ascent/descent 覆寫），粉圓字形偏小再放大 5%——否則整站文字會偏低偏扁 */
  @font-face{font-family:"jf-openhuninn";src:url("fonts/jf-openhuninn.ttf") format("truetype");font-display:swap;
    ascent-override:106.7%;descent-override:26.7%;line-gap-override:0%}
  @font-face{font-family:"GenSenRounded TW";font-weight:400;src:url("fonts/GenSenRounded2TW-L.otf") format("opentype");font-display:swap;
    ascent-override:106.7%;descent-override:26.7%;line-gap-override:0%} /* 內文用 Light，小字不糊 */
  @font-face{font-family:"GenSenRounded TW";font-weight:700;src:url("fonts/GenSenRounded2TW-R.otf") format("opentype");font-display:swap;
    ascent-override:106.7%;descent-override:26.7%;line-gap-override:0%} /* 粗體用 Regular */
  body{margin:0;color:var(--tx);font-family:"jf-openhuninn","Microsoft JhengHei","Segoe UI",sans-serif;font-size:16.5px;
    background:radial-gradient(1200px 500px at 15% -10%,#1a2340 0%,transparent 60%),
               radial-gradient(1000px 500px at 95% 0%,#241a3d 0%,transparent 55%),var(--bg);
    background-attachment:fixed}
  ::-webkit-scrollbar{width:9px;height:9px}
  ::-webkit-scrollbar-thumb{background:#2e3a52;border-radius:9px}
  ::-webkit-scrollbar-track{background:transparent}
  .filters select,.filters input{height:36px;box-sizing:border-box;padding-top:4px;padding-bottom:4px;line-height:1.2} /* 各分區篩選列控件統一高度→整列高度一致(縮上下內距避免文字被邊框吃掉) */
  .filters .pgbtn,.filters .pgbtn *{height:36px;box-sizing:border-box} .filters .pgbtn{padding-top:4px;padding-bottom:4px;line-height:1.2;display:inline-flex;align-items:center} /* 模式按鈕與其他控件同高，避免撐高篩選列 */
  header{display:flex;align-items:center;gap:14px;padding:12px 30px;position:sticky;top:0;z-index:100;flex-wrap:wrap;
    background:rgba(15,19,30,.85);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
  #penCanvas{position:fixed;top:0;left:0;z-index:90;display:none;touch-action:none;cursor:crosshair} /* 視窗大小(非整頁)：整頁太高時畫布過大會嚴重卡頓 */
  #penBar{display:none;position:fixed;top:64px;right:18px;z-index:101;gap:8px;align-items:center;
    background:linear-gradient(180deg,#161c2b,#121722);border:1px solid var(--line);border-radius:12px;
    padding:10px 14px;box-shadow:0 6px 24px rgba(0,0,0,.5)}
  .pensw{width:28px;height:28px;border-radius:50%;border:3px solid transparent;cursor:pointer;padding:0}
  .pensw.on{border-color:#fff}
  #penBtn.on{background:linear-gradient(135deg,var(--acc),var(--acc2));border-color:transparent}
  header h1{font-size:21px;margin:0;display:flex;align-items:center;background:linear-gradient(90deg,#7cb3ff,#b79bff);
    -webkit-background-clip:text;background-clip:text;color:transparent;letter-spacing:.5px} /* logo與字同一水平線，跟分頁膠囊共用 header 的垂直置中 */
  .meta{color:var(--tx2);font-size:13.5px}
  img{-webkit-user-drag:none;user-drag:none} /* 禁止瀏覽器原生「拖圖片」：避免拖頭像時觸發 Chrome 分割視窗／新分頁手勢；只保留 App 自訂的 draggable 容器拖曳（拖曳仍以容器為來源、頭像照樣是拖曳殘影） */
  nav{display:flex;gap:7px;flex-wrap:wrap}
  nav .tab{padding:8px 22px;border-radius:999px;cursor:pointer;border:1px solid var(--line);
    background:var(--card2);font-size:15px;user-select:none;transition:.15s}
  nav .tab:hover{border-color:var(--acc)}
  nav .tab.on{background:linear-gradient(135deg,var(--acc),var(--acc2));border-color:transparent;color:#fff;
    font-weight:bold;box-shadow:0 2px 14px rgba(79,142,247,.4)}
  main{max-width:none;margin:0;padding:14px 30px;container-type:inline-size;container-name:mainc} /* 內容區＝container：斷點依 #main 實際版面寬（網站縮放也觸發），見 @container mainc */
  /* filters 內的分頁籤（圖鑑分區、返回圖鑑）：跟 nav 一樣要有可點的視覺回饋 */
  .filters .tab{cursor:pointer;border:1px solid var(--line);border-radius:999px;transition:border-color .12s,color .12s}
  .filters .tab:hover:not(.on){border-color:var(--acc);color:var(--acc)}
  .filters .tab.on{color:#fff}
  .filters .posLbl .posic{width:22px;height:22px} /* 對戰BP路線圖示縮小省寬 */
  .filters{display:flex;flex-wrap:wrap;gap:10px 11px;align-items:center;border:1px solid var(--line);
    border-radius:14px;padding:12px 18px;margin-bottom:var(--gap);background:linear-gradient(180deg,#161c2b,#131826)}
  .filters label{color:var(--tx2);font-size:17px}
  .filters select,.filters input{font-size:17px}
  select,input,textarea,button{background:var(--card2);color:var(--tx);border:1px solid var(--line);
    border-radius:9px;padding:8px 12px;font-family:inherit;font-size:15.5px;outline:none}
  select:focus,input:focus,textarea:focus{border-color:var(--acc)}
  button{cursor:pointer;transition:.15s} button:hover{border-color:var(--acc)}
  button.primary{background:linear-gradient(135deg,var(--acc),var(--acc2));border-color:transparent;color:#fff;font-weight:bold}
  button.primary:hover{filter:brightness(1.15)}
  .sqbtn{width:36px;height:36px;padding:0;font-size:16px;line-height:1;flex:0 0 auto} /* 全域：返回/截圖/預設 統一圖示正方形鈕 */
  .pgbtn{border-color:var(--gold)} /* 分頁專屬特殊按鈕（模式切換等）：金框提醒 */
  /* 子頁返回鍵：詳情框右上、比一般返回鍵稍大＋金框，與篩選列的全域返回鍵做區分（清掉該分頁的子頁詳情，回到該分頁列表） */
  .subBack{position:absolute;top:12px;right:14px;z-index:6;width:36px;height:36px;padding:0;font-size:16px;line-height:1;border-radius:8px;border:2px solid var(--gold);background:#1b2333;color:var(--gold);cursor:pointer;box-shadow:0 2px 8px rgba(0,0,0,.4)}
  .subBack:hover{background:#26314a}
  .subBack:active{transform:translateY(1px)}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:var(--gap);margin-bottom:var(--gap)}
  .grid .card{margin-bottom:0} /* 格線內卡片間距交給 gap，避免疊加 */
  .grid>*{min-width:0} /* 鐵則：grid 項目必須可縮，否則內含 max-content 表格會把 1fr 軌道撐爆→整頁超寬被 overflow-x:hidden 吃掉且表格自認沒超框(不掛 hscroll) */
  .full{grid-column:1/-1}
  @container mainc (max-width:1100px){.grid{grid-template-columns:1fr}}
  /* ── 手機/窄螢幕：@media 只管 header 與 main 自身（container query 管不到容器本身與外面）── */
  @media(max-width:820px){
    header{padding:8px 10px;gap:8px}
    header h1{font-size:17px}
    header h1 img{width:26px!important;height:26px!important}
    nav{gap:5px}
    nav .tab{padding:6px 12px;font-size:13.5px}
    main{padding:10px}
  }
  /* 內容窄版面（手機、或桌機大幅放大）：一律 @container，瀏覽器縮放與網站縮放都會正確觸發 */
  @container mainc (max-width:820px){
    .grid{grid-template-columns:1fr}
    .filters{padding:8px 10px;gap:8px}
    .chgLanes{grid-template-columns:1fr}
    #tmGrid{grid-template-columns:1fr}
    #tierWrap{grid-template-columns:1fr!important} /* 蓋過 inline 兩欄 */
    .tphdr{padding-right:0!important}
    .tpctl{position:static!important;flex-wrap:wrap;margin-bottom:6px}
    #axesBox .axCols{max-height:none}
    .card{overflow-x:auto} /* 窄版面：卡內表格改為橫向捲動，不裁字 */
    .card table{table-layout:auto;width:max-content;min-width:100%}
    .chartbox{height:320px}
    th,td{padding:6px 5px}
  }
  .card{background:linear-gradient(180deg,#161c2b,#121722);border:1px solid var(--line);border-radius:14px;
    padding:16px;margin-bottom:var(--gap);box-shadow:0 4px 24px rgba(0,0,0,.35)}
  /* 字級層級：標題(19) > 內文/數據(15.5-16.5)；副標=內文同級 */
  .card h2{font-size:19px;margin:0 0 12px;display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .card h2 .sub{color:var(--tx2);font-weight:normal;font-size:15.5px}
  .note{font-size:14px}
  .chartbox{position:relative;height:460px}
  table{width:100%;border-collapse:collapse;font-size:15.5px;table-layout:fixed} /* 固定欄寬：篩選改變內容時欄寬不跳動 */
  th,td{padding:8px 11px;text-align:center;border-bottom:1px solid #222a3c;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  th.rkh{width:68px}                 /* 名次欄：三位數名次(含較寬字體如粉圓)完整放得下 */
  .thL{position:relative;display:inline-block;white-space:nowrap;padding:0 13px}  /* 欄名容器：左右各固定保留 13px 給排序三角形（每欄都留＝三角形有固定的家）→ 顯示與否都不改變欄寬/欄距；左右對稱＝欄名仍置中；只在明確 <br> 處換行 */
  .lbHeadC{transition:background .15s} .lbHeadC:hover{background:rgba(255,255,255,.045)} /* 出裝卡路線框可點標頭：hover 微亮提示可展開收合 */
  .sortArr{position:absolute;right:1px;top:50%;transform:translateY(-50%);font-size:.8em;opacity:0;pointer-events:none} /* 三角形固定坐在欄名容器右側的保留內距內；每欄都保留該內距→顯示與否都不改欄距 */
  .sortArr.on{opacity:1}
  .sortArr.asc{color:#37c871}  /* 升幕：綠 */
  .sortArr.desc{color:#ff4d4d} /* 降幕：紅 */
  th[data-k]:nth-child(2){width:10em} /* 名稱欄（英雄/選手/戰隊）固定寬；寬度以最長名字不出現…為準 */
  /* 個別欄寬改在各表欄位定義（HCOLS/PCOLS/TCOLS 第三欄）指定，避免同名欄跨表互相干擾 */
  th{color:var(--tx2);cursor:pointer;position:sticky;top:var(--hdrH,0);background:#161c2b;z-index:1;font-weight:600} /* 整頁捲動時欄頭貼在頁首下方 */
  th:hover{color:var(--acc)}
  /* 表格英雄格：置左＋固定縮排——任何名字長度左緣都對齊，且不貼死左邊 */
  td:has(.heroname){text-align:left;padding-left:1em}
  /* 選手數據的選手欄：跟英雄欄同款置左模式 */
  #tbl.nameL td:nth-child(2){text-align:left;padding-left:1em}
  /* 出場紀錄/熱門英雄：JS 量測最長名字後整組置中（見 alignHeroCols） */
  td .heroname{display:inline-flex;align-items:center;white-space:nowrap}
  /* 實色底，避免卡片漸層透出造成固定欄與一般欄深淺不一致 */
  tbody tr:nth-child(odd) td{background:#161c2b}
  tbody tr:nth-child(even) td{background:#1a202f}
  tbody tr:hover td{background:#1e2740}
  .tblwrap{overflow:visible;border:1px solid var(--line);border-radius:10px;background:#161c2b} /* 不設高度上限：表格往下延伸，用整頁捲動 */
  .tblwrap table{table-layout:auto;width:max-content;min-width:100%} /* 內容優先：欄寬跟著內容走，絕不出現…裁字 */
  /* 英雄/選手/戰隊：欄寬貼合各欄最長內容、欄間距統一(不撐滿整寬造成間隔不均)；排行/名稱維持靠左 */
  #main[data-view="英雄"] .tblwrap table,#main[data-view="選手"] .tblwrap table,#main[data-view="戰隊"] .tblwrap table{min-width:0}
  /* 只有表格真的比框寬時才啟用內部橫向捲動（JS 動態掛 hscroll）；此時欄頭不再做頁面 sticky（避免浮起蓋住前幾列） */
  .tblwrap.hscroll{overflow-x:auto} /* 表內原生橫捲軸＝全站預設 9px，與垂直捲軸一致（使用者要求左右/上下把手大小一致化） */
  .tblwrap.hscroll th{top:0}
  /* 間距壓縮兩段：表格小幅超寬(≤12%)先縮左右內距塞回一屏（100% 縮放不出左右捲軸的手段，縮的是間距不是字），塞不下才走 hscroll */
  .tblwrap.pt1 th,.tblwrap.pt1 td{padding-left:4px;padding-right:4px}
  .tblwrap.pt2 th,.tblwrap.pt2 td{padding-left:2px;padding-right:2px}
  /* 浮動水平捲軸：畫面內橫捲容器自己的底部捲軸在視窗外時，浮出代理捲軸（雙向同步，見 hsbUpdate）。
     離底緣 12px＝緩衝死區（非全螢幕使用時滑過頭不會點到 Windows 工具列）。
     使用者規格：軌道 15px、把手 9px＝與全站垂直捲軸(9px)同粗細（自製把手置中、最小寬 44px 好抓；不用原生捲軸=Firefox 也一致） */
  #hsb{position:fixed;left:0;bottom:12px;height:15px;display:none;z-index:220;background:rgba(16,20,31,.92);
    border:1px solid var(--line);border-radius:8px;box-shadow:0 4px 14px rgba(0,0,0,.45)}
  #hsbT{position:absolute;top:50%;transform:translateY(-50%);height:9px;min-width:44px;border-radius:99px;
    background:#44557f;box-shadow:0 2px 8px rgba(0,0,0,.5);cursor:grab;touch-action:none}
  #hsbT:hover,#hsbT.drag{background:#5f76ab}
  #hsbT.drag{cursor:grabbing}
  @container mainc (max-width:1980px){th,td{padding:8px 7px}} /* 1080P 縮內距，讓大表盡量不用捲 */
  th[data-k]{white-space:normal;line-height:1.25;vertical-align:middle;text-wrap:balance} /* 長標題換行且行長平衡（四字斷成2+2非3+1） */
  .hi{color:var(--gold);font-weight:bold}
  .win{color:var(--green);font-weight:bold}
  .scorebar{display:inline-block;min-width:34px;text-align:center;padding:1px 7px;border-radius:6px;font-weight:bold}
  #answer{white-space:pre-wrap;line-height:1.7;background:var(--card2);border-radius:10px;padding:14px;min-height:40px;margin-top:10px}
  #answer:empty{display:none}
  .err{background:#3a1d1d;border:1px solid #a33;border-radius:12px;padding:20px;line-height:1.8}
  .row{display:flex;gap:10px;flex-wrap:wrap;align-items:center}
  textarea{width:100%;min-height:60px;resize:vertical}
  .tName{min-height:0;width:auto} /* Tier 名不吃全域 textarea 的 min-height/寬度 */
  .spin{display:inline-block;animation:sp 1s linear infinite}
  @keyframes sp{to{transform:rotate(360deg)}}
  table.bp{table-layout:auto} /* BP 表欄寬照內容：禁用5圖示完整、路線欄緊湊 */
  .bp td{padding:6px 8px;font-size:16px}
  .bp .bans{white-space:nowrap}
  .bp .cc img{width:44px;height:44px;border-radius:9px}
  .bp .bans .cc img{width:40px;height:40px} /* 選手圖(44px)的90% */
  .bp .cc .po{font-size:13.5px}
  .fp{font-weight:900;color:var(--gold)}  /* 先選方：粗體＋金色 */
  .bp td.bpw{background:rgba(255,255,255,.10)}  /* 勝方整隊範圍(隊名＋禁用＋五路)：小白底(取代⭐) */
  .bsHistIt{padding:3px 10px;border-radius:6px;cursor:pointer;font-size:15.5px;line-height:1.55}
  .bsHistIt:hover{background:#2a3345}
  .posic{height:30px;width:30px;object-fit:contain;vertical-align:middle}
  .bp thead .posic{height:26px;width:26px}
  .rosterGrid h2 .posic{height:34px;width:34px}
  /* 系列賽（大場）標題列＋小局縮排 */
  .bp tr.seriesHead td{background:var(--card2);border-top:2px solid var(--line);padding:7px 10px;font-size:13.5px;text-align:left}
  .bp tr.seriesHead .sMeta{font-weight:bold}
  .bp tr.seriesHead .sVs{font-weight:bold;font-size:15px;margin:0 12px}
  .bp tr.seriesHead .sVs b{color:var(--tx2)}
  .bp tr.seriesHead .sVs b.win{color:var(--gold)}
  .bp tr.subrow td{background:rgba(255,255,255,.02)}
  .bp td.subg{padding-left:22px;color:var(--tx2);font-size:13px;white-space:nowrap}
  .note{color:var(--tx2);font-size:13.5px;margin-top:8px}
  .cc{display:inline-flex;align-items:center;gap:3px;vertical-align:middle}
  .cc img{width:34px;height:34px;border-radius:8px;border:1px solid #33405c;display:block}
  /* 滑過英雄 → 同英雄一段式即時發光（outline 便宜、無動畫、無模糊） */
  .cc img.glow{transform:scale(1.1);position:relative;z-index:3;border-color:transparent;
    box-shadow:0 0 6px 1px rgba(255,255,255,.9),0 0 14px 4px rgba(255,255,255,.45)} /* 對戰BP 聯動高亮：放大10%＋漸層白光 */
  .cc .po{font-size:12px;color:var(--gold);font-weight:bold;min-width:9px}

  .bpChip .cc img{width:22px;height:22px;border-radius:4px}
  .bpChip.bpIco{padding:1px}                                   /* 純頭像籌碼（角色池） */
  .bpChip.bpSqOnly{position:relative} /* 純「近期積分」新增的英雄：不加綠框，改在圖中央寫 SoloQ */
  .bpSqLbl{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:calc(var(--cs,40px)*.24);font-weight:bold;color:#fff;letter-spacing:.2px;white-space:nowrap;pointer-events:none;text-shadow:0 0 2px #000,0 0 3px #000,0 0 2px #000,0 1px 2px #000} /* 字級跟著頭像尺寸(--cs=fitPool動態算)，24% */
  .bpChip.bpSm .bpSqLbl{font-size:calc(var(--cs,40px)*.19)} /* 低場數縮小chip → 字同步縮 */
  .bpChip:has(.cc img.glow) .bpSqLbl,.bpChip:hover .bpSqLbl{transform:translate(-50%,-50%) scale(1.1)} /* 滑上放大時字跟著放大(與 img.glow 同 1.1 倍) */
  .bpChip.bpIco .cc img{width:44px;height:44px;border-radius:7px;display:block}
  .bpChip .cc img.glow{outline:none;transform:scale(1.1);border-color:transparent;
    box-shadow:0 0 6px 1px rgba(255,255,255,.9),0 0 14px 4px rgba(255,255,255,.45)} /* 角色池滑過：放大10%＋漸層白光 */
  .bpSlot .cc img.glowS{box-shadow:0 0 6px 1px rgba(255,255,255,.9),0 0 14px 4px rgba(255,255,255,.45)} /* BAN/PICK 格同英雄：白光不放大 */
  .bpSlot .cc img.bpLit{transform:scale(1.1);position:relative;z-index:3;box-shadow:0 0 6px 1px rgba(255,255,255,.9),0 0 14px 4px rgba(255,255,255,.45)} /* 滑上模擬局英雄：同英雄在所有模擬局格放大發白光（角色池不連動）*/
  .bpSlot:has(.cc img.bpLit){overflow:visible;z-index:3} /* 放大時不被格子邊框切掉 */
  /* 角色池滑過放大發光時，讓「池／該路列／chips框」都不要切掉白光（只在有 glow 時放開，平時維持 hidden 版型）*/
  .bpPool:has(.bpChip .cc img.glow){overflow:visible!important}
  .bpPoolRow:has(.bpChip .cc img.glow){overflow:visible!important}
  .bpChips:has(.bpChip .cc img.glow){overflow:visible}
  .bpChip:has(.cc img.glow){z-index:5}
  /* 英雄Tier / 對戰BP：英雄圖滑過同款 放大10%＋漸層白光 */
  #main[data-view="英雄Tier"] .tChip:hover>img,
  #main[data-view="英雄Tier"] .tChip>img.tglow, /* 同英雄多路線一起：放大10%＋白光（池與 Tier 表都亮） */
  #main[data-view="對戰BP"] .cc:hover img{transform:scale(1.1);position:relative;z-index:3;
    box-shadow:0 0 6px 1px rgba(255,255,255,.9),0 0 14px 4px rgba(255,255,255,.45)}
  /* 混合路線圖示：英雄圖放大時不消失，一併放大＋白光（層級高於英雄圖） */
  #main[data-view="英雄Tier"] .tChip:hover .tlic img,
  #main[data-view="英雄Tier"] .tChip:has(>img.tglow) .tlic img{transform:scale(1.1);filter:drop-shadow(0 0 4px rgba(255,255,255,.95))}
  /* 白光防裁切：hover 當下暫時解除該格/該列的 overflow 裁切 */
  /* 滑過英雄圖放大發光時，讓容器不切掉（全視圖：表格格、名稱欄、陣容格、圖鑑格、版本改動…）*/
  #main td:has(.cc:hover),#main th:has(.cc:hover){overflow:visible}
  #main td:has(.cc img.glow),#main td:has(.cc img.glowS),#main td:has(.heroname.chi){overflow:visible}
  #main .dexIt:has(.cc:hover),#main .dexIt:has(.cc img.glow),#main .chgHead:has(.cc:hover),#main .chgHead:has(.cc img.glow){overflow:visible;position:relative;z-index:4}
  .tierRow:has(.tChip:hover),.tierRow:has(.tChip>img.tglow){z-index:5}
  #tierPoolBox>div>div:has(.tChip:hover),#tierPoolBox>div>div:has(.tChip>img.tglow){z-index:5;position:relative}
  .bpPool .posic{width:30px;height:30px}                       /* 角色池路線圖 */
  .bpPool .bpPlName{font-size:16.5px;font-weight:bold;color:var(--tx)} /* 選手ID */
  /* 池區頭貼：尺寸由 fitPool() 依每列可用高動態計算（--cs），填滿整欄高 */
  .bpChips{flex:1 1 0;min-height:0;display:flex;flex-wrap:wrap;align-content:flex-start;gap:5px;margin-top:3px;overflow:visible} /* visible：放大效果不被上一列切掉（尺寸由 fitPool 保證不溢出） */
  .bpChips .bpChip{padding:0;border:none;background:none;margin:0}
  .bpChips .bpChip .cc{display:block}
  .bpChips .bpChip .cc img{width:var(--cs,40px);height:var(--cs,40px);object-fit:cover;border-radius:6px;display:block}
  /* BAN 過小塊：固定小尺寸，不參與 fitPool 波動 */
  .bpChipsS{display:flex;flex-wrap:wrap;gap:2px}
  .bpChipsS .bpChip{padding:0;border:none;background:none;margin:0}
  .bpChipsS .bpChip .cc img{width:calc(var(--cs,40px)*.8);height:auto;aspect-ratio:1/1;object-fit:cover;border-radius:5px;display:block} /* ＝角色池頭像的 80% */
  /* 使用標記：金光＝全場只有他會用、青框＝同隊兩人以上用過 */
  .bpChips .bpChip.bpUni .cc img{box-shadow:0 0 5px 2px rgba(245,185,66,.95),0 0 12px 5px rgba(245,185,66,.55)}
  .bpChips .bpChip.bpDupT .cc img{outline:2px solid #2fd4d4;outline-offset:-3px}
  /* 低於最少場數：不刪除、縮小為 80% */
  .bpChips .bpChip.bpSm .cc img{width:calc(var(--cs,40px)*.8);height:calc(var(--cs,40px)*.8)}
  .bpChipsS .bpChip.bpSm .cc img{width:calc(var(--cs,40px)*.64)}
  /* 雙方BAN過 ＋ 其他英雄 合併成一條流：框高＝選手格高，英雄多就縮小＋換行塞滿框(不捲動)，其他英雄灰色 */
  /* 「雙方BAN過／其他英雄」＝角色池右側獨立直欄：圖示由上往下排、一欄排滿再往右換欄（尺寸由 fitPool 的 --csother 算到剛好塞滿、不捲動） */
  .bpMid:has(.bpChip .cc img.glow){overflow:visible!important}
  .bpMergeFlow{display:flex;flex-direction:column;flex-wrap:wrap;gap:4px;align-content:flex-start;justify-content:flex-start;overflow:visible}
  .bpMergeFlow .bpChip{padding:0;border:none;background:none;margin:0}
  .bpMergeFlow .bpChip .cc img{width:var(--csother,40px);height:var(--csother,40px);object-fit:cover;border-radius:5px;display:block}
  .bpMergeFlow .bpChip.bpGrey{opacity:.5}
  .bpMergeFlow .bpChip.bpGrey .cc img{filter:grayscale(.45)}
  .bpMergeFlow .bpChip.bpGrey:hover{opacity:1}
  .bpMergeFlow .bpChip.bpGrey:hover .cc img{filter:none}
  /* 鐵則：全站頭像只能縮放、不能改變長寬比 */
  #bsWrap .cc img{aspect-ratio:1/1;object-fit:cover}
  /* 局欄 PICK 格：正方形 70px（BAN 49px＝70% 同比連動），欄寬不足時自動縮 */
  /* 縮放對策在 JS：#bsWrap(局+池整區) 設 CSS zoom=1/min(縮放,1.5)（見 BP fit()）——≤150% 時 BP 等同 100% 版面剛好一屏、
     >150% 依 150% 尺寸放大自然溢出頁捲；所以這裡的 vh 公式照 100% 情境寫即可 */
  .bpSlot.bpPickS{flex:0 0 auto;width:min(100px,calc(11.9vh - 71px));aspect-ratio:1/1;height:auto;min-height:0;align-self:center;justify-content:center;overflow:visible}
  /* PICK 同選角順位合併框：兩格虛線框直接合併成一個框，寫「Pick N M」；框內兩格不再各自加框 */
  .bpPickBox{position:relative;display:flex;flex-direction:column;gap:7px;align-items:center;border:2px dashed #33405c;border-radius:12px;padding:0;width:min(100px,calc(11.9vh - 71px))} /* 不變大框：外框寬度＝單一 PICK 格寬(border-box)，只把兩格的虛線連成一個外框；框內兩英雄圖間隔 7px */
  .bpPickBox.bpBoxOn{border-style:solid} /* 放入英雄後 虛線→實線(與一般格一致) */
  .bpPickBoxLbl{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);font-size:13px;color:var(--tx2);font-weight:bold;letter-spacing:.3px;white-space:nowrap;pointer-events:none} /* 正中央寫 Pick N M */
  .bpPickBox .bpSlot.bpPickS{margin:0}
  .bpSlot.bpPickS.bpInBox{border:none;background:none;width:100%} /* 框內格：虛線外框已合併提供，內格不加框、空格也不加淺白底；寬度撐滿外框(扣掉外框 border 後與單一 PICK 格內容同寬) */
  .bpSlot.bpPickS .cc{display:flex;height:96%;aspect-ratio:1/1;width:auto}
  .bpSlot.bpPickS .cc img{width:100%;height:100%;object-fit:cover;border-radius:10px}
  .bpSlot{height:36px;border:2px dashed #33405c;border-radius:6px;display:flex;align-items:center;position:relative;
    gap:5px;padding:0 6px;font-size:13.5px;overflow:hidden;white-space:nowrap}
  /* PICK 左上角路線圖（該隊多路皆會玩時，列出各路）＝英雄圖的 30%，左上超出框一點點（同英雄Tier混合模式） */
  .bpLaneBadge{position:absolute;top:-4px;left:-4px;width:100%;z-index:6;display:flex;gap:1px;pointer-events:none}
  .bpLaneBadge .bpLaneIco{width:30%;aspect-ratio:1/1;filter:drop-shadow(0 0 2px #000)}
  .bpLaneBadge .bpLaneIco.pick{pointer-events:auto;cursor:pointer}      /* 多路待定：可點擊指定路線 */
  .bpLaneBadge .bpLaneIco.pick:hover{transform:scale(1.15);filter:drop-shadow(0 0 4px #fff)}
  .bpLaneBadge .bpLaneIco.bpLaneSoft{opacity:.7}                          /* 全庫近30場推得、該隊沒實際走過的路：透明度 70%（不透太多、仍與實線區分） */
  .bpLaneBadge .bpLaneIco.bpLaneSoft.pick:hover{opacity:.85}
  .bpLaneBadge .bpLaneIco img,.bpLaneBadge .bpLaneIco .posic{width:100%;height:100%;object-fit:contain;display:block}
  /* BAN/PICK 皆為正方形格；頭貼填滿格子。目標 PICK=70px、BAN=49px（70%），欄寬不足時自動縮 */
  .bpSlot.bpBanS{flex:0 0 auto;width:min(80px,calc(9.5vh - 57px));aspect-ratio:1/1;height:auto;min-height:0;align-self:center;justify-content:center;opacity:.9}
  .bpSlot.bpBanS .cc{display:flex;height:94%;aspect-ratio:1/1;width:auto}
  .bpSlot.bpBanS .cc img{width:100%;height:100%;object-fit:cover;border-radius:6px}
  .bpSlot.bpBanS.filled .cc img:not(.nobanImg){filter:grayscale(.5) brightness(.95)} /* BAN 微灰即可（不要太灰）；空BAN 圖不灰 */
  .bpSlot.bpBanS.filled .cc:has(img:not(.nobanImg)){position:relative}
  .bpSlot.bpBanS.filled .cc:has(img:not(.nobanImg))::after{content:"";position:absolute;left:50%;top:50%;width:calc(116.6% - 10px);height:2px;border-radius:2px;pointer-events:none;
    background:rgba(255,66,66,.95);transform:translate(-50%,-50%) rotate(30.96deg);transform-origin:center} /* Ban 象徵：左邊高80%→右邊高20%(左上→右下)細紅斜線、兩端內縮5px(空BAN不畫) */
  .bpSlot.filled{border-style:solid;cursor:pointer;background:var(--card2)}
  .bpSlot.drag{border-color:var(--acc);background:#1e2740}
  .bpSlot::before{content:"";position:absolute;inset:-16px;border-radius:12px;pointer-events:none;z-index:1} /* 放寬拖曳偵測範圍(不改視覺虛線框大小)：平時 pointer-events:none 不擋點擊 */
  body.bpDragging .bpSlot::before{pointer-events:auto} /* 僅拖曳進行中才啟用擴大偵測區，落點在框外 16px 內也算命中該格 */
  body.carrying{cursor:grabbing} /* 拎起英雄中：整頁 grabbing 游標 */
  body.carrying .tierRow{outline:2px dashed rgba(245,185,66,.55);outline-offset:-3px} /* 拎起中：Tier 階列亮虛線提示可放入；模擬BP 格數太多不加框 */
  /* 局號拖曳把手：明顯的可抓取外觀 */
  .bsGHandle{cursor:grab;display:inline-flex;align-items:center;gap:4px;padding:1px 10px;
    border:1px solid var(--line);border-radius:8px;background:var(--card2);user-select:none}
  .bsGHandle:hover{border-color:var(--acc);color:var(--acc)}
  .bsGHandle:active{cursor:grabbing;border-color:var(--gold)}
  /* 自動模式：下一個待填格發光 */
  .bpSlot.bpNext{border-style:solid;border-color:var(--gold);animation:bpPulse 3s ease-in-out infinite}
  @keyframes bpPulse{0%,100%{box-shadow:0 0 5px rgba(245,185,66,.45)}50%{box-shadow:0 0 14px rgba(245,185,66,.9)}}
  .bpSlot .cc img{width:24px;height:24px;border-radius:4px}
  .bpSlot .meta{font-size:12px}
  /* 資料庫分頁 */
  /* 橫向順序瀑布流：卡片由左至右輪流進四欄，各欄自行堆疊消化高度 */
  #tmGrid{display:grid;grid-template-columns:repeat(4,1fr);gap:var(--gap);align-items:start;margin-bottom:var(--gap)}
  @container mainc (max-width:1300px){#tmGrid{grid-template-columns:repeat(2,1fr)}}
  .tmcol{display:flex;flex-direction:column;gap:var(--gap)}
  #tmGrid .card{padding:10px 12px;margin-bottom:0}
  #tmGrid .card h2{margin-bottom:8px} /* 字級維持 19，標題不得小於數據 */
  #tmGrid .card h2 .lg{font-size:20px;padding:3px 15px} /* 卡標題聯賽籤 ≥ 內文15.5px+30% */
  #tmGrid .card h2 .sub{font-size:19px}
  #tmGrid table{font-size:15.5px;table-layout:auto} /* auto：長隊名先吃其他欄的空位，不會提早裁字 */
  #tmGrid tbody td{height:48px} /* 列高統一（border-box 含內距）：賽區籤列與縮寫輸入列同高 */
  #tmGrid tbody .lg{font-size:15.5px} /* 賽區籤與戰隊名等大 */
  #ovM .lg{font-size:15.5px} /* 總覽最近比賽的聯賽籤與內文同大 */
  .heroname .lg{font-size:inherit} /* 數據表名稱旁的聯賽籤與名稱等大 */
  .evtPromoDiv{flex-basis:100%;height:0;border-top:1px solid rgba(245,185,66,.5);margin:7px 0 6px} /* 升降分界線＝金實線（分組線=灰虛線，兩種樣式） */
  .evtPromoCols{flex-basis:100%;display:flex;gap:12px;align-items:stretch}
  .evtPromoGrp{flex:1 1 0;display:flex;flex-wrap:wrap;gap:4px;align-content:flex-start;min-width:0}
  .evtPromoLb{flex-basis:100%;font-size:13.5px;color:var(--tx2)}
  .evtPromoVr{flex:0 0 auto;width:0;border-left:1px dashed #3a4661} /* 北/南升降之間＝灰虛豎線 */
  .evtPromoDiv.evtGrpHr{border-top:1px dashed #3a4661} /* 分組用的無標籤灰虛線（非升降金線） */
  .evtRelegDiv i{color:#f5b942}
  .evtRelegDiv::after{border-top-style:solid;border-top-color:rgba(245,185,66,.5)} /* 升降分界：金字標籤＋金實線 */
  .evtGrpDiv{height:auto;border-top:0;display:flex;align-items:center;gap:8px;margin:7px 0 5px} /* LTA 分區線：標籤＋線 */
  .evtGrpDiv i{font-style:normal;font-size:13.5px;color:var(--tx2);white-space:nowrap}
  .evtGrpDiv::after{content:"";flex:1;border-top:1px dashed #3a4661}
  .evtGrpNL::after{content:none} /* LTA 段標籤：右邊不畫線 */
  .objTierBadge{position:absolute;right:-4px;bottom:-4px;background:#0d1117;border:1px solid #4a5a7c;border-radius:5px;font-size:11px;line-height:1.4;padding:0 4px;color:var(--gold);font-weight:bold} /* 塔層級 1/2/3 */
  .promoDiv td{color:var(--tx2);text-align:center;font-size:13.5px;padding:5px 0;letter-spacing:2px} /* 分段字樣就夠，不再畫線 */
  #tmGrid th,#tmGrid td{padding:8px 6px} /* 隊伍列間距加大（原 3px 太擠，國際賽分組後更擠） */
  #tmGrid .abbr{width:76px;padding:4px 6px}
  #tmGrid td:nth-child(2),#tmGrid th:nth-child(2){text-align:left} /* 戰隊全名：中間空間置左 */
  #tmGrid td:nth-child(1),#tmGrid th:nth-child(1){text-align:left;padding-left:14px} /* 縮寫/賽區貼左 */
  #tmGrid td:nth-child(3),#tmGrid th:nth-child(3){text-align:right;padding-right:14px} /* 最後出賽貼右：左右內距等同 */
  .abbr{width:92px;text-align:center;font-weight:bold}
  .abbr:placeholder-shown{border-color:#f5b942aa}
  /* 對比框顏色 = 雷達線顏色 */
  #r1,#t1{border-color:#4f8ef7;box-shadow:0 0 0 1px rgba(79,142,247,.35)}
  #r2,#t2{border-color:#e05c5c;box-shadow:0 0 0 1px rgba(224,92,92,.35)}
  #r3,#t3{border-color:#f5b942;box-shadow:0 0 0 1px rgba(245,185,66,.35)}
  /* 每欄排名上色：前三紅（第一粗體）、後三藍（最後粗體） */
  td.hi3{color:#ff6b6b} td.hi1{color:#ff4d4d;font-weight:800}
  td.lo3{color:#6ea8ff} td.lo1{color:#6ea8ff;font-weight:800}
  td.rk{color:var(--tx2)} /* 字級與其他格一致（15.5px），僅顏色淡化 */
  td.rk1{color:#ffd700;font-weight:bold} td.rk2{color:#c8cdd6;font-weight:bold} td.rk3{color:#cd8b52;font-weight:bold}
  /* 等寬數字＋凍結名次與名稱欄（橫向捲動時看得到是誰） */
  table{font-variant-numeric:tabular-nums}
  .tblwrap th:nth-child(1),.tblwrap td:nth-child(1){position:sticky;left:0;background:#161c2b;z-index:2;min-width:34px}
  .tblwrap th:nth-child(2),.tblwrap td:nth-child(2){position:sticky;left:46px;background:#161c2b;z-index:2}
  .tblwrap thead th:nth-child(1),.tblwrap thead th:nth-child(2){z-index:5}
  /* 前兩欄是固定欄(不透明底)，需手動補上斑馬紋與 hover，否則深淺色會斷在這兩欄 */
  .tblwrap tbody tr:nth-child(even) td:nth-child(1),
  .tblwrap tbody tr:nth-child(even) td:nth-child(2){background:#1a202f}
  .tblwrap tbody tr:hover td:nth-child(1),
  .tblwrap tbody tr:hover td:nth-child(2){background:#1e2740}
  /* 英雄Tier：圓形色彩選擇塊（點擊開圓盤色盤） */
  .tClr{flex:0 0 auto;width:26px;height:26px;padding:0;border:1px solid #33405c;cursor:pointer;border-radius:50%}
  /* 英雄Tier：整階拖曳把手 */
  .tGrip{flex:0 0 auto;align-self:center;cursor:grab;color:#5a6a8a;font-size:22px;line-height:1;padding:6px 8px;border-radius:6px}
  .tGrip:hover{color:#fff;background:#232c44}
  .tGrip:active{cursor:grabbing}
  /* 聯賽色籤 */
  .lg{display:inline-block;padding:1px 9px;border-radius:999px;font-size:12px;font-weight:bold}
  /* 可點選手名 → 英雄池 */
  .plink{cursor:pointer}
  .plink:hover{color:var(--acc)} /* 滑上才變藍，不加底線 */
  /* 帳號超連結：平常灰(同一般文字)、滑上才變藍加底線、看過也不變紫 */
  .acctLink,.acctLink:visited{color:var(--tx2);text-decoration:none}
  .acctLink:hover{color:var(--acc);text-decoration:underline}
  /* 積分逐場：點選手名進詳情，可點的名字滑上變色 */
  .rankName{cursor:pointer}
  .rankName:hover b{color:var(--acc);text-decoration:underline}
  .favStar{cursor:pointer;color:#4a5568;margin-right:5px;font-size:15px;user-select:none;transition:color .12s} /* ★收藏星：預設灰、收藏亮金 */

const xKey=(obj,n)=>{
  if(!obj||n==null)return null;
  n=String(n);
  const cands=[n,n.replace(/\s+/g,""),n.replace(/鏈/g,"鍊"),n.replace(/鍊/g,"鏈")];

  if(ITEM_ALIAS[n])cands.push(ITEM_ALIAS[n]); // 舊譯名 → 現行名
  for(const[a,c]of Object.entries(ITEM_ALIAS))if(c===n)cands.push(a); // 現行名 → 舊譯名
  for(const k of cands)if(obj[k]!=null)return k;
  return null;

// 歷史年道具/符文資料：該年最後版本的 DDragon item/runes（首次右鍵時載入並快取）
const _HIST={};
async function histYearData(){
  const y=+curYear, ver=HIST_VER[y];
  if(_HIST[y])return _HIST[y];
  const items={}, byId={};
  try{
    const j=await(await fetch(`https://ddragon.leagueoflegends.com/cdn/${ver}/data/${DDLOC}/item.json`)).json();
    for(const[id,x]of Object.entries(j.data)){byId[id]=x.name;}
    for(const[id,x]of Object.entries(j.data)){
      const d=String(x.description||"");
      const sm=d.match(/<stats>([\s\S]*?)<\/stats>/i);
      const rest=stripT(d.replace(/<stats>[\s\S]*?<\/stats>/i,"").replace(/<br\s*\/?>/gi,"\n")).trim();
      const sec=[];
      if(sm){const st=stripT(sm[1].replace(/<br\s*\/?>/gi,"、")).trim(); if(st)sec.push({h:"屬性",t:st});}
      if(rest)sec.push({h:"",t:rest});
      items[x.name]={t:"道具",g:(x.gold||{}).total||0,b:(x.gold||{}).base||0,
        f:(x.from||[]).map(i2=>byId[i2]).filter(Boolean),
        u:(x.into||[]).map(i2=>byId[i2]).filter(Boolean),
        sec,img:`https://ddragon.leagueoflegends.com/cdn/${ver}/img/item/${x.image?x.image.full:id+".png"}`};
    }
  }catch(e){}
  const runes={};
  try{
    const r=await(await fetch(`https://ddragon.leagueoflegends.com/cdn/${ver}/data/${DDLOC}/runesReforged.json`)).json();
    r.forEach(tree=>tree.slots.forEach(sl=>sl.runes.forEach(rn=>{
      runes[rn.name]={t:"符文",sec:[{h:"",t:stripT(String(rn.longDesc||rn.shortDesc||"").replace(/<br\s*\/?>/gi,"\n"))}],
        img:`https://ddragon.leagueoflegends.com/cdn/img/${rn.icon}`};
    })));
  }catch(e){}
  return _HIST[y]={items,runes};
}

// 滑鼠移上即顯示說明（同英雄Tier 的顯示方式）；移開即關
function bindHoverTips(root){
  let hoverEl=null,hoverBusy=false; // 同目標處理中/顯示中不重置；但說明已被關掉（點擊/Esc）就放行重新顯示
  root.addEventListener("mouseover",async e=>{
    const el=e.target.closest&&e.target.closest("[data-tip]"); if(!el||!root.contains(el))return;
    if(el===hoverEl&&(hoverBusy||(tipEl&&tipEl.style.display==="block")))return;
    hoverEl=el;hoverBusy=true;
    const tok=++tipToken, r=el.getBoundingClientRect();
    let html="";
    try{
      if(el.dataset.tip==="champ")html=await champTipHTML(el.dataset.key);
      else html=isHistYear()?await histItemTipHTML(el.dataset.name):extraTipHTML(el.dataset.name);
    }catch(err){html="";}
    hoverBusy=false;
    // token 過期但游標仍停在同一張圖（抓資料期間滑出又滑回）→ 照樣顯示
    if(html&&hoverEl===el&&(tok===tipToken||el.matches(":hover"))){
      tipCur=el; tipShow(html,el.getBoundingClientRect());
      tipEl.style.pointerEvents="none"; // hover 說明框滑鼠穿透：蓋住的下一張圖照樣能 hover
    }
  });
  root.addEventListener("mouseout",e=>{
    const el=e.target.closest&&e.target.closest("[data-tip]"); if(!el)return;
    if(e.relatedTarget&&el.contains(e.relatedTarget))return;
    if(hoverEl===el)hoverEl=null;
    tipHide();
  });
}
function bindChgTips(root){

  };
}

        a.posLabel=PNAME[+Object.entries(a.posCnt).sort((x,y)=>y[1]-x[1])[0][0]];
      }
      const a=get(key);
      a.team=B(C.blue_teamname);
      a.lgCnt=a.lgCnt||{}; a.lgCnt[o.league]=(a.lgCnt[o.league]||0)+1; // 所屬聯賽＝出賽最多的
      a.dpm+=num(B(C.blue_dpm))||0; a.ds+=num(B(C.blue_damageshare))||0;
      a.dt+=num(B(C.blue_damagetakenperminute))||0; a.vs+=num(B(C.blue_vspm))||0;
      a.k+=num(B(C.blue_kills))||0; a.d+=num(B(C.blue_deaths))||0; a.a2+=num(B(C.blue_assists))||0;
      a.tk+=num(B(C.blue_teamkills))||0; a.td+=num(B(C.blue_teamdeaths))||0;
      a.dmg+=num(B(C.blue_damagetochampions))||0; a.gold+=num(B(C.blue_totalgold))||0;
      a.gl=(a.gl||0)+(num(r[C.blue_gamelength])||0); // gamelength 是全場欄位，不分側
      const k10=num(B(C.blue_killsat10));
      if(k10!=null){ a.kdaN++; a.k10+=k10; a.a10+=num(B(C.blue_assistsat10))||0; a.d10+=num(B(C.blue_deathsat10))||0;
        a.ok10+=num(O(C.blue_killsat10))||0; a.oa10+=num(O(C.blue_assistsat10))||0; a.od10+=num(O(C.blue_deathsat10))||0; }
      if(duo){ // 雙人組後選率＝兩條路各自算再平均（主、副 pid 都要進來）
        const po=num(side?r[C.red_po]:r[C.blue_po]), opo=num(side?r[C.blue_po]:r[C.red_po]);
        if(po!=null&&opo!=null&&(po||opo)){ if(po>opo)a.late++; a.lateN++; }
      }
      if(!isMain)continue;
      a.n++;
      if(o.result===(side?2:1))a.w++;
      const fb=B(C.blue_firstblood); if(fb!==""){a.fbN++; a.fb+=+fb||0;}
      const fv=B(C.blue_firstbloodvictim); if(fv!==""){a.fvN++; a.fv+=+fv||0;}
      const g10=num(B(C.blue_goldat10)), og10=num(O(C.blue_goldat10));
      if(g10!=null){ a.g10N++; a.gd10+=g10-(og10||0);
        a.xd10+=num(B(C.blue_xpdiffat10))||0;
        a.cd10=(a.cd10||0)+(num(B(C.blue_csdiffat10))||0);
        if(g10>og10)a.winL++; else if(og10>g10)a.loseL++; }
      const g25=num(B(C.blue_goldat25)), og25=num(O(C.blue_goldat25));
      if(g25!=null){ a.g25N++; a.gd25+=g25-(og25||0); }
      if(!duo){ const po=num(side?r[C.red_po]:r[C.blue_po]), opo=num(side?r[C.blue_po]:r[C.red_po]);
        if(po!=null&&opo!=null&&(po||opo)){ if(po>opo)a.late++; a.lateN++; } }
    }
  }
  const rows=[];
  for(const[key,a]of acc){
    if(!a.n)continue;
    const kda10=a.kdaN?((a.k10+a.a10)/Math.max(1,a.d10))-((a.ok10+a.oa10)/Math.max(1,a.od10)):null;
    const gd10=a.g10N?a.gd10/a.g10N:null, gd25=a.g25N?a.gd25/a.g25N:null;
    rows.push({
      選手:tAb(a.team)+" "+a.name, _lg:(Object.entries(a.lgCnt||{}).sort((x,y)=>y[1]-x[1])[0]||[""])[0], 位置:a.posLabel||"", 場數:a.n, 勝率:a.w/a.n,
      參與率:(a.k+a.a2)/Math.max(1,a.tk), "贏線率(金差@10)":a.g10N?a.winL/a.g10N:null,
      後選率:a.lateN?(duo?a.late/a.lateN:a.late/a.n):0, 輸出比:a.ds/a.n, 死亡比:a.d/Math.max(1,a.td),
      首殺率:a.fbN?a.fb/a.fbN:null, 被首殺率:a.fvN?a.fv/a.fvN:null,
      金轉傷:a.gold?a.dmg/a.gold:0, 分均輸出:a.dpm/a.n, 分均承傷:a.dt/a.n,
      分均金錢:a.gl?a.gold/(a.gl/60):0,
      "經驗差@10":a.g10N?a.xd10/a.g10N:null, "CS差@10":a.g10N?(a.cd10||0)/a.g10N:null,
      "金差@10":gd10,
      中期金差:(gd10!=null&&gd25!=null)?gd25-gd10:null,
      分均視分:a.vs/a.n, "KDA差@10":kda10, KDA:(a.k+a.a2)/Math.max(1,a.d),
      "K/D/A":`${d1s(a.k/a.n)} / ${d1s(a.d/a.n)} / ${d1s(a.a2/a.n)}`,
      角色池:a.champs.size
    });
  }
  if(!rows.length)return rows;
  const g=rows.map(r=>r.場數), thr=threshold(g);
  const P=(getv,asc)=>rankP(rows.map(r=>{const v=getv(r);return v==null?0:v;}),asc);
  const Sw=P(r=>wilson(r.勝率,r.場數)), S贏=P(r=>r["贏線率(金差@10)"]), S輸=P(r=>r.輸出比),
    S首=P(r=>r.首殺率), S金傷=P(r=>r.金轉傷), SDPM=P(r=>r.分均輸出), Sg=P(r=>r["金差@10"]),
    Sm=P(r=>r.中期金差), SK10=P(r=>r["KDA差@10"]), S參=P(r=>r.參與率), S後=P(r=>r.後選率),
    S死=P(r=>r.死亡比,true), S被=P(r=>r.被首殺率,true), S承=P(r=>r.分均承傷),
    Sx=P(r=>r["經驗差@10"]), Sk=P(r=>r.KDA), S視=P(r=>r.分均視分), S池=P(r=>r.角色池);
  rows.forEach((r,i)=>{
    const has=k=>r[k]!=null;
    let an=Sw[i]+S輸[i]+S金傷[i]+SDPM[i]*2, ad=5;
    if(has("贏線率(金差@10)")){an+=S贏[i]*2;ad+=2;} if(has("首殺率")){an+=S首[i];ad+=1;}
    if(has("金差@10")){an+=Sg[i]*2;ad+=2;} if(has("中期金差")){an+=Sm[i]*2;ad+=2;}
    if(has("KDA差@10")){an+=SK10[i];ad+=1;}
    let dn=Sw[i]+S參[i]+S後[i]+S死[i]+S承[i]+Sk[i]+S視[i]*2+S池[i], dd=9;
    if(has("被首殺率")){dn+=S被[i];dd+=1;} if(has("經驗差@10")){dn+=Sx[i]*2;dd+=2;}
    const pen=penalty(r.場數,thr);
    r.攻擊值=Math.round(curve(an/ad*100)*pen*10)/10;
    r.防禦值=Math.round(curve(dn/dd*100)*pen*10)/10;
    r.評分=Math.round((r.攻擊值*0.7+r.防禦值*0.3)*10)/10;
  });
  return rows.filter(r=>r.場數>=F.minG).sort((a,b)=>b.評分-a.評分||b.攻擊值-a.攻擊值);
}

function calcTeams(vsTeam){
  const acc=new Map();
  const vsA=vsTeam?teamKeyOf(vsTeam):null; // 對戰篩選：合併鍵比對（縮寫涵蓋同隊多本名；碰撞縮寫帶聯賽碼、不同隊不誤中）
  const get=t=>{ let a=acc.get(t); if(!a){a={n:0,w:0,dwN:0,dw:0,gl:0,k:0,d:0,ass:0,gold:0,dmg:0,vs:0,
    ft:0,fmt:0,vgN:0,vg2:0,hdN:0,hd:0,fdN:0,fd:0,dg:0,fbN:0,fb:0,k10:0,d10:0,k10N:0,fmtN:0,
    g10s:0,g10o:0,g25s:0,g25o:0,leadN:0,leadW:0,g10any:0,g25any:0,champs:new Set()}; acc.set(t,a);} return a; };
  for(const o of GAMES){
    if(!passG(o))continue;
    const r=o.raw;
    const bt=r[C.blue_teamname], rt=r[C.red_teamname];
    if(vsA&&teamKeyOf(bt)!==vsA&&teamKeyOf(rt)!==vsA)continue;
    for(const side of[0,1]){
      const team=side?rt:bt;
      if(vsA){ if(teamKeyOf(team)===vsA)continue; }
      const B=i=>r[i+(side?RB:0)], O=i=>r[i+(side?0:RB)];
      const a=get(teamKeyOf(team)); if(!a.full){a.full=team; a.disp=tAbShow(team);} // 合併鍵：縮寫（碰撞縮寫帶聯賽碼分開）；disp＝表格顯示名
      const won=o.result===(side?2:1);
      a.lgCnt=a.lgCnt||{}; a.lgCnt[o.league]=(a.lgCnt[o.league]||0)+1; // 所屬聯賽＝出賽最多的
      a.n++; if(won)a.w++;
      if(side){a.rn=(a.rn||0)+1; if(won)a.rw=(a.rw||0)+1;}
      else{a.bn=(a.bn||0)+1; if(won)a.bw=(a.bw||0)+1;}
      a.fbk=(a.fbk||0)+(num(B(C.blue_firstblood))||0);
      const dw=+r[C.decider_winner]||0;
      if(dw>0){ a.dwN++; if(dw===(side?2:1))a.dw++; }
      a.gl+=num(B(C.blue_gamelength))||0;
      a.k+=num(B(C.blue_teamkills))||0; a.d+=num(B(C.blue_teamdeaths))||0;
      a.ass+=num(B(C.blue_assists))||0; a.gold+=num(B(C.blue_totalgold))||0;
      a.dmg+=num(B(C.blue_damagetochampions))||0; a.vs+=num(B(C.blue_vspm))||0;
      a.ft+=num(B(C.blue_firsttower))||0;
      const fmt=B(C.blue_firstmidtower); if(fmt!==""||O(C.blue_firstmidtower)!==""){a.fmtN++; a.fmt+=+fmt||0;}
      const vg=num(B(C.blue_void_grubs)), ovg=num(O(C.blue_void_grubs));
      if((vg||0)+(ovg||0)>=1){ a.vgN++; if((vg||0)>=2)a.vg2++; }
      const hd=num(B(C.blue_heralds)), ohd=num(O(C.blue_heralds));
      if((hd||0)+(ohd||0)>=1){ a.hdN++; a.hd+=hd||0; }
      const fd=num(B(C.blue_firstdragon)), ofd=num(O(C.blue_firstdragon));
      if((fd||0)+(ofd||0)>=1){ a.fdN++; a.fd+=fd||0; }
      a.dg+=num(B(C.blue_dragons))||0;
      const fb=num(B(C.blue_firstbaron)), ofb=num(O(C.blue_firstbaron));
      if((fb||0)+(ofb||0)>=1){ a.fbN++; a.fb+=fb||0; }
      const k10=num(B(C.blue_killsat10));
      if(k10!=null){ a.k10N++; a.k10+=k10; a.d10+=num(B(C.blue_deathsat10))||0; }
      const g10=num(B(C.blue_goldat10)), og10=num(O(C.blue_goldat10));
      if(g10!=null||og10!=null){ a.g10any++; a.g10s+=g10||0; a.g10o+=og10||0; }
      const g25=num(B(C.blue_goldat25)), og25=num(O(C.blue_goldat25));
      if(g25!=null||og25!=null){ a.g25any++; a.g25s+=g25||0; a.g25o+=og25||0;
        if((g25||0)>(og25||0)){ a.leadN++; if(o.result===(side?2:1))a.leadW++; } }
      const lane=String(side?r[C.red_Lane]:r[C.blue_Lane]).split("|").filter(x=>x);
      lane.slice(0,5).forEach(ch=>a.champs.add(ch));
    }
  }
  const rows=[];
  for(const[t,a]of acc){
    if(!a.n)continue;
    const min=a.gl/60;
    rows.push({
      戰隊:a.disp||tAb(a.full||t), _full:a.full, _lg:(Object.entries(a.lgCnt||{}).sort((x,y)=>y[1]-x[1])[0]||[""])[0], 場數:a.n, 勝率:a.w/a.n,
      藍方:a.bn?a.bw/a.bn:null, 紅方:a.rn?a.rw/a.rn:null,
      大場勝率:a.dwN?a.dw/a.dwN:null,
      角色池:a.champs.size, 時間:a.gl/a.n/60, 首殺:(a.fbk||0)/a.n,
      首塔:a.ft/a.n, "2+巢蟲":a.vgN?a.vg2/a.vgN:null, 首龍:a.fdN?a.fd/a.fdN:null,
      預示者:a.hdN?a.hd/a.hdN:null, 小龍:a.dg/a.n, 首巴龍:a.fbN?a.fb/a.fbN:null,
      首中塔:a.fmtN?a.fmt/a.fmtN:null,
      "KD差@10":a.k10N?(a.k10-a.d10)/a.n:null,
      "金錢差@10":a.g10any?(a.g10s-a.g10o)/a.n:null,
      中期金差:a.g25any?((a.g25s-a.g25o)-(a.g10s-a.g10o))/a.n:null,
      領先勝率:a.leadN?a.leadW/a.leadN:null, _leadW:a.leadW, _leadN:a.leadN,
      分均金錢:min?a.gold/min:0, 分均輸出:min?a.dmg/min:0, 分均擊殺:min?a.k/min:0,
      分均死亡:min?a.d/min:0, 助攻:min?a.ass/min:0, 視野分數:a.vs/a.n
    });
  }
  if(!rows.length)return rows;
  const thr=threshold(rows.map(r=>r.場數));
  const P=(k,asc)=>rankT(rows.map(r=>r[k]==null?0:r[k]),asc);
  const atk=[P("勝率"),P("首塔"),P("2+巢蟲"),P("首龍"),P("預示者"),P("首巴龍"),
             P("KD差@10"),P("金錢差@10"),P("中期金差"),P("分均輸出"),P("分均擊殺")];
  const df=[P("大場勝率"),P("角色池"),P("時間",true),P("首中塔"),P("小龍"),P("領先勝率"),
            P("分均金錢"),P("分均死亡",true),P("助攻"),P("視野分數")];
  rows.forEach((r,i)=>{
    const pen=penalty(r.場數,thr);
    r.攻擊值=Math.round(curve(atk.reduce((s,c)=>s+c[i],0)/11*100)*pen*10)/10;
    r.防禦值=Math.round(curve(df.reduce((s,c)=>s+c[i],0)/10*100)*pen*10)/10;
    r.評分=Math.round((r.攻擊值*0.7+r.防禦值*0.3)*10)/10;
  });
  return rows.filter(r=>r.場數>=F.minG).sort((a,b)=>b.評分-a.評分);
}

// ============================================================
//  全局BP（Fearless，2025 起）：同系列前局已「選過」的英雄，後續局不可再選/禁
//  回傳：每場 → 該場不可用英雄集合（禁用率/出場+禁用 的分母要扣掉這些場）
// ============================================================
function fearlessUnavail(){
  const map=new Map();
  if(+curYear<2025)return map;
  const S={};
  for(const o of GAMES){
    if(!passG(o))continue;
    const r=o.raw;
    const key=o.date+"|"+[r[C.blue_teamname],r[C.red_teamname]].sort().join("|");
    (S[key]=S[key]||[]).push(o);
  }
  for(const k in S){
    const list=S[k].sort((a,b)=>(+a.game||0)-(+b.game||0));
    const cum=new Set();
    for(const o of list){
      map.set(o,new Set(cum));
      String(o.raw[C.picklist]).split("|").filter(x=>x).forEach(p=>cum.add(p));
    }
  }
  return map;
}

// ============================================================
//  陣容：選隊 → 五路先發選手的英雄池（重現舊試算表）
// ============================================================
function teamRoster(team){
  const POS={1:"TOP",2:"JNG",3:"MID",4:"BOT",5:"SUP"};
  const byPos={1:{},2:{},3:{},4:{},5:{}};
  for(const o of LANES){
    if(!passG(o))continue;
    const r=o.raw, pid=o.pid; if(!POS[pid])continue;
    for(const side of[0,1]){
      if(r[C.blue_teamname+(side?RB:0)]!==team)continue;
      const p=r[C.blue_playername+(side?RB:0)], ch=r[C.blue_champion+(side?RB:0)];
      if(!p||!ch)continue;
      const won=o.result===(side?2:1);
      const m=byPos[pid]; let a=m[p]; if(!a){a={p,n:0,recent:"",champs:{},ban:{}}; m[p]=a;}
      a.n++; if(o.date>a.recent)a.recent=o.date;
      let c=a.champs[ch]; if(!c){c={n:0,w:0,last:""}; a.champs[ch]=c;}
      c.n++; if(won)c.w++; if(o.date>c.last)c.last=o.date;
      // 該英雄被「對手」禁的場次（自己隊 ban 的不算；舊資料檔沒有分邊欄位時退回合併名單）
      const obCol=side?C.blue_banlist:C.red_banlist;
      new Set(String(r[obCol!=null?obCol:C.banlist]).split("|").filter(x=>x)).forEach(b=>{a.ban[b]=(a.ban[b]||0)+1;});
    }
  }
  const out={};
  for(let pid=1;pid<=5;pid++){
    const players=Object.values(byPos[pid]);
    if(!players.length){out[POS[pid]]=null; continue;}
    // 整理每位選手的英雄池；依「最近出賽」排序，最新在最上（先發＝最近一場的人）
    const list=players.map(a=>{
      const pool=Object.entries(a.champs).map(([ch,c])=>({ch,n:c.n,w:c.w,last:c.last,
        ob:a.ban[ch]||0,banRate:(a.ban[ch]||0)/a.n})).sort((x,y)=>y.n-x.n||y.w/y.n-x.w/x.n);
      const w=pool.reduce((s,c)=>s+c.w,0);
      return {p:a.p, total:a.n, winrate:a.n?w/a.n:0, recent:a.recent, pool};
    }).sort((x,y)=>y.recent.localeCompare(x.recent)||y.total-x.total);
    out[POS[pid]]={players:list, def:list[0].p};
  }
  return out;
}

const HCACHE=new Map(); // calcHeroes 記憶化：同一篩選下(pos/player/team)重複呼叫直接回傳，避免混合模式遞迴與數據Tier重算
// 英雄分頁單趟掃描（性能）：LANES/GAMES 各掃一次，產出五路分桶＋BP/禁用統計；
// 「全部路線」的五路評分遞迴與單路呼叫全部共用同一份掃描結果（原本 6 趟全量掃 → 1 趟）。
const _HSCAN=new Map();
function _heroScan(player,team){
  const k=vcKey()+"|"+(player||"")+"|"+(team||"");
  const hit=_HSCAN.get(k); if(hit)return hit;
  const mk=()=>({n:0,w:0,dpm:0,dt:0,vs:0,gold:0,gl:0,k:0,d:0,as:0,tk:0,g10N:0,gd10:0,cd10:0,winL:0,midN:0,mid:0,late:0,lateN:0,lane:{}});
  const byPid={1:new Map(),2:new Map(),3:new Map(),4:new Map(),5:new Map()};
  const oppPickCnt=new Map(); const sig=(player&&!team)?new Map():null;
  for(const o of LANES){
    if(!passG(o))continue;
    const r=o.raw, accP=byPid[o.pid]; if(!accP)continue;
    for(const side of[0,1]){
      const B=i=>r[i+(side?RB:0)], O=i=>r[i+(side?0:RB)];
      if(sig&&B(C.blue_playername)===player)sig.set(gkey(o),side); // 選手所在邊（GAMES 段 BP 統計用）
      if(team&&B(C.blue_teamname)===team){ const oc=O(C.blue_champion); if(oc)oppPickCnt.set(oc,(oppPickCnt.get(oc)||0)+1); } // 對手選用（戰隊BP%分母修正）
      if(player&&B(C.blue_playername)!==player)continue;
      if(team&&B(C.blue_teamname)!==team)continue;
      const ch=B(C.blue_champion); if(!ch)continue;
      let a=accP.get(ch); if(!a){a=mk(); accP.set(ch,a);}
      a.lane[o.pid]=(a.lane[o.pid]||0)+1;
      a.n++; if(o.result===(side?2:1))a.w++;
      a.dpm+=num(B(C.blue_dpm))||0; a.dt+=num(B(C.blue_damagetakenperminute))||0;
      a.vs+=num(B(C.blue_vspm))||0;
      a.gold+=num(B(C.blue_totalgold))||0; a.gl+=num(r[C.blue_gamelength])||0;
      a.k+=num(B(C.blue_kills))||0; a.d+=num(B(C.blue_deaths))||0; a.as+=num(B(C.blue_assists))||0;
      a.tk+=num(B(C.blue_teamkills))||0;
      const g10=num(B(C.blue_goldat10)), og10=num(O(C.blue_goldat10));
      if(g10!=null){ a.g10N++; a.gd10+=g10-(og10||0);
        a.cd10+=num(B(C.blue_csdiffat10))||0;
        if(g10>og10)a.winL++;

{ const hsb=document.createElement("div"); hsb.id="hsb"; const th=document.createElement("div"); th.id="hsbT"; hsb.appendChild(th); document.body.appendChild(hsb);

function penResize(){ // 畫布＝視窗大小（不再是整頁）；筆畫存頁面座標、畫時扣掉捲動位移

function penPath(s){

const scoreCell=v=>{
  if(v==null)return "–";
  // 台灣習慣：高分紅、低分綠（色相 120→0）
  const h=Math.round(120-Math.min(100,Math.max(0,v))*1.2);
  return `<span class="scorebar" style="background:hsla(${h},70%,45%,.22);color:hsl(${h},80%,68%)">${Math.floor(v)}</span>`; // 無條件退位（不四捨五入、不進位）；真實小數仍存於資料用於排序與 Tier 分階

// 英雄分頁積分版資料：SOLOQ_BUILDS.hero（build_soloq_builds.py 全季彙總；英雄→路線→[n,w,k,d,a,cs,dur,kp和,kp樣本,gd樣本,gd和,xd樣本,xd和,fl2樣本,fl2先到]）
// 版本篩選（F.patch）時改用 SOLOQ_BUILDS.heroP（英雄→版本→路線→同 15 欄）；積分比職業賽早上新版（26.14），清單由 filterOpts 併入
function calcHeroesSoloq(pos){
  const B=window.SOLOQ_BUILDS||{};
  const pk=(typeof F!=="undefined"&&F.patch)||"";
  const usingP=!!(pk&&B.heroP);
  const H=usingP?B.heroP:B.hero; if(!H)return[];
  const minN=usingP?5:15; // 單版本樣本小 → 門檻降到 5 場
  const L2={TOP:"TOP",JNG:"JUNGLE",MID:"MIDDLE",BOT:"BOTTOM",SUP:"UTILITY"}[pos]||null;
  const PNS={TOP:"TOP",JUNGLE:"JNG",MIDDLE:"MID",BOTTOM:"BOT",UTILITY:"SUP"};
  const rows=[];
  for(const ch in H){
    const lanes=usingP?H[ch][pk]:H[ch];
    if(!lanes)continue;
    const pick=L2?(lanes[L2]?{[L2]:lanes[L2]}:null):lanes;
    if(!pick)continue;
    const s=new Array(15).fill(0);
    for(const ln in pick)pick[ln].forEach((v,i)=>s[i]+=v||0);
    const [n,w,k,d,a,cs,dur,kpS,kpN,gdN,gdS,xdN,xdS,flN,flY]=s;
    if(!n||n<minN)continue; // 樣本門檻（全季 15／單版本 5）
    const laneIcons=Object.entries(lanes).filter(([ln])=>PNS[ln]).sort((x,y)=>y[1][0]-x[1][0])
      .map(([ln])=>posImg(PNS[ln])).filter(Boolean).join("");
    rows.push({英雄:cAb(ch),_full:ch,路線:Object.keys(lanes).filter(l=>PNS[l]).length,_laneIcons:laneIcons,
      場數:n,"勝-敗":`${w}-${n-w}`,勝率:w/n,"勝率(勝-敗)":w/n,
      KDA:(k+a)/Math.max(1,d),_ak:k/n,_ad:d/n,_aa:a/n,"K/D/A":`${d1s(k/n)} / ${d1s(d/n)} / ${d1s(a/n)}`,
      參與率:kpN?kpS/kpN/100:null,
      分均CS:dur?cs/(dur/60):null,
      "金差@15":gdN?gdS/gdN:null,"經差@15":xdN?xdS/xdN:null,
      搶二率:flN?flY/flN:null});
  }
  // 評分＝同表百分位加權的客觀強度綜合（不用 dpm 遊戲評分中位數：各定位分數尺度不同會失真）：
  // Wilson勝率（自帶場數可信度修正）×4＋場數×2＋KDA×2＋金差@15×2；缺項（如輔助無金差樣本極端值）自動重分配權重
  {const fin=v=>v!=null&&isFinite(v);
   const mk=f=>{const s=rows.map(f).filter(fin).sort((x,y)=>x-y); return v=>{ if(!fin(v)||s.length<2)return null; let c=0; for(const x of s){if(x<=v)c++;} return (c-1)/(s.length-1)*100; };};
   const fW=r=>wilson(r.勝率,r.場數), fN=r=>r.場數, fK=r=>r.KDA, fG=r=>r["金差@15"];
   const Pw=mk(fW), Pn=mk(fN), Pk=mk(fK), Pg=mk(fG);
   rows.forEach(r=>{
     const parts=[[Pw(fW(r)),4],[Pn(fN(r)),2],[Pk(fK(r)),2],[Pg(fG(r)),2]];
     let s=0,wt=0; parts.forEach(([v,w2])=>{ if(v!=null){s+=v*w2; wt+=w2;} });
     r.評分=wt?s/wt:null;
   });}
  return rows;
}
// ── 英雄分頁散布圖：X＝KDA、Y＝場數，頭像為點；資料源＝rows(跟隨 🎯 積分/職業賽 與現有篩選) ──
// 越靠右上＝KDA 高且出場多(強勢主流)；頭像外框色＝勝率(越高越紅、越低越綠)
function heroScatterHTML(rows){
  const en=LANG==="en";
  const pts=rows.filter(r=>_fin(r.KDA)&&(r.場數||0)>=3).map(r=>({ // 至少 3 場，濾掉 1-2 場極端樣本扭曲座標(積分版本已 ≥15 場)
    id:champId(r._full), full:r._full, zh:chName(champId(r._full)),
    x:r.KDA, y:r.場數, n:r.場數, wr:r.勝率, kda:r.KDA, kdaStr:r["K/D/A"]||""}));
  if(!pts.length)return `<div class="meta" style="padding:24px 8px">${en?"No champions match the current filter.":"目前篩選下沒有英雄資料。"}</div>`;
  const xs=pts.map(p=>p.x), ys=pts.map(p=>p.y);
  const niceStep=(range,target)=>{const raw=(range||1)/target, mag=Math.pow(10,Math.floor(Math.log10(raw))), n=raw/mag; return (n<=1?1:n<=2?2:n<=2.5?2.5:n<=5?5:10)*mag;};
  const bounds=(lo,hi)=>{const r=(hi-lo)||1, step=niceStep(r*1.14,5); // 依資料範圍縮放(不強制從 0 起)＋nice step，讓頭像攤開
    return [Math.max(0,Math.floor((lo-r*0.06)/step)*step), Math.ceil((hi+r*0.08)/step)*step, step];};
  const robustHi=vals=>{const s=[...vals].sort((a,b)=>a-b),n=s.length,q=p=>s[Math.min(n-1,Math.max(0,Math.round((n-1)*p)))]; const iqr=(q(0.75)-q(0.25))||1; return Math.min(s[n-1],q(0.75)+3*iqr);}; // IQR fence：抑制極端離群(如 3 場 KDA 39)把座標撐爆，離群點下方夾到邊緣
  const [x0,x1,xStep]=bounds(Math.min(...xs),robustHi(xs));
  const [y0,y1,yStep]=bounds(Math.min(...ys),robustHi(ys));
  const W=600,H=600, mL=52,mR=16,mT=16,mB=50, pw=W-mL-mR, ph=H-mT-mB; // 正方形 viewBox＋正方形容器(不拉伸)：繪圖區約 532×534
  const sx=v=>mL+(v-x0)/(x1-x0)*pw, sy=v=>mT+(1-(v-y0)/(y1-y0))*ph;
  const seq=(lo,hi,step)=>{const a=[]; for(let v=lo;v<=hi+1e-9;v+=step)a.push(Math.round(v*100)/100); return a;};
  const xt=seq(x0,x1,xStep), yt=seq(y0,y1,yStep), dnum=v=>Math.round(v*10)/10;
  const grid=xt.map(v=>`<line x1="${sx(v).toFixed(1)}" y1="${mT}" x2="${sx(v).toFixed(1)}" y2="${mT+ph}" class="hscG"/>`).join("")
    +yt.map(v=>`<line x1="${mL}" y1="${sy(v).toFixed(1)}" x2="${mL+pw}" y2="${sy(v).toFixed(1)}" class="hscG"/>`).join("");
  const xlab=xt.map(v=>`<text x="${sx(v).toFixed(1)}" y="${mT+ph+24}" class="hscTick" text-anchor="middle">${dnum(v)}</text>`).join("");
  const ylab=yt.map(v=>`<text x="${mL-10}" y="${(sy(v)+5).toFixed(1)}" class="hscTick" text-anchor="end">${dnum(v)}</text>`).join("");
  const refs="";  // X＝KDA、Y＝場數：不需要原本的 KDA 斜線參考
  const axT=`<text x="${mL+pw/2}" y="${H-6}" class="hscAxT" text-anchor="middle">${en?"KDA = (K+A)/D →":"KDA（(K+A)÷D）→"}</text>`
    +`<text x="15" y="${mT+ph/2}" class="hscAxT" text-anchor="middle" transform="rotate(-90 15 ${mT+ph/2})">${en?"Games →":"場數 →"}</text>`;
  const svg=`<svg viewBox="0 0 ${W} ${H}" class="hscSvg">
    <rect x="${mL}" y="${mT}" width="${pw}" height="${ph}" class="hscPlot"/>${grid}${refs}
    <line x1="${mL}" y1="${mT+ph}" x2="${mL+pw}" y2="${mT+ph}" class="hscAxis"/><line x1="${mL}" y1="${mT}" x2="${mL}" y2="${mT+ph}" class="hscAxis"/>
    ${xlab}${ylab}${axT}</svg>`;
  const wrCol=wr=>{const p=Math.max(0,Math.min(1,wr||0)); return `hsl(${Math.round(120-p*120)},70%,55%)`;}; // 勝率：越高越紅、越低越綠
  const clamp=(v,a,b)=>Math.min(Math.max(v,a),b);
  const dots=pts.sort((a,b)=>a.n-b.n).map(p=>{ // 場數少的先畫(墊底)，熱門英雄疊在上面
    const lx=(sx(clamp(p.x,x0,x1))/W*100).toFixed(3), ty=(sy(clamp(p.y,y0,y1))/H*100).toFixed(3); // 離群點夾到可視框邊緣(tooltip 仍顯示真值)
    const tip=`${p.zh}｜${en?"Games":"場數"} ${p.n}｜KDA ${(p.kda||0).toFixed(1)}（${p.kdaStr}）｜${en?"Win":"勝率"} ${Math.round((p.wr||0)*100)}%`;
    return `<span class="hscDot" style="left:${lx}%;top:${ty}%;border-color:${wrCol(p.wr)}" data-full="${esc(p.full)}" data-tip="${esc(tip)}"><img loading="lazy" data-cid="${esc(p.id)}" data-fbmode="hide" onerror="champImgFb(this)" src="https://ddragon.leagueoflegends.com/cdn/${yearVer()}/img/champion/${esc(p.id)}.png" alt="${esc(p.zh)}"></span>`;
  }).join("");
  return `<div class="hscWrap"><div class="hscInner">${svg}<div class="hscDots">${dots}</div></div>
    <div class="hscHint meta">${en?"Upper-right = high KDA & played a lot · ring color = win rate (red high / green low) · hover for details, click to open champion":"越靠右上＝KDA 高且出場多 ｜ 外框色＝勝率（越高越紅、越低越綠）｜ 滑鼠移上看詳情、點擊進英雄詳情"}</div></div>`;
}
// ── 積分版英雄詳情頁（英雄分頁積分模式點英雄）：與職業版同構＝名片＋版本趨勢＋出場紀錄，資料全積分 ──
// 出場紀錄＝soloq_champ_games.js（延遲載入；每英雄最近100場 [t,選手key,路線,勝,K,D,A,KP,對位,金差15,經差15,評分]）
function sqHeroDetail(cid){

  const H=(B.hero&&B.hero[cid])||{};
  const PNS={TOP:"TOP",JUNGLE:"JNG",MIDDLE:"MID",BOTTOM:"BOT",UTILITY:"SUP"};
  const LZ=en?{TOP:"Top",JNG:"Jungle",MID:"Mid",BOT:"Bot",SUP:"Support"}:{TOP:"上路",JNG:"打野",MID:"中路",BOT:"下路",SUP:"輔助"};
  const lanes=Object.keys(H).filter(l=>PNS[l]).sort((a,b)=>(H[b][0]||0)-(H[a][0]||0));
  if(V.hdLane&&!lanes.some(l=>PNS[l]===V.hdLane))V.hdLane="";
  const L3=V.hdLane?Object.keys(PNS).find(k2=>PNS[k2]===V.hdLane):null;
  // 名片統計（路線篩選內加總；欄位＝積分表同款）
  let n=0,w=0,k=0,d=0,a=0,kpS=0,kpN=0,gdN=0,gdS=0,xdN=0,xdS=0,flN=0,flY=0;
  lanes.forEach(l=>{ if(L3&&l!==L3)return; const s=H[l]||[];
    n+=s[0]||0;w+=s[1]||0;k+=s[2]||0;d+=s[3]||0;a+=s[4]||0;kpS+=s[7]||0;kpN+=s[8]||0;gdN+=s[9]||0;gdS+=s[10]||0;xdN+=s[11]||0;xdS+=s[12]||0;flN+=s[13]||0;flY+=s[14]||0; });
  const sg=v=>v==null?"—":(v>0?"+":"")+Math.round(v);

  const mu=(B.mu&&B.mu[cid])||{};

    const RACC={日期:g=>g.t,使用選手:g=>g.pkey,位置:g=>g.pos,勝敗:g=>g.won?1:0,
      "K/D/A":g=>(g.k+g.a)/Math.max(1,g.de),參與率:g=>g.kp,

function champLanes(champ){ const PN5={1:"TOP",2:"JNG",3:"MID",4:"BOT",5:"SUP"}, cnt={};

// 連動篩選：某欄位的可選值＝在「其他已選條件」下仍有比賽的值（賽季↔賽事↔版本互相收斂；忽略自身、不受 H2H 影響）
function lgPass(o){ // 賽事(聯賽)篩選判定：全部/群組/EWCQ 前綴/單一
  if(!F.league||F.league==="ALL")return true;
  if(F.league==="EWCQ")return String(o.league).startsWith("EWCQ");
  const g=LG_GROUP[F.league];
  return g?g.includes(o.league):o.league===F.league;
}
function optGames(skip){
  return GAMES.filter(o=>{
    if(skip!=="split"&&F.split&&!splitMatch(o,F.split))return false;
    if(skip!=="league"&&!lgPass(o))return false;
    if(skip!=="patch"&&F.patch&&o.patch!==F.patch)return false;
    if(F.d1&&o.date.slice(5,10)<F.d1)return false;
    if(F.d2&&o.date.slice(5,10)>F.d2)return false;
    return true;
  });
}
// 目前賽季／賽事／版本篩選下的比賽日期範圍（忽略日期本身）→ 給日曆選日限制可選範圍
function filteredDateRange(){
  let lo=null,hi=null;
  for(const o of GAMES){
    if(F.split&&!splitMatch(o,F.split))continue;
    if(!lgPass(o))continue;
    if(F.patch&&o.patch!==F.patch)continue;
    if(!lo||o.date<lo)lo=o.date; if(!hi||o.date>hi)hi=o.date;
  }
  return {lo,hi};
}
// 三個連動選單的 <option> HTML（賽季／賽事／版本）——filterBar 與 syncFilterOpts 共用
function filterOpts(){
  // 三參數連動：每個選單「排除自己的篩選、套用另外兩個」→ 各自清單受其他兩者收斂，但不會被自己清空（＋目前選取一定保留）
  const splSeason=new Set(optGames("split").map(o=>seasonOf(o)));            // 整賽段(G:)用時間季判定
  const splLabel=new Set(optGames("split").map(o=>o.split));                 // 例行/季後用原始標籤
  const lgAvail=new Set(optGames("league").map(o=>o.league));
  const pkAvail=new Set(optGames("patch").map(o=>o.patch));
  // 賽季：每賽段展開 整賽段(依時間季)/例行賽/季後賽(依標籤)；只列其他篩選下仍有比賽的（＋保留目前選取）
  const bases=[...new Set(SPLITS.filter(s=>s&&s!=="升降賽").map(s=>s.replace(/ PO$/,"")))];
  const _reg=LANG==="en"?" Regular":"例行賽", _po=LANG==="en"?" Playoffs":"季後賽";
  const so=[`<option value="" ${!F.split?"selected":""}>${T("全部")}</option>`];
  bases.forEach(b=>{
    const hasReg=SPLITS.includes(b), hasPO=SPLITS.includes(b+" PO");
    const avGrp=/^S[123]$/.test(b)?splSeason.has(b):(splLabel.has(b)||splLabel.has(b+" PO"));
    if(hasReg&&hasPO&&(avGrp||F.split==="G:"+b))so.push(`<option value="G:${b}" ${F.split==="G:"+b?"selected":""}>${b}</option>`);
    if(hasReg&&(splLabel.has(b)||F.split===b))so.push(`<option value="${b}" ${F.split===b?"selected":""}>${b}${_reg}</option>`);
    if(hasPO&&(splLabel.has(b+" PO")||F.split===b+" PO"))so.push(`<option value="${b} PO" ${F.split===b+" PO"?"selected":""}>${b}${_po}</option>`);
  });
  if(SPLITS.includes("升降賽")&&(splLabel.has("升降賽")||F.split==="升降賽"))so.push(`<option value="升降賽" ${F.split==="升降賽"?"selected":""}>${LANG==="en"?(+curYear===2022?"Promotion":"End-of-season promotion"):( +curYear===2022?"升降賽":"季末升降賽")}</option>`); // 2022=VCS季中+LLA季末混合→中性字
  // 賽事：固定順序，只列在其他篩選下仍有比賽的
  const has=l=>LEAGUES.includes(l)&&lgAvail.has(l);
  const grpHas=g=>(LG_GROUP[g]||[]).some(has);
  const ewcqLgs=LEAGUES.filter(l=>String(l).startsWith("EWCQ")); // 各 EWCQ 分區(北美/太平洋/巴西/歐洲/韓國)獨立列出
  const items=[["ALL",true],["中韓",grpHas("中韓")],["LCK",has("LCK")],["LPL",has("LPL")],["LCP",has("LCP")],
    ["歐美",grpHas("歐美")],["LEC",has("LEC")],["LCS",has("LCS")],["CBLOL",has("CBLOL")],
    ["國際賽",!F.split&&grpHas("國際賽")],["FST",has("FST")],["MSI",has("MSI")],["WLDs",has("WLDs")],
    ...ewcqLgs.map(l=>[l,has(l)]),["EWC",has("EWC")],["ENC",has("ENC")],["KeSPA",has("KeSPA")]].filter(([,ok])=>ok);
  if(F.league&&F.league!=="ALL"&&!items.some(([l])=>l===F.league))items.push([F.league,true]); // 目前選取一定保留
  const lo=items.map(([l])=>`<option value="${l}" ${F.league===l?"selected":""}>${lgName(l)}</option>`);
  // 版本：只列其他篩選下仍有比賽的（＋保留目前選取）
  let pkList=PATCHES.filter(p=>pkAvail.has(p)||F.patch===p);
  // 版本清單全站統一（2026-07-18 使用者定案）：積分先行版本（職業賽還沒打到的 26.14、跳過的 26.12）當年在所有分頁都列出
  if(typeof isHistYear==="function"&&!isHistYear()&&window.SOLOQ_BUILDS&&SOLOQ_BUILDS.patches){
    const _s=new Set(pkList); SOLOQ_BUILDS.patches.forEach(p=>{ if(!_s.has(p)){_s.add(p); pkList.push(p);} });
    pkList=pkList.slice().sort();
  }
  const po=[`<option value="" ${!F.patch?"selected":""}>${T("全部")}</option>`]
    .concat(pkList.map(p=>`<option ${F.patch===p?"selected":""}>${p}</option>`));
  return {split:so.join(""), league:lo.join(""), patch:po.join("")};
}

// 三選單固定寬度＝各自「所有可能選項」中最寬者（連動增減選項時寬度不再伸縮）
function filterFixedW(){

  const bases=[...new Set(SPLITS.filter(s=>s&&s!=="升降賽").map(s=>s.replace(/ PO$/,"")))];
  const spL=["全部",...bases.flatMap(b=>[b,b+"例行賽",b+"季後賽"]),...(SPLITS.includes("升降賽")?["升降賽"]:[])];

function bindFilters(cb){
  const on=(id,k)=>{const el=document.getElementById(id); if(el){el.onchange=e=>{
      let v=e.target.value;
      if(k==="d1"||k==="d2"){ // 月日正規化：3-5 → 03-05
        const m=v.trim().match(/^(\d{1,2})[-/月.](\d{1,2})日?$/);
        if(m)v=String(m[1]).padStart(2,"0")+"-"+String(m[2]).padStart(2,"0");
        e.target.value=v;
      }
      F[k]=v; if(k==="minG")F.minG=+v||0; saveState(); vcInvalidate(); cb();
      if(k==="split"||k==="league"||k==="patch"||k==="d1"||k==="d2")syncFilterOpts();}; // 連動：刷新其他選單的可選項
    if(id==="fMin")el.oninput=deb(el.onchange,250); // 最少場數：邊打邊生效（防抖 250ms，不用等失焦也不會每個數字都整頁重繪）
  }};
  on("fSplit","split"); on("fLg","league"); on("fPatch","patch"); on("fD1","d1"); on("fD2","d2"); on("fMin","minG");
  ["fD1","fD2"].forEach(id=>{ // 📅 日曆選日：隱形 date input 承接，值取月日回填
    const btn=document.getElementById(id+"btn"), c=document.getElementById(id+"c");

      if(lo)c.min=lo; else c.removeAttribute("min");
      if(hi)c.max=hi; else c.removeAttribute("max");
      c.value=`${curYear}-${/^\d\d-\d\d$/.test(cur)?cur:(lo?lo.slice(5):"01-01")}`;
      try{c.showPicker?c.showPicker():c.click();}catch(e){c.click();}
    };
    c.onchange=()=>{
      if(!c.value)return;
      const inp=document.getElementById(id);
      inp.value=c.value.slice(5); inp.dispatchEvent(new Event("change"));
    };
  });
  const rst=document.getElementById("fReset");
  if(rst)rst.onclick=globalFilterReset; // ↺ 回復預設：共用 globalFilterReset(見檔中定義)
  const hb=document.getElementById("fHelp");

}

function tableHTML(cols,rows,nameImg,limit){ // limit：只渲染排序後前 N 列（排名門檻與名次仍以全部計算）；用於選手等長表分批顯示避免卡頓
  const arrow=k=>{const on=sortK===k, up=on&&sortDir>0; return `<span class="sortArr${on?" on":""}${on?(up?" asc":" desc"):""}">${up?"▲":"▼"}</span>`;}; // 升幕▲紅、降幕▼綠；絕對定位不位移底下資料
  const sorted=[...rows].sort((a,b)=>{const x=a[sortK],y=b[sortK];
    if(x==null)return 1; if(y==null)return -1;
    if(typeof x==="string")return x.localeCompare(y)*sortDir;

  const _stripTags=s=>String(s).replace(/<[^>]*>/g,"");

  // 每欄排名門檻：前三紅（第一粗）、後三藍（最後粗）。評分類已有色階徽章，跳過。
  const rankOf={};
  const elig=r=>r.場數==null||r.場數>=3; // 低於3場沒意義：不列入排名也不上色
  cols.forEach(([c,f],i)=>{
    if(i===0||f===fmt.score||c==="路線")return;
    const vals=rows.filter(elig).map(r=>r[c]).filter(v=>typeof v==="number");
    if(vals.length<4)return; // 太少列就不標
    const d=[...vals].sort((a,b)=>b-a);

  });

  };
  const thBrk=n=>{if(n==="勝率(勝-敗)"||n==="金差@15"||n==="經差@15"||n==="GD@15"||n==="XPD@15")return n; let s=(LANG==="en")?n.replace(/ +/g," ").trim():n; const i=s.search(/[（(@]/); if(i>0)s=`${s.slice(0,i)}<br>${s.slice(i)}`; s=s.replace(/→/g,"→<br>"); if(LANG==="en")s=s.replace(/ /g,"<br>"); return s.replace(/(<br>){2,}/g,"<br>");}; // 表頭遇括號/@/箭頭換行（積分表 @15 欄名短→整欄一行不斷）；英文再於半形空格處換行（只斷空格、不硬斷字）；合併連續<br>避免多空行
  const show=(limit&&limit<sorted.length)?sorted.slice(0,limit):sorted; // 分批：只渲染前 N 列（名次仍用完整排序索引 ri）
  return `<div class="tblwrap"><table><thead><tr><th class="rkh">#</th>${cols.map(([c,,w,lbl],ci)=>{const _st=w?`width:${w}`:(colFloor[ci]?`min-width:calc(${colFloor[ci]}ch + 6px)`:""); return `<th data-k="${c}"${_st?` style="${_st}"`:""}><span class="thL">${thBrk(lbl||mLabel(c))}${arrow(c)}</span></th>`;}).join("")}</tr></thead><tbody>${
    show.map((r,ri)=>`<tr><td class="rk${ri<3?` rk${ri+1}`:""}">${ri+1}</td>${cols.map(([c,f],i)=>{
      let v=f(r[c],r);
      if(i===0&&nameImg&&r._pair)v=`<span class="heroname">${cImg(r._pair[0])}${cImg(r._pair[1])}${v}</span>`; // 英雄配對：兩隻圖並排
      else if(i===0&&nameImg&&r._full)v=`<span class="heroname">${cImg(r._full)}${v}</span>`;
      let nmAttr="";
      if(i===0&&r._lg!==undefined){ // 選手/戰隊欄鐵則：名稱置左＋3px 放區域籤；整組以最長者置中（alignHeroCols）

}

function axisNorm(rows,axis,asc){

  if(!vals.length)return()=>FLOOR;
  const mn=Math.min(...vals),mx=Math.max(...vals);

// 篩選框鐵則：寬度以候選清單中最長名字為準（含 placeholder），不裁字
function fitComboW(inp,texts){

}
function bindCombo(id,options,cur,cb,abbr){ // options:[{v,l,a,d,n}] v=值 l=縮寫/顯示名 a=別名陣列(全名/英文/中文都可搜) d=清單輔助說明 n=場數(清單依篩選範圍多→少排序)
  const inp=document.getElementById(id),dl=document.getElementById(id+"dl");
  if(options.some(o=>o.n!=null))options=[...options].sort((a,b)=>(b.n||0)-(a.n||0)); // 鐵則：清單依範圍(場數)多→少
  const lc={}; if(abbr)options.forEach(o=>{const l=o.l||o.v; lc[l]=(lc[l]||0)+1;});
  const disp=v=>{ if(!abbr||!v)return v||""; const o=options.find(x=>x.v===v); if(!o)return v; const l=o.l||o.v; return lc[l]>1?o.v:l; }; // 縮寫唯一→顯示縮寫；縮寫重複→顯示全名
  // datalist 顯示縮寫/顯示名(l)為可選值、全名(或 d)為輔助說明 → 縮寫/全名/別名都可搜；瀏覽器會同時比對 value 與說明文字
  dl.innerHTML=options.map(o=>`<option value="${esc(o.l||o.v)}">${esc(o.l&&o.l!==o.v?o.v:(o.d||""))}</option>`).join("");
  fitComboW(inp,options.map(o=>abbr?disp(o.v):o.v));
  inp.value=disp(cur||"");
  const keys=o=>[o.v,o.l,...(o.a||[])].filter(Boolean).map(s=>String(s).toLowerCase()); // 值/顯示名/別名一起比對
  inp.onchange=()=>{
    const t=inp.value.trim().toLowerCase();
    let hit="";
    if(t){const m=options.find(o=>keys(o).some(s=>s===t))
        ||options.find(o=>keys(o).some(s=>s.startsWith(t)))
        ||options.find(o=>keys(o).some(s=>s.includes(t)));
      hit=m?m.v:"";}
    inp.value=disp(hit); cb(hit);
  };
}

// ── 全年版本改動總覽（原「版本改動」分頁；現為 圖鑑→版本→全年）──
function renderChgYear(box){
  if(typeof ensurePatchItemsCategorized==="function")ensurePatchItemsCategorized(); // 分類歸位（機制↔道具雙向）要先做，否則建築條目掛在道具區沒圖
  if(window._chgY&&_chgY.year===curYear&&_chgY.box===box){_chgY.paint();return;} // 同頁重繪（搜尋打字）走快取

    // 本賽季所有有改動的英雄，一次列出（不逐版分頁）；每行依增強(紅)/削弱(綠)/調整(黃)上色
    // 版本範圍＝本季實際打過的版本(涵蓋像 25.23 這種季後外溢版本) ∪ 當年曆年版本(涵蓋尚未開打的最新版)
    const yy=curYear%100;
    const seasonPatches=new Set();
    for(const o of GAMES){if(o.patch)seasonPatches.add(o.patch);}
    // 版本範圍＝本季實際打過的版本(含 25.23 這種季後外溢) ＋ 「當年、且落在本季比賽版本區間內」但尚未開打的版本(如 26.12)
    // 不再用年份前綴硬塞，避免 25.23/24 這種已移到下季的版本又出現在 2025
    const _sv=[...seasonPatches].map(parseFloat).filter(v=>!isNaN(v));
    const _lo=_sv.length?Math.min(..._sv):Infinity, _hi=_sv.length?Math.max(..._sv):-Infinity;
    const pks=Object.keys(PATCH_NOTES).filter(pk=>{
      if(seasonPatches.has(pk))return true;
      const v=parseFloat(pk);
      if(parseInt(pk,10)!==yy)return false;
      // 當年（非歷史年份）：官方已發布但還沒開打的最新版（如 26.14）也要列；歷史年份維持數據前緣帽（擋季後外溢）
      return _sv.length===0||v<=_hi||(typeof isHistYear==="function"&&!isHistYear());
    }).sort();
    // 官方繁中公告只回溯到 2019；更早年份（與零星漏抓版本）用 LoL Wiki 英雄改動史補（英文原文）
    const WIKI=window.WIKI_PATCHES||{}, wikiByPk={}, wikiUrl={}, wikiFull={};
    Object.keys(WIKI).forEach(wv=>{
      const m=wv.match(/^(\d{1,2})\.(\d{1,2})$/); if(!m)return;
      const maj=+m[1], yr=maj>=25?2000+maj:2010+maj; // 4→2014 … 14→2024；25+→2025+（賽季制編號）
      if(yr%100!==yy)return;
      const pk=`${yr%100}.${String(+m[2]).padStart(2,"0")}`;
      wikiUrl[pk]=`https://wiki.leagueoflegends.com/en-us/V${wv}`;
      wikiFull[pk]=WIKI[wv];
      if(!PATCH_NOTES[pk])wikiByPk[pk]=WIKI[wv];
    });
    const pksAll=[...new Set([...pks,...Object.keys(wikiByPk)])].sort();
    const byChamp={};
    const N2I=window.CH_N2I||{}; // 英雄中文名/DDragon ID → ID
    const MECH_LEFT={};          // pk → 機制區去除英雄行後剩餘行（其他欄用）
    const JUNK=/^(Stats|General|Abilities|Added|Removed|Sound|Voice|Full Relaunch|New)\.?$/i;
    // wiki 逐英雄補洞：官方該版公告存在、但漏了某英雄（如 Ryze 26.03）→ 用 wiki 該英雄行補
    const wikiSupp=pk=>{
      const wk2=wikiFull[pk]; if(!wk2)return;
      Object.entries(wk2).forEach(([id,lines])=>{
        if(byChamp[id]&&byChamp[id].some(e=>e.patch===pk))return; // 官方已有 → 不重覆
        const ls=zhOnly(pk,lines.filter(l=>!JUNK.test(String(l).trim())&&!COSM.test(l))).map(l=>addKey(id,l));
        if(ls.length)(byChamp[id]=byChamp[id]||[]).push({patch:pk,lines:ls,url:(PATCH_NOTES[pk]&&PATCH_NOTES[pk]._url)||wikiUrl[pk]||""});
      });
    };
    pksAll.forEach(pk=>{
      const wk=wikiByPk[pk];
      if(wk){ // wiki 補的版本：直接掛進各英雄（先清掉章節標頭等無意義字串）
        MECH_LEFT[pk]=[];
        Object.entries(wk).forEach(([id,lines])=>{
          const ls=zhOnly(pk,lines.filter(l=>!JUNK.test(String(l).trim())&&!COSM.test(l))).map(l=>addKey(id,l));
          if(ls.length)(byChamp[id]=byChamp[id]||[]).push({patch:pk,lines:ls,url:wikiUrl[pk]||""});
        });
        return;
      }
      const pd=(LANG==="en"&&window.LOL_PATCHES_EN&&window.LOL_PATCHES_EN[pk])||PATCH_NOTES[pk]; if(!pd)return; // 英文模式優先官方英文原文
      // 官方公告分錯區：機制區裡以英雄名開頭的行 → 併回該英雄卡
      const routed={};
      MECH_LEFT[pk]=((pd._extra&&pd._extra.機制)||[]).filter(l=>{
        const i=l.indexOf("｜");
        const nm=i>0?l.slice(0,i).replace(/^\[[^\]]*\]\s*/,"").trim():"";
        const id=nm&&N2I[nm];
        if(id){(routed[id]=routed[id]||[]).push(l.slice(i+1)); return false;}
        return true;
      });
      Object.keys(pd).forEach(key=>{
        if(key.startsWith("_"))return; // _url/_extra/_lang 等中繼欄位跳過
        const lines=(routed[key]?[...pd[key],...routed[key]]:pd[key]).filter(l=>!COSM.test(l)).map(l=>addKey(key,l)); // 官方行也過 COSM：編按/附註/未實裝等編註不列
        delete routed[key];
        if(lines.length)(byChamp[key]=byChamp[key]||[]).push({patch:pk,lines,url:pd._url});
      });
      Object.keys(routed).forEach(id=>{
        const ls=routed[id].filter(l=>!COSM.test(l));
        if(ls.length)(byChamp[id]=byChamp[id]||[]).push({patch:pk,lines:ls,url:pd._url});
      });
      wikiSupp(pk); // 官方漏掉的英雄用 wiki 補
    });
    const champs=Object.entries(byChamp).map(([key,arr])=>{
      arr.sort((a,b)=>b.patch.localeCompare(a.patch)); // 該英雄最新版在上
      return {key,arr,latest:arr[0].patch};
    }).sort((a,b)=>b.latest.localeCompare(a.latest)||a.key.localeCompare(b.key)); // 最近被改的英雄排前
    // 路線判定：看該英雄「被改動版本的前三個版本」出賽位置分布，某位置佔比≥30%就歸該欄(可多欄)
    const PNL={1:"TOP",2:"JNG",3:"MID",4:"BOT",5:"SUP"}, laneCnt={}, champPatchPos={}, keyName={};
    for(const o of LANES){
      const pos=PNL[o.pid]; if(!pos)continue;
      for(const s of[0,1]){
        const cc=o.raw[C.blue_champion+(s?RB:0)]; if(!cc)continue;
        const kk=champId(cc); keyName[kk]=cc;   // DDragon 代號→比賽資料的正式英雄名(如 DrMundo→Dr. Mundo)
        (laneCnt[kk]=laneCnt[kk]||{})[pos]=((laneCnt[kk]||{})[pos]||0)+1;   // 全季分布(退路用)
        const pm=((champPatchPos[kk]=champPatchPos[kk]||{})[o.patch]=(champPatchPos[kk]||{})[o.patch]||{});
        pm[pos]=(pm[pos]||0)+1;                                              // 逐版分布
      }
    }
    const disp=k=>keyName[k]||k;   // 顯示一律用正名；只有搜尋才用縮寫
    const playedPatches=[...new Set(GAMES.map(o=>o.patch))].filter(x=>x);
    const laneOf=key=>{const m=laneCnt[key]; return m?Object.entries(m).sort((a,b)=>b[1]-a[1])[0][0]:null;};
    // 改動版本 anchor 的前三個「有比賽」版本內，佔比≥30%的位置(可 0~多個)
    const lanesOf=(key,anchor)=>{
      const pv=parseFloat(anchor);
      const before=playedPatches.filter(p=>parseFloat(p)<pv).sort((a,b)=>parseFloat(b)-parseFloat(a)).slice(0,3);
      const m=champPatchPos[key]||{}, cnt={}; let tot=0;
      before.forEach(p=>{const pm=m[p]; if(pm)for(const kp in pm){cnt[kp]=(cnt[kp]||0)+pm[kp]; tot+=pm[kp];}});
      if(!tot)return [];
      return LANE5.filter(L=>(cnt[L]||0)/tot>=0.30);
    };
    const LANE5=["TOP","JNG","MID","BOT","SUP"];
    box.innerHTML=`<div id="chgGrid"></div>`;
    const cardHTML=c=>`<div class="card">
        <div class="chgHead"><span class="heroname chgHeroGo plink" data-key="${esc(c.key)}" title="${LANG==="en"?"View detail":"查看詳細資訊"}">${cImg(disp(c.key))}${esc(cAb(disp(c.key)))}</span><span class="cnt">${c.arr.length} ${T("次改動")}</span></div>
        <div class="chgBody">${c.arr.map(e=>{const pd=changeDir(e.lines); return `<div class="chgPatch">
          ${e.url?`<a class="pTag ${dirCls(pd)}" href="${esc(e.url)}" target="_blank" rel="noopener">${e.patch}</a>`:`<span class="pTag ${dirCls(pd)}">${e.patch}</span>`}${spotTag(c.key,e.patch)}

      </div>`;
    const paint=()=>{

      // 全文搜尋：英雄名之外，改動內文也算命中（可搜「物理傷害」「冷卻」等）

      const flt=q?work.filter(c=>c.key.toLowerCase().includes(q)||disp(c.key).toLowerCase().includes(q)||cAb(disp(c.key)).toLowerCase().includes(q)||hitTxt(c.arr)):work;

      // 依主要路線分五欄；每欄內依「改動次數多寡」往下排。本季沒出賽的英雄直接不列出。
      const byLane={TOP:[],JNG:[],MID:[],BOT:[],SUP:[]}; const shownSet=new Set();
      const isJgLine=l=>/野怪/.test(l); // 單行含「野怪」→ 屬打野

      // 同一欄內若同一英雄有多張卡(如打野區的 jgArr + 出賽卡) → 合併版本、去重

      const byVer=(x,y)=>{
