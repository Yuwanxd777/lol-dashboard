      const CAT_ICON={機制:"⚙️"}, CAT_RANK={道具:0,符文:1,符文系:1,召喚師技能:2};
      const byItem=new Map(), byCat={機制:[]};
      // 機制行的路線歸屬：明顯屬於某路的關鍵字 → 該路欄的機制卡；其餘留在其他欄
      const laneMech={TOP:[],JNG:[],MID:[],BOT:[],SUP:[]};
      const LANE_MECH=[[/中路/,"MID"],[/上路/,"TOP"],[/下路|底路/,"BOT"],[/輔助/,"SUP"],
        [/幼蟲|幼蟎|飛龍|小龍|亞龍|巴龍|大龍|遠古龍|遠古巨龍|長老龍|先鋒|預示者|野怪|打野|野區|河道蟹|斥候蟹|偵察蟹|紅[Bb][Uu][Ff][Ff]|藍[Bb][Uu][Ff][Ff]|血玫瑰|阿塔坎|亞塔坎/,"JNG"]];
      // 註：通用任務系統（任務進度/任務獎勵）留在其他欄；只有指名路線者（中路任務、打野任務…）依上表分流
      const mechLane=l=>{for(const[re,L]of LANE_MECH)if(re.test(l))return L; return null;};
      // 具名野區目標 → 各自成圖卡（顯示在打野欄）
      const OBJ_BASE="https://raw.communitydragon.org/latest/game/assets/ux/minimap/icons/";
      const MECH_OBJS=[
        [/幼蟲|幼蟎/,"虛空幼蟲","grub.png"],
        [/遠古巨龍|遠古龍|長老龍/,"遠古巨龍","dragon_elder.png"],
        [/巴龍|大龍/,"巴龍","baron.png"],
        [/預示者|先鋒/,"預示者","riftherald.png"],
        [/亞塔坎|阿塔坎/,"亞塔坎","atakhan_r.png"],
        [/飛龍|小龍|亞龍|元素龍/,"飛龍","dragon.png"],
      ];
      const byObj=new Map();
      // 用 DDragon EXTRA_INFO.t 確認名稱歸屬；無資料時退回簡單長度/關鍵字判斷
      const MECH_WORDS=["農兵","角色","系統","機制","地圖","模式","先鋒","大龍","巨人","功能","召喚峽谷"];
      const resolveType=(rawName,defaultCat)=>{
        // 任務系統的隱藏道具（DDragon 有「中路任務」「打野任務獎勵」等內部項目）→ 一律當機制，交給路線關鍵字分流
        if(/任務/.test(rawName))return "mech";
        const parts=rawName.split(/[／\/]/).map(n=>n.trim()).filter(Boolean);
        for(const p of parts){
          const k=xKey(EXTRA_INFO,p);
          if(k&&EXTRA_INFO[k].t)return EXTRA_INFO[k].t; // 道具 / 符文 / 符文系 / 召喚師技能
        }
        // 不在 DDragon：名稱含系統詞 → 機制，否則維持原 cat
        const isMech=parts.some(p=>MECH_WORDS.some(w=>p.includes(w)));
        return isMech?"mech":defaultCat;
      };
      [...pksAll].reverse().forEach(pk=>{
        if(selP&&pk!==selP)return;
        const pd=PATCH_NOTES[pk];
        // 官方公告的 _extra 優先；缺或空（2014–2022）→ 用 wiki 版本頁的 WIKI_EXTRA 補道具/符文/機制
        const oe=pd&&pd._extra;
        const ex=(oe&&Object.keys(oe).length)?oe:(window.WIKI_EXTRA&&WIKI_EXTRA[pk]); if(!ex)return;
        const purl=(pd&&pd._url)||wikiUrl[pk]||"";
        const mechLines=[], laneML={};
        // 機制也一起跑 resolveType：抓官方公告分錯區、實為道具/符文/召喚師技能的行
        ["道具","符文","召喚師技能","機制"].forEach(cat=>{
          const src=cat==="機制"?(MECH_LEFT[pk]||ex.機制||[]):(ex[cat]||[]);
          src.forEach(l=>{
            if(COSM.test(l))return; // 美術/裝飾類不列
            const i=l.indexOf("｜");
            let name=i>0?l.slice(0,i):cat; const body=i>0?l.slice(i+1):l;
            name=name.replace(/^\[[^\]]*\]\s*/,"");
            const _ct=chgNameTag(name); const _tag=(_ct.nm!==name)?_ct.tag:""; name=_ct.nm; // 去 " - Added/Rework" 後綴，記標籤
            name=name.split("／").map(p=>ITEM_ALIAS[p.trim()]||p.trim()).join("／"); // 舊譯名統一為現行名（剔除鐮刀→汰除品）
            if(!selP){ // 「全年」視圖限定：登場/移除寫在道具詳情就好，這裡不列
              if(_tag==="新增"||_tag==="移除")return;                       // 新道具登場、移除事件行
              const _RM=window.ITEM_REMOVED||{}, _DB=window.ITEM_DEBUT||{};
              const _ps=name.split("／").map(s=>s.trim());
              if(_ps.some(p=>_RM[p]&&parseInt(_RM[p],10)===(+curYear)%100))return; // 當年被移除的道具（如 26.15 刪多蘭之盔）→ 整年所有改動都不列
              if(_ps.some(p=>_DB[p]===pk))return;                           // 首發版本的登場描述不列
            }
            const effCat=i>0?resolveType(name,cat==="機制"?"mech":cat):(cat==="機制"?"mech":cat);
            const findCard=nm=>{ // 「貪婪護脛／不朽之道」與「不朽之道」視為同一卡（名稱部件交集）
              if(byItem.has(nm))return byItem.get(nm);
              const ps=nm.split("／");
              for(const e2 of byItem.values()){
                const eps=e2.name.split("／");
                if(ps.some(p=>eps.includes(p)))return e2;
              }
              return null;
            };
            if(effCat==="mech"){
              const ob=MECH_OBJS.find(([re])=>re.test(l));
              if(ob){ // 具名野區目標 → 獨立圖卡
                let e2=byObj.get(ob[1]); if(!e2){e2={name:ob[1],icon:ob[2],arr:[]}; byObj.set(ob[1],e2);}
                let pb=e2.arr.find(x=>x.patch===pk);
                if(!pb){pb={patch:pk,lines:[],url:purl}; e2.arr.push(pb);}
                const i2=l.indexOf("｜"); // 前綴與卡片標題同名就去掉，避免重複
                pb.lines.push(i2>0&&ob[0].test(l.slice(0,i2))?l.slice(i2+1):l);
                return;
              }
              const L=mechLane(l);
              if(L)(laneML[L]=laneML[L]||[]).push(l); else mechLines.push(l);
              return;
            }
            let e=findCard(name);
            if(!e){e={name,cat:effCat,arr:[]}; byItem.set(name,e);}
            else{ // 名稱聯集（單名行併進雙名卡、或反向擴名）
              const un=[...new Set([...e.name.split("／"),...name.split("／")])];
              if(un.length>e.name.split("／").length)e.name=un.join("／");
            }
            let p2=e.arr.find(x=>x.patch===pk);
            if(!p2){p2={patch:pk,lines:[],url:purl}; e.arr.push(p2);}
            if(_tag&&!p2.lines.some(x=>x.endsWith("｜"+_tag)))p2.lines.push(`${name}｜${_tag}`); // 新增道具/重做 標籤列
            p2.lines.push(`${name}｜${body}`); // 帶上道具名：合併卡（基礎／升級）內能分清各行歸屬
          });
        });
        if(mechLines.length)byCat.機制.push({patch:pk,lines:mechLines,url:purl});
        Object.entries(laneML).forEach(([L,ls])=>laneMech[L].push({patch:pk,lines:ls,url:purl}));
      });
      // 升級關係統一標示：凡屬「基礎→升級」對（升級的合成來源只有一件成品，如 2026 鞋子），
      // 卡片一律顯示「基礎／升級」雙名；兩張卡都在就合併，只有一張也改成雙名。說明框固定用基礎件。
      const UP_OF={}; // 基礎 → 升級
      if(EXTRA_INFO)for(const[nm2,inf2]of Object.entries(EXTRA_INFO)){
        if(inf2.t==="道具"&&inf2.f&&inf2.f.length===1){
          const bk2=xKey(EXTRA_INFO,inf2.f[0]);
          if(bk2&&(EXTRA_INFO[bk2].f||[]).length)UP_OF[bk2]=nm2;
        }
      }
      for(const nm of[...byItem.keys()]){
        const e=byItem.get(nm); if(!e||e.name.includes("／"))continue;
        const k=xKey(EXTRA_INFO,nm)||nm, inf=EXTRA_INFO&&EXTRA_INFO[k];
        let base=null,upg=null;
        if(inf&&inf.t==="道具"&&inf.f&&inf.f.length===1){
          const bk=xKey(EXTRA_INFO,inf.f[0]);
          if(bk&&(EXTRA_INFO[bk].f||[]).length){base=bk;upg=k;}   // 這張卡是升級件
        }
        if(!base&&UP_OF[k]){base=k;upg=UP_OF[k];}                 // 這張卡是基礎件
        if(!base)continue;
        const other=(k===base?upg:base);
        const cand=[other,other.replace(/鏈/g,"鍊"),other.replace(/鍊/g,"鏈")].find(x=>x!==nm&&byItem.has(x));
        let target=e;
        if(cand){ // 另一半也有卡 → 併入基礎卡
          const oe=byItem.get(cand);
          const bE=(k===base)?e:oe, uE=(k===base)?oe:e;
          uE.arr.forEach(p=>{
            const hit=bE.arr.find(x=>x.patch===p.patch);
            if(hit)hit.lines.push(...p.lines); else bE.arr.push(p);
          });
          bE.arr.sort((a,b)=>b.patch.localeCompare(a.patch));
          byItem.delete(k===base?cand:nm);
          target=bE;
        }
        target.name=`${base}／${upg}`;
      }
      // 搜尋也套用到道具/符文/召喚師技能/機制卡（名稱或內文命中）
      if(q){
        for(const[nm,e]of[...byItem]){
          if(!e.name.toLowerCase().includes(q)&&!hitTxt(e.arr))byItem.delete(nm);
        }
        for(const[nm,e]of[...byObj]){
          if(!e.name.toLowerCase().includes(q)&&!hitTxt(e.arr))byObj.delete(nm);
        }
        const hitL=e=>e.lines.some(l=>String(l).toLowerCase().includes(q));
        byCat.機制=byCat.機制.filter(hitL);
        LANE5.forEach(L=>laneMech[L]=laneMech[L].filter(hitL));
      }
      const patchBlocks=arr=>arr.map(e=>{const pd2=changeDir(e.lines); return `<div class="chgPatch">
          ${e.url?`<a class="pTag ${dirCls(pd2)}" href="${esc(e.url)}" target="_blank" rel="noopener">${e.patch}</a>`:`<span class="pTag ${dirCls(pd2)}">${e.patch}</span>`}
          ${renderChgLines(e.lines)}
        </div>`;}).join("");
      // 雙名卡（基礎／升級）若兩件效果名一致 → 標題只顯示基礎件
      const effSet=nm=>{const k=xKey(EXTRA_INFO,nm);const i2=k&&EXTRA_INFO[k];
        return i2?new Set((i2.sec||[]).filter(s=>s.h&&s.h!=="屬性").map(s=>s.h)):null;};
      const dispName=nm=>{
        const ps=nm.split("／");
        if(ps.length!==2)return nm;
        const a=effSet(ps[0]),b=effSet(ps[1]);
        if(a&&b&&a.size&&a.size===b.size&&[...a].every(x=>b.has(x)))return ps[0];
        return nm;
      };
      const itemZh=n=>(typeof assetZh==="function")?assetZh(n):n; // 英文/歷代名 → 官方中文名（Cinderhulk → 附魔：餘燼；舊譯如幽靈疾步靠 masteries alias → 鬼步）。注意：normTerm 是敘述用語，不可套在實體名稱上（會把天賦「穿甲」變成查不到的「物穿」）
      const itemCardHTML=e=>{
        // 各行都帶「道具名｜」前綴 → 統計實際有改動的是哪幾件
        const owners=[...new Set(e.arr.flatMap(p=>p.lines.map(l=>{const i2=l.indexOf("｜");return i2>0?l.slice(0,i2):null;}).filter(Boolean)))];
        // 只有一件有改動 → 標題就用那件（如只有升級鞋改動就寫槍銅護脛）；行內前綴剝掉避免重複
        const single=owners.length===1?owners[0]:null;
        const raw=single||e.name, zh=itemZh(raw); // 顯示/圖/詳情用中文名，行前綴仍用原字剝除
        const title=single?zh:itemZh(dispName(e.name));
        const arr=single?e.arr.map(p=>({...p,lines:p.lines.map(l=>l.startsWith(single+"｜")?l.slice(single.length+1):l)})):e.arr;
        const CAT_ICO2={"道具":"🛡️","新增道具":"🛡️","移除道具":"🛡️","符文":"🔮","符文碎片":"🔻","召喚師技能":"✨","機制":"⚙️","挑戰重擊":"⚔️","冰寒重擊":"⚔️","懲戒重擊":"⚔️"};
        const im=xImg(zh)||xImg(raw)||(CAT_ICO2[title]?`<span class="cc" style="font-size:22px;line-height:1;margin-right:4px">${CAT_ICO2[title]}</span>`:""); // 統稱卡（無實體名的彙總行）給類別 emoji
        return `<div class="card">
        <div class="chgHead"><span class="heroname" data-tip="x" data-name="${esc(zh)}">${im}${esc(title)}</span><span class="cnt">${e.arr.length} ${T("次改動")}</span></div>
        <div class="chgBody">${patchBlocks(arr)}</div></div>`;
      };
      const catCardHTML=(name,arr)=>`<div class="card">
        <div class="chgHead"><span style="font-size:19px;font-weight:bold">${CAT_ICON[name]||""} ${name}</span><span class="cnt">${arr.length} 版</span></div>
        <div class="chgBody">${patchBlocks(arr)}</div></div>`;
      const objCardHTML=e=>`<div class="card">
        <div class="chgHead"><span class="heroname"><span class="cc"><img loading="lazy" src="${OBJ_BASE+e.icon}" alt="" onerror="this.remove()"></span>${esc(e.name)}</span><span class="cnt">${e.arr.length} ${T("次改動")}</span></div>
        <div class="chgBody">${patchBlocks(e.arr)}</div></div>`;
      const objCards=[...byObj.values()]
        .sort((a,b)=>b.arr[0].patch.localeCompare(a.arr[0].patch)||b.arr.length-a.arr.length)
        .map(objCardHTML).join("");
      const extraCnt=byItem.size+["機制"].filter(c=>byCat[c].length).length;
      const extraCards=[...byItem.values()]
        .sort((a,b)=>(CAT_RANK[a.cat]??9)-(CAT_RANK[b.cat]??9)||b.arr.length-a.arr.length||b.arr[0].patch.localeCompare(a.arr[0].patch))
        .map(itemCardHTML).join("")
        +["機制"].filter(c=>byCat[c].length).map(c=>catCardHTML(c,byCat[c])).join("");
      grid.innerHTML=`<div class="chgLanes">${LANE5.map(pos=>`
        <div class="laneCol"><div class="laneHd">${posImg(pos)} <span class="meta">${byLane[pos].length}</span></div>${
          (byLane[pos].map(cardHTML).join("")+(pos==="JNG"?objCards:"")+(laneMech[pos].length?catCardHTML("機制",laneMech[pos]):""))||'<div class="meta" style="text-align:center;padding:10px">—</div>'}</div>`).join("")}
        <div class="laneCol"><div class="laneHd">🧩 其他 <span class="meta">${extraCnt}</span></div>${extraCards||'<div class="meta" style="text-align:center;padding:10px">—</div>'}</div></div>`;
      bindChgTips(grid); // 右鍵英雄/道具/符文頭貼 → 顯示目前版本資訊
      // 點英雄名/圖 → 跳到該英雄的圖鑑詳情（取代原本 hover 的 ? 問號提示）
      grid.querySelectorAll(".chgHeroGo").forEach(el=>el.onclick=()=>{
        const id=champId(disp(el.dataset.key)); if(!id)return;
        V.dexSec="英雄"; V.dexDetail={type:"champ",id,zh:chName(id)}; saveState(); render();
      });
      // 點道具/符文名/圖 → 跳到該項目詳情（取代 hover ? 游標）
      grid.querySelectorAll(".chgHead .heroname[data-name]").forEach(el=>{ el.style.cursor="pointer";
        el.addEventListener("click",()=>{ if(typeof dexGo==="function")dexGo("item",el.dataset.name);
          else{V.dexSec="道具";V.dexDetail={type:"item",name:el.dataset.name};saveState();render();} });});
    };
    paint();
    window._chgY={year:curYear,box,paint};
}

function applyT2S(root){
  if(LANG!=="cn"||!window.T2S)return;
  const M=window.T2S, cjk=/[㐀-鿿豈-﫿]/;
  const conv=s=>{let o=""; for(const ch of s)o+=(M[ch]||ch); return o;};
  root=root||document.body; if(!root)return;
  const wk=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,{acceptNode(n){return (n.parentNode&&/^(SCRIPT|STYLE|TEXTAREA)$/.test(n.parentNode.nodeName))?NodeFilter.FILTER_REJECT:NodeFilter.FILTER_ACCEPT;}});
  const arr=[]; let n; while(n=wk.nextNode())arr.push(n);
  for(const t of arr){ const v=t.nodeValue; if(v&&cjk.test(v)){const c=conv(v); if(c!==v)t.nodeValue=c;} }
  root.querySelectorAll&&root.querySelectorAll("[placeholder],[title]").forEach(e=>{ const ph=e.getAttribute("placeholder"), tl=e.getAttribute("title");
    if(ph&&cjk.test(ph))e.setAttribute("placeholder",conv(ph)); if(tl&&cjk.test(tl))e.setAttribute("title",conv(tl)); });
}

      const NAME_CAP=mctx.measureText("五五五五五").width; // 5 個中文字上限

    const _finput=f=>`<span style="position:relative;display:block;flex:1 1 0;min-width:0"><input class="bpColF" data-k="${f.k}" list="bpDL_${f.k}" size="1" value="${esc(V.bpColF[f.k]||"")}" placeholder=" " style="display:block;width:100%;min-width:0;font-size:11.5px;padding:2px 15px 2px 4px;box-sizing:border-box;text-align:center;background:#0e1420;border:1px solid #2a3345;border-radius:5px;color:var(--tx)"><span class="bpCx" data-k="${f.k}" title="${LANG==="en"?"clear":"清除"}">✕</span></span>`;
    const _fcell=c=>_noF.has(c.k)?"":(SUBF[c.k]?`<div style="display:flex;gap:3px">${SUBF[c.k].map(_finput).join("")}</div>`:_finput({k:c.k}));
    const _colFActive=()=>FILTERS.some(f=>(V.bpColF[f.k]||"").trim());
    let _bpFocusK=null; // 打字中的欄→重繪後把焦點還回去(表格整塊重建會掉焦點)
    const rerender=()=>{
      const mode=V.bpSideMode||"br";
      let ms=calcMatches("");   // 拿掉戰隊選單→全部比賽，改逐欄篩選
      const _fq=[]; FILTERS.forEach(f=>{const q=(V.bpColF[f.k]||"").trim().toLowerCase(); if(q)_fq.push([f,q.split(/\s+/).filter(Boolean),q]);}); // 空白分詞：下拉值可能是「中文 English」，中英任一詞都要命中(順序無關)
      if(_fq.length)ms=ms.filter(m=>_fq.every(([f,toks,q])=>{ if(f.k==="gl"){const b=GLB.find(x=>x[0].toLowerCase()===q); if(b)return b[1]((m.gl||0)/60);} const s=f.get(m); return toks.every(t=>s.includes(t)); })); // 時長：命中固定分桶→區間比對
      document.getElementById("cnt").textContent=`${ms.length}${LANG==="en"?" games":" 場"}`;
      // 統計條：藍紅方勝率、場均時長（gol.gg 風格）；strip 於系列分組後才組（要帶上「範圍內缺幾場」）
      const n=ms.length, bw=ms.filter(m=>m.blueWin).length;
      const _hasFP=m=>m.first==="blue"||m.first==="red"; // 先選/後選勝率：該場先選方是否獲勝
      const fpN=ms.filter(_hasFP).length, fpW=ms.filter(m=>_hasFP(m)&&((m.first==="blue")===m.blueWin)).length;
      const lw=mode==="br"?bw:ms.filter(m=>sides(m).LisBlue===m.blueWin).length; // 左方勝場(依模式)
      const LR=mode==="fp"?{li:"🥇",ln:LANG==="en"?"First-pick win%":"先選勝率",ri:"🥈",rn:LANG==="en"?"Second-pick win%":"後選勝率"}
             :mode==="team"?{li:"🟦",ln:LANG==="en"?"This-team win%":"該隊勝率",ri:"🟥",rn:LANG==="en"?"Opponent win%":"對手勝率"}
             :{li:"🔵",ln:T("藍方勝率"),ri:"🔴",rn:T("紅方勝率")};
      const HL=mode==="fp"?[T("先選"),LANG==="en"?"2nd pick":"後選"]:mode==="team"?[LANG==="en"?"This team":"該隊",LANG==="en"?"Opponent":"對手"]:[T("藍方"),T("紅方")]; // 左右方表頭標籤
      const gls=ms.map(m=>m.gl).filter(x=>x);
      const avg=gls.length?gls.reduce((s,x)=>s+x,0)/gls.length:0;
      const laneCells=(s,won)=>[0,1,2,3,4].map(i=>`<td class="${won?"bpw":""}">${cImg(s.lane[i]||"",s.po[i]&&s.po[i]!=="0"?s.po[i]:"")}</td>`).join("");
      const banCells=(s,won)=>`<td class="bans${won?" bpw":""}">${s.bans.slice(0,3).map(b=>cImg(b)).join("")}${s.bans.length>3?`<span class="banSep"></span>`:""}${s.bans.slice(3).map(b=>cImg(b)).join("")}</td>`; // 禁用前3(第一輪禁)｜後2(第二輪禁)以分隔線分開
      const rowHTML=(m,gno)=>{
        const cell=(s,isBlue,won)=>{

          return `<td class="${won?"bpw":""}">${first?`<span class="fp">${s.team}</span>`:s.team}</td>`; // 勝方整隊範圍給小白底(取代⭐)
        };
        // gno 有值＝系列賽底下的小局：日期欄改成「└ 第N局」並縮排，聯賽欄留白
        const head=gno?`<td class="subg">└ 第${gno}局</td><td></td>`:`<td>${m.date}</td><td>${lgChip(m.league)} <span class="meta">${m.split}</span></td>`;
        const S=sides(m); // 依模式決定左右實際邊
        const lWon=S.LisBlue===m.blueWin, rWon=!lWon; // 哪一顯示側獲勝→整隊範圍加白底
        return `<tr${gno?' class="subrow"':''}>${head}<td>${m.patch}</td><td class="meta">${mmss(m.gl)}</td><td class="win">${m.win}</td>

      };
      // 沒設任何逐局篩選 → 用「系列賽（大場）」呈現，底下列出各局（小場）
      const grouped=!_colFActive();  // 沒有任何欄位篩選＝系列賽分組；有篩選＝逐場平列
      let series=[];
      if(grouped){
        // 依「聯賽＋對戰組合」收集，再依(日期,局序)切系列：局序重置(回到較小值)或日期相隔>2天＝不同場系列；
        // 跨午夜的同一系列（相鄰日、局序持續遞增，如第1~4局在14日、第5局在15日）會自動合併成一場
        const dnum=v=>{const p=String(v).slice(0,10).split("-");return p.length===3?Date.UTC(+p[0],+p[1]-1,+p[2])/864e5:0;};
        const grp={};
        for(const m of ms){const k=m.league+"|"+[m.blue.team,m.red.team].sort().join("|"); (grp[k]=grp[k]||[]).push(m);}
        for(const k in grp){
          const arr=grp[k].sort((a,b)=>a._d<b._d?-1:a._d>b._d?1:a._g-b._g);
          let cur=null,pgN=0,pd=null;
          for(const m of arr){
            if(!cur||m._g<=pgN||(pd!==null&&dnum(m._d)-pd>2)){cur={date:m.date,split:m.split,league:m.league,patch:m.patch,teams:[m.blue.team,m.red.team].sort(),games:[],score:{}}; series.push(cur);}
            cur.games.push(m); cur.score[m.win]=(cur.score[m.win]||0)+1; pgN=m._g; pd=dnum(m._d);
          }
        }
        series.sort((a,b)=>a.games[0]._d<b.games[0]._d?1:a.games[0]._d>b.games[0]._d?-1:0); // 系列間近→遠（依首局日期）
        document.getElementById("cnt").textContent=LANG==="en"?`${series.length} series・${ms.length} games`:`${series.length} 系列・${ms.length} 場`;
      }
      // 這個篩選範圍內、系列賽自動偵測出的缺局總數（缺第1局／缺決勝等），寫在「共 N 場」旁
      const totalMiss=series.reduce((a,s)=>{const mm=autoMiss(s);return a+(mm?mm.miss.length:0);},0);
      const strip=n?`<div class="statline">
        <span>${LANG==="en"?`<b>${n}</b> games`:`共 <b>${n}</b> 場`}${grouped?`　<span class="meta">${LANG==="en"?`<b style="color:${totalMiss?"#e0574d":"var(--tx2)"}">${totalMiss}</b> missing in range`:`範圍內缺 <b style="color:${totalMiss?"#e0574d":"var(--tx2)"}">${totalMiss}</b> 場`}</span>`:""}</span>
        <span>${LR.li} ${LR.ln} <b>${Math.round(lw/n*100)}%</b>${LANG==="en"?` (${lw}W)`:`（${lw} 勝）`}</span>
        <span>${LR.ri} ${LR.rn} <b>${Math.round((n-lw)/n*100)}%</b>${LANG==="en"?` (${n-lw}W)`:`（${n-lw} 勝）`}</span>
        ${(fpN&&mode!=="fp")?`<span>🥇 ${LANG==="en"?"First-pick win%":"先選勝率"} <b>${Math.round(fpW/fpN*100)}%</b>${LANG==="en"?` (${fpW}W)`:`（${fpW} 勝）`}</span>
        <span>🥈 ${LANG==="en"?"Second-pick win%":"後選勝率"} <b>${Math.round((fpN-fpW)/fpN*100)}%</b>${LANG==="en"?` (${fpN-fpW}W)`:`（${fpN-fpW} 勝）`}</span>`:""}
        <span>⏱️ ${T("場均時長")} <b>${mmss(avg)}</b></span>
      </div>`:"";
      const missRowHTML=n=>`<tr class="subrow missrow"><td class="subg">${LANG==="en"?`└ Game ${n}`:`└ 第${n}局`}</td><td colspan="18" style="color:#e0574d;font-weight:bold">🚫 ${T("資料缺失（此局尚未匯入）")}</td></tr>`;
      const seriesHTML=s=>{
        const [A,B]=s.teams, sa=s.score[A]||0, sb=s.score[B]||0;
        const miss=autoMiss(s), total=miss?miss.total:s.games.length, missSet=new Set(miss?miss.miss:[]);
        let gi=0, rows="";
        for(let n=1;n<=total;n++){ // 逐局：缺的放缺失列，其餘依序填真實局
          if(missSet.has(n))rows+=missRowHTML(n);
          else { const m=s.games[gi++]; if(m)rows+=rowHTML(m,n); }
        }
        const warn=miss?` <span style="color:#e0574d;font-weight:bold">⚠ ${LANG==="en"?`missing game ${miss.miss.join(", ")}`:`缺第 ${miss.miss.join("、")} 局`}</span>`:"";
        return `<tr class="seriesHead"><td colspan="19">
          <span class="sMeta">${s.date}</span> ${lgChip(s.league)} <span class="meta">${s.split}</span>
          <span class="sVs">${A} <b class="${sa>sb?'win':''}">${sa}</b>-<b class="${sb>sa?'win':''}">${sb}</b> ${B}</span>
          <span class="meta">${s.games.length}${miss?`${LANG==="en"?"/":"／"}${miss.total}`:""} ${LANG==="en"?"games":"局"}・${s.patch}</span>${warn}</td></tr>`
          +rows;
      };
      document.getElementById("tbl").innerHTML=strip+`<div class="tblwrap"><table class="bp" style="table-layout:fixed"><colgroup>${COLF.map(c=>`<col style="width:${c.w}px">`).join("")}</colgroup><thead><tr>
        <th>日期</th><th>賽事</th><th>版本</th><th>時長</th><th>勝</th>
        <th>${HL[0]}</th><th>禁用</th><th>${posImg("TOP")}</th><th>${posImg("JNG")}</th><th>${posImg("MID")}</th><th>${posImg("BOT")}</th><th>${posImg("SUP")}</th>
        <th>${HL[1]}</th><th>禁用</th><th>${posImg("TOP")}</th><th>${posImg("JNG")}</th><th>${posImg("MID")}</th><th>${posImg("BOT")}</th><th>${posImg("SUP")}</th></tr>
        <tr class="bpFRow">${COLF.map(c=>`<th style="padding:2px 3px;top:auto">${_fcell(c)}</th>`).join("")}</tr></thead><tbody id="bpBody"></tbody></table></div>
        <div class="row" style="justify-content:center;margin-top:10px"><button id="bpMore" class="primary"></button></div>`+_dlHTML;
      // 分批渲染：先 200 場，按需載入，避免上萬節點一次撐爆版面
      const body=document.getElementById("bpBody"), moreBtn=document.getElementById("bpMore");
      const glowIdx=new Map(); let lit=null, shown=0;
      const indexImgs=root=>root.querySelectorAll(".cc img").forEach(im=>{
        if(!im.alt)return;
        let a=glowIdx.get(im.alt); if(!a){a=[];glowIdx.set(im.alt,a);}
        a.push(im);
      });
      const units=grouped?series:ms;
      const render1=grouped?seriesHTML:(m=>rowHTML(m));
      const total=units.length, unitLbl=LANG==="en"?(grouped?"series":"games"):(grouped?"系列":"場");
      const addRows=step=>{
        const chunk=units.slice(shown,shown+step);
        if(chunk.length){
          const tmp=document.createElement("tbody");
          tmp.innerHTML=chunk.map(render1).join("");
          indexImgs(tmp);
          const frag=document.createDocumentFragment();
          while(tmp.firstChild)frag.appendChild(tmp.firstChild);
          body.appendChild(frag);
          shown+=chunk.length;
        }
        const left=total-shown;
        moreBtn.style.display=left>0?"":"none";
        moreBtn.textContent=LANG==="en"?`Show more (${shown} / ${total} ${unitLbl})`:`顯示更多（已列 ${shown}／共 ${total} ${unitLbl}）`;
      };
      moreBtn.onclick=()=>addRows(grouped?150:500);
      addRows(grouped?50:200);
      const box=document.getElementById("tbl");
      const unlit=()=>{if(lit){(glowIdx.get(lit)||[]).forEach(im=>im.classList.remove("glow"));lit=null;}};
      box.onmouseover=e=>{
        const t=e.target;
        if(t.tagName!=="IMG"||!t.alt)return;
        if(lit===t.alt)return;
        unlit(); lit=t.alt;
        (glowIdx.get(lit)||[]).forEach(im=>im.classList.add("glow"));
      };
      box.onmouseout=e=>{if(e.target.tagName==="IMG")unlit();};
      // 逐欄篩選輸入：即時更新狀態＋防抖重繪；重繪重建整表→把焦點還回剛打字的那一欄
      box.querySelectorAll(".bpColF").forEach(inp=>{
        inp.oninput=()=>{ V.bpColF[inp.dataset.k]=inp.value; };                                   // 打字中：只記值、不重繪→建議清單保留、不逐字篩
        inp.onchange=()=>{ V.bpColF[inp.dataset.k]=inp.value; saveState(); rerender(); };          // 失焦/選清單項＝輸入完→套用篩選
        inp.onkeydown=e=>{ if(e.key==="Enter"){ e.preventDefault(); V.bpColF[inp.dataset.k]=inp.value; _bpFocusK=inp.dataset.k; saveState(); rerender(); } }; // Enter＝立即套用＋保留焦點
      });
      box.querySelectorAll(".bpCx").forEach(x=>{ x.onclick=()=>{ V.bpColF[x.dataset.k]=""; saveState(); rerender(); }; }); // ✕ 清除該欄
      if(_bpFocusK){ const el=box.querySelector('.bpColF[data-k="'+_bpFocusK+'"]'); if(el){ el.focus(); try{el.setSelectionRange(el.value.length,el.value.length);}catch(_e){} } _bpFocusK=null; }
    };
    { const _mBtn=document.getElementById("bpModeBtn"); if(_mBtn)_mBtn.onclick=()=>{ V.bpSideMode=({br:"fp",fp:"team",team:"br"}[V.bpSideMode||"br"]); _mBtn.textContent=_bpModeLbl(V.bpSideMode); saveState(); rerender(); }; } // 藍紅→先選→戰隊→藍紅 循環
    bindFilters(rerender);
    rerender();
  }
  else if(curView==="模擬BP"){
    // ── BP 模擬：兩隊角色池 → 拖曳到五局 BAN/PICK；PICK＝全局用過（Fearless）、BAN 不消耗 ──
    const POSN=["TOP","JNG","MID","BOT","SUP"];
    const NOBAN="__NOBAN__"; // 空BAN 標記：只能放 BAN 位、可無限使用不消耗
    const NOBAN_SVG="data:image/svg+xml,"+encodeURIComponent("<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 40 40'><rect x='1' y='1' width='38' height='38' rx='6' fill='#141a26' stroke='#000' stroke-width='2'/><circle cx='20' cy='20' r='11' fill='none' stroke='#e0574d' stroke-width='3.6'/><line x1='12' y1='12' x2='28' y2='28' stroke='#e0574d' stroke-width='3.6'/></svg>");
    const noBanIco=()=>`<span class="cc"><img class="nobanImg" src="${NOBAN_SVG}" alt="空BAN" draggable="false"></span>`;
    const teams=sortTeamsByLeague([...new Set(GAMES.flatMap(o=>[o.raw[C.blue_teamname],o.raw[C.red_teamname]]))]);
    const EMPTY=()=>({b1:["","","","",""],b2:["","","","",""],p1:["","","","",""],p2:["","","","",""],pl1:["","","","",""],pl2:["","","","",""],plm1:["","","","",""],plm2:["","","","",""]});
    if(!V.bpSim||!Array.isArray(V.bpSim.g)||!Array.isArray(V.bpSim.fp))
      V.bpSim={t1:"",t2:"",fp:[1],g:[EMPTY()],n:1};
    const S=V.bpSim;
    S.side=Array.isArray(S.side)?S.side:[0,0,0,0,0]; // 每局紅藍方：0=隊A在藍方、1=隊B在藍方
    if(S._v!==3){S.fp=(S.fp||[]).map(()=>1); S.side=S.side.map(()=>0); S._v=3;} // 一次性遷移：預設紅方先選
    S.n=Math.min(20,Math.max(0,typeof S.n==="number"?S.n:1)); // 局數：預設 1，可全刪（0 局＝純檢視角色池）～最多 20
    while(S.g.length<S.n){S.g.push(EMPTY()); S.fp.push(0); S.side.push(0);} // 補足資料格
    main.innerHTML=filterBar(`
      <span style="order:59;display:inline-flex;align-items:center;gap:10px 11px;flex-wrap:wrap"><label>${T("戰隊A")}</label>${comboHTML("bsT1",T("戰隊A"),230)}<label>${T("戰隊B")}</label>${comboHTML("bsT2",T("戰隊B"),230)}</span>
      <span style="order:62;position:relative;display:inline-flex"><button id="bsHist" class="pgbtn" title="把真實系列賽的 BP 匯入為新模擬局（兩隊近10系列，上方兩隊角色池不變）">📥 ${T("匯入近期BP")}</button><div id="bsHistPop" style="display:none;position:absolute;top:calc(100% + 6px);right:0;z-index:90;background:#141a28;border:1px solid var(--line);border-radius:10px;padding:12px 16px;gap:26px;box-shadow:0 10px 28px rgba(0,0,0,.55);white-space:nowrap"></div></span>`)
      +`<div id="bsWrap" style="display:grid;grid-template-columns:minmax(260px,1fr) repeat(5,minmax(170px,300px));gap:var(--gap);align-items:stretch"></div>`;
    const wrap=document.getElementById("bsWrap");
    const rerender=()=>{
      // 全局模式＝PICK 過從角色池移除（Fearless）；一般模式＝角色池不移除
      if(!Array.isArray(S.meta))S.meta=[]; S.uid=S.uid||0;
      if(!Array.isArray(S.tm))S.tm=[]; // 每局隊伍覆寫（匯入局用），null＝跟著上方兩隊
      if(S.g.length>S.n){S.g.length=S.n; S.fp.length=Math.min(S.fp.length,S.n); S.side.length=Math.min(S.side.length,S.n); S.meta.length=Math.min(S.meta.length,S.n); S.tm.length=Math.min(S.tm.length,S.n);} // 陣列永遠對齊局數
      while(S.g.length<S.n){S.g.push(EMPTY()); S.fp.push(1); S.side.push(0);} // 加局時補足資料格（預設紅方先選）
      while(S.meta.length<S.g.length)S.meta.push({id:++S.uid,src:null});
      while(S.tm.length<S.g.length)S.tm.push(null);
      // 局號動態重算：基礎局依目前位置 1,2,3…（第一局一定是 1）；複製局＝來源現行號-序
      const byId={}; S.meta.forEach((m,i)=>{byId[m.id]=i; m._k=0;});
      const LBL=new Array(S.n); let bn=0;
      const resolve=i=>{
        if(LBL[i])return LBL[i];
        const m=S.meta[i], pi=(m.src!=null&&byId[m.src]!=null)?byId[m.src]:null;
        if(pi!=null&&pi!==i)return LBL[i]=resolve(pi)+"-"+(++S.meta[pi]._k);
        return LBL[i]=String(++bn);
      };
      for(let i=0;i<S.n;i++)resolve(i);
      const used=new Set();
      if((V.bpMode||"global")==="global")S.g.slice(0,S.n).forEach(gm=>[...gm.p1,...gm.p2].forEach(c=>{if(c)used.add(c);}));
      // 自動模式：正在進行的那一局（第一個還有空格的局，即自動填格所在的局）BAN 掉的英雄也暫時從角色池消失，直到該局選完、進入下一局才回來
      if(V.bpAuto){ let cgi=-1;

          <div style="display:flex;gap:8px;flex:1;min-height:0">${sideCol(gi,L.k,false,fp===L.fpIdx)}${sideCol(gi,R.k,true,fp===R.fpIdx)}</div></div>`;

      // 角色池固定在右（欄寬鎖定五局版型不壓縮）；局區在左、獨立橫向捲動——局號 1→N 由左到右，最新一局在最右、緊貼角色池
      {
        const gsc0=wrap.querySelector("#bsGames"), keepSL=gsc0?gsc0.scrollLeft:0; // 重繪不歸零捲動位置
        {const _z=window._zoomF||1, _s0=Math.max(1,Math.min(_z,1.5)); const _ws=Math.min(window._bpS||_s0,_s0);

          <div class="card bpPool" style="margin:0;overflow:hidden;display:flex;flex-direction:column;flex:0 0 auto;width:${poolW}px">${poolColHTML()}</div>
          ${midHTML?`<div class="card bpMid" style="margin:0;padding:10px;overflow:hidden;display:flex;flex-direction:column;flex:0 0 auto;width:${midW}px">${midHTML}</div>`:""}`;

      }
      // 池區頭貼動態尺寸：框內動態——每一路依自己框的寬高與英雄數各自最大化
      const fitPool=()=>{
        // 先把十位選手的前綴（路線圖+ID+⇄）鎖成同寬＝最長者 → 英雄一律從其右 20px 起排
        const pres=[...wrap.querySelectorAll(".bpPool .bpPre")];
        let pw=0;
        pres.forEach(p=>{p.style.width="auto"; pw=Math.max(pw,p.getBoundingClientRect().width/bpNet());}); // rect 除以 BP 淨倍率轉回子樹版面 px（BP 整區有反向 zoom，不能除 _zoomF）
        pres.forEach(p=>{p.style.width=Math.ceil(pw)+"px";});
        const els=[...wrap.querySelectorAll(".bpPool .bpChips")];
        const sizes=[];
        els.forEach(el=>{
          const chips=[...el.querySelectorAll(".bpChip")];

          // 單列吃的是寬度：縮小 80% 的以 0.8 加權；間隙 2px 逐顆扣
          const nEff=chips.reduce((a,c)=>a+(c.classList.contains("bpSm")?0.8:1),0);

          const calc=r=>{
            const per=Math.ceil(cnt/r);

            const sh=Math.floor((h-5*(r-1))/r)-4; // 邊距，不貼死邊框
            return Math.min(110,sw,sh);
          };
          const s=Math.max(12,Math.max(calc(1),calc(2)));

        });
        const pc=wrap.querySelector(".bpPool");
        const avg=sizes.length?Math.round(sizes.reduce((a,b)=>a+b,0)/sizes.length):60; // 角色池頭像均值（兩隊池皆無資料時給預設值，右欄仍要算得出尺寸）
        if(pc&&sizes.length)pc.style.setProperty("--cs",avg+"px");
        // 右側直欄（雙方BAN過＋其他英雄）：圖示由上往下排、排滿一欄往右換欄 → 尺寸縮到剛好塞滿框、不捲動不被裁
        // 鐵則：此計算不可綁在「池有資料」的條件下——池空時英雄全落到這欄、數量最多，反而更需要算（否則吃 CSS 預設 40px 撐爆被裁）
        const mf=wrap.querySelector(".bpMergeFlow"), mc=mf&&mf.closest(".bpMid");
        if(mf&&mc){ const cnt=mf.querySelectorAll(".bpChip").length, mW=mf.clientWidth, mH=mf.clientHeight, gp=4;
          let cs2=Math.round(avg*0.6);
          mf.style.rowGap=""; // 還原，重新量
          if(cnt&&mW>0&&mH>0){ let best=8, bestPer=1;
            for(let sz=Math.min(86,avg);sz>=8;sz--){ const per=Math.max(1,Math.floor((mH+gp)/(sz+gp))), cols=Math.ceil(cnt/per); // per=一欄放幾顆(吃高度)、cols=需要幾欄(吃寬度)
              if(cols*(sz+gp)-gp<=mW){best=sz;bestPer=per;break;} }
            cs2=best;
            // 撐滿高度：把「一欄的 per 顆圖」之間的直向間距拉大到剛好填滿整欄高，讓最後一顆貼齊框底、不留大空白
            const fullPer=Math.min(bestPer,cnt);
            if(fullPer>1){ const vg=Math.max(gp,Math.min(16,(mH-fullPer*best)/(fullPer-1))); mf.style.rowGap=vg+"px"; }
          }

        }
      };
      // 整頁剛好一屏：內容高度鎖到視窗底、不產生頁面捲動
      // 收斂式一屏：呈現倍率 s 從上限 min(縮放,1.5) 開始，渲染後直接量「最後一個格子的實際底部」有沒有超出外框，
      // 超出就按比例縮小 s 重排（所有內部長度都隨 s 線性縮放→一兩次收斂）。任何情況 B4/B5/PICK4-5 都不會被裁；
      // ≤150% 視覺剛好一屏、>150% 預算按 150% 比例放寬＝自然溢出改整頁捲（使用者指定）
      const fit=()=>{ const zf=window._zoomF||1, zc=Math.min(zf,1.5);
        wrap.style.zoom="1"; wrap.style.height="auto";

        for(let i=0;i<6;i++){

        }
        if(!window._bpRR&&Math.abs((window._bpWS||s)-s)>0.05){window._bpRR=1;try{rerender();}catch(e){}window._bpRR=0;return;} // 收斂倍率與排寬倍率差太多→帶新倍率整組重排一次（guard 防遞迴）
        fitPool(); };

      fit(); window.onresize=()=>{clearTimeout(window._bpRz); window._bpRz=setTimeout(()=>{if(curView==="模擬BP")rerender();},120);}; // guard：window.onresize 會殘留到離開分頁之後，不 guard 會對舊 DOM 重繪
      wrap.querySelectorAll(".bpChip").forEach(ch=>{

        };

      // 從 BAN/PICK 格把英雄圖拖回角色池區＝清空該格（角色自動回池子）；右側「雙方BAN過／其他英雄」直欄同樣可接

        });

      const applyDrop=(sl,d)=>{ // 共用放置邏輯（HTML5 拖放）

        if(from&&from.k[0]==="p"){ if(from.gm._lockLane)from.gm._lockLane=false; const fm="plm"+from.k[1]; if(from.gm[fm])from.gm[fm][from.i]=""; }

          // 檢視 ≤2025 時改用各物件的 p26（保存 2025 及更早的舊值），讓每個年份顯示當年正確數據
          const oOld=+curYear<2026;
          const oV=(o,en)=>{const b=(oOld&&o&&o.p26)?o.p26:o; const e=en?((oOld&&en.p26)?en.p26:en):null; return {b,e};};
          const oN=o=>(LANG==="en"&&OBJ_EN[o.n]&&OBJ_EN[o.n].n)||o.n;
          const oM=o=>{const{b,e}=oV(o,OBJ_EN[o.n]); return (LANG==="en"&&e&&e.m)||b.m||"";};
          const oD=o=>{const{b,e}=oV(o,OBJ_EN[o.n]); return (LANG==="en"&&e&&e.d)||b.d||"";};
          const imgSrc=s=>s.startsWith("http")?s:IBASE+s; // 完整網址直接用，否則接小地圖圖示base
          const goneOf=o=>{const y=+curYear; if(o.from&&y<o.from)return LANG==="en"?`Not in ${curYear} yet`:`${curYear} 年尚未加入`; if(o.to&&y>o.to)return LANG==="en"?`Removed in ${curYear}`:`${curYear} 年已移除`; return "";}; // 篩選年不存在→灰化原因
          const hit=o=>!q||[oN(o),oD(o),oM(o)||""].some(t=>String(t).toLowerCase().includes(q));
          const TIER_BADGE={"外塔（一塔）":"1","內塔（二塔）":"2","高地塔（三塔）":"3","主堡雙塔":"4"}; // 同一張塔圖 → 疊層級數字
          const oico=(o,ic)=>{const bg=TIER_BADGE[o.n]; const im=o.img?`<img src="${imgSrc(o.img)}" alt="" loading="lazy">`:ic;
            return bg?`<span style="position:relative;display:inline-block;line-height:0">${im}<span class="objTierBadge">${bg}</span></span>`:im;};
          // 物件名：有歷年改動資料（wiki_objectives）→ 可點開子頁（同英雄/道具詳情動線）
          const objNmHTML=o=>`<span class="plink objGoHist" data-n="${esc(o.n)}" title="${LANG==="en"?"Click for details":"點擊看詳細資料"}">${esc(oN(o))}</span>`; // 全部可點（詳情＝介紹＋屬性＋歷年改動）
          const objItHTML=(o,ic)=>{const gone=goneOf(o);return `<div class="objIt${gone?" objGone":""}"><div class="objIco">${oico(o,ic)}</div><div style="flex:1"><div class="objNm">${objNmHTML(o)}${gone?`<span class="objGoneTag">${esc(gone)}</span>`:""}</div>${oM(o)?`<div class="objMeta">${hiNum(esc(oM(o)))}</div>`:""}<div class="objD">${hiNum(esc(oD(o)))}</div></div></div>`;};
          // 龍與龍魂同一框：龍在上、龍魂在下
          const drakeCard=([dr,so],ic)=>{const gone=goneOf(dr);return `<div class="objIt${gone?" objGone":""}"><div class="objIco">${oico(dr,ic)}</div><div style="flex:1"><div class="objNm">${objNmHTML(dr)}${gone?`<span class="objGoneTag">${esc(gone)}</span>`:""}</div>${oM(dr)?`<div class="objMeta">${hiNum(esc(oM(dr)))}</div>`:""}<div class="objD">${hiNum(esc(oD(dr)))}</div><div class="objSoulHd">✨ ${esc(oN(so))}${oM(so)?`　${hiNum(esc(oM(so)))}`:""}</div><div class="objD">${hiNum(esc(oD(so)))}</div></div></div>`;};
          const html=OBJ.map(g=>{
            if(g.pair){ const ps=g.pair.filter(([dr,so])=>hit(dr)||hit(so)); if(!ps.length)return "";
              return `<div class="card"><h2>${g.ic} ${T(g.g)} <span class="sub">${ps.length} ${LANG==="en"?"types":"屬性"}</span></h2><div class="objGrid">${ps.map(p=>drakeCard(p,g.ic)).join("")}</div></div>`; }
            const items=g.items.filter(hit); if(!items.length)return "";
            return `<div class="card"><h2>${g.ic} ${T(g.g)} <span class="sub">${items.length} ${LANG==="en"?"items":"項"}</span></h2><div class="objGrid">${items.map(o=>objItHTML(o,g.ic)).join("")}</div></div>`;
          }).join("");
          box.innerHTML=(html||`<div class="card"><span class="meta">${LANG==="en"?"No matching objectives.":"查無符合的物件。"}</span></div>`);
          // 點物件名 → 歷年改動子頁（同英雄/道具詳情動線；卡片內不再展開）
          const _objByName={}; OBJ.forEach(g2=>{ (g2.items||[]).forEach(o=>_objByName[o.n]=o); (g2.pair||[]).forEach(([dr])=>_objByName[dr.n]=dr); });
          box.querySelectorAll(".objGoHist").forEach(el=>el.onclick=ev=>{ev.stopPropagation();
            const o=_objByName[el.dataset.n]; if(!o)return;
            V.dexDetail={type:"obj",name:o.n,img:o.img?imgSrc(o.img):"",m:oM(o)||"",d:oD(o)||""};
            saveState(); render();});
          return;
        }
        if(V.dexSec==="版本"){ // ── 版本分區：全年＝原版本改動總覽；特定版本＝該版全部改動 ──
          if(!VPKS.includes(V.dexVer))V.dexVer="全年"; // 預設全年
          if(V.dexVer==="全年"){renderChgYear(box);return;}
          if(typeof ensurePatchItemsCategorized==="function")ensurePatchItemsCategorized(); // 單版本視圖也要先歸位
          const pk=V.dexVer;
          const zhName=id=>chName(id);
          const JUNK2=/^(Stats|General|Abilities|Added|Removed|Sound|Voice|Full Relaunch|New)\.?$/i;
          const byC={};
          const pdEn=(LANG==="en"&&window.LOL_PATCHES_EN)?window.LOL_PATCHES_EN[pk]:null; // 官方英文原文
          const pdZh=PATCH_NOTES[pk]; // 官方繁中
          const pd=pdEn||pdZh; // _extra / _url 來源
          const addOfficial=(src)=>{ if(src)Object.keys(src).forEach(k=>{
            if(k.startsWith("_")||byC[k])return; // _url/_extra/_lang 等中繼欄位跳過
            const ls=src[k].map(l=>addKey(k,l)).filter(l=>!COSM.test(l));
            if(ls.length)byC[k]=ls;
          }); };
          const addWiki=()=>{ for(const[wv,cs]of Object.entries(window.WIKI_PATCHES||{})){
            if(wikiVerPk(wv)!==pk)continue;
            Object.entries(cs).forEach(([id,ls])=>{
              if(byC[id])return;
              const l2=zhOnly(pk,ls.filter(l=>!COSM.test(l)&&!JUNK2.test(String(l).trim()))).map(l=>addKey(id,l));
              if(l2.length)byC[id]=l2;
            });
          } };
          // 英文模式優先序：官方英文 → wiki 英文 → 官方中文（補漏）；中文模式：官方中文 → wiki
          if(LANG==="en"){ addOfficial(pdEn); addWiki(); addOfficial(pdZh); } else { addOfficial(pdZh); addWiki(); }
          const ex=(pd&&pd._extra&&Object.keys(pd._extra).length?pd._extra:(window.WIKI_EXTRA||{})[pk])||{};
          const url=(pd&&pd._url)||wikiUrlOfPk(pk);
          // 呈現同「歷年改動」：一段一段往下列。順序＝英雄→道具→符文→召喚師技能→機制；
          // 各群內依方向排序：增強→削弱→調整；道具/符文逐項列（圖示＋名稱），不整包框起來
          const secs=[];
          const dirRank=ls=>{const d=changeDir(ls);return d>0?0:d<0?1:2;};
          const divider=t=>secs.push(`<div class="chgPatch"><b style="font-size:17.5px;color:var(--tx2)">${t}</b></div>`);
          let nCh=0;
          const champEnts=Object.entries(byC)
            .filter(([id,ls])=>!q||zhName(id).toLowerCase().includes(q)||String(id).toLowerCase().includes(q)||ls.some(l=>l.toLowerCase().includes(q)))
            .sort((a,b)=>dirRank(byC[a[0]])-dirRank(byC[b[0]])||zhName(a[0]).localeCompare(zhName(b[0]),"zh-Hant"));
          if(champEnts.length)divider("🦸 英雄");
          champEnts.forEach(([id,ls])=>{nCh++;
            secs.push(`<div class="chgPatch"><span class="heroname" data-tip="champ" data-key="${esc(id)}" style="font-weight:bold">${cImg(id)}${esc(zhName(id))}</span>${spotTag(id,pk)}${renderChgLines(ls)}</div>`);
          });
          const itemImg=n=>{
            // 歷史年份優先用當年正確圖（EXTRA_IMG 是現行 id，改版本會 404，如 2017 遺跡之盾 id 3302≠現行 3858）
            if(isHistYear()){ const au=assetImg(String(n).replace(/^\[[^\]]*\]\s*/,"").split(/[／/]/)[0].trim(),curYear);
              if(au)return `<img src="${au}" style="width:28px;height:28px;border-radius:5px;border:1px solid #33405c;vertical-align:middle;margin-right:6px" onerror="this.remove()">`; }
            const IM=(typeof EXTRA_IMG!=="undefined")?EXTRA_IMG:{};
            let k=(typeof xKey==="function")?(xKey(IM,n)||n):n;
            let u=IM[k];
            if(!u){ // 名稱帶標記（[重製] 前綴、／合併、（新增）sfx）再試
              const n2=String(n).replace(/^\[[^\]]*\]\s*/,"").split(/[／/]/)[0].trim().replace(/（(新增|重做|移除)）\s*$/,"");
              k=(typeof xKey==="function")?(xKey(IM,n2)||n2):n2;
              u=IM[k];
              if(!u){const ru=(typeof runeImgOf==="function")&&runeImgOf(n2); if(ru)u=ru;} // 符文圖正解表最後防線（樹歷代譯名等）
              if(!u)u=objIco(n2); // 物件條目（26.14 藍Buff）→ 官方野怪/小地圖圖
            }
            return u?`<img src="${u.indexOf("communitydragon")>=0?u:itemVerImg(u)}" style="width:28px;height:28px;border-radius:5px;border:1px solid #33405c;vertical-align:middle;margin-right:6px" onerror="this.remove()">`:"";
          };
          ["道具","符文","召喚師技能","機制"].forEach(cat=>{
            const ls=zhOnly(pk,(ex[cat]||[]).filter(l=>!COSM.test(l)));
            // 依「名稱｜」逐項分組；名稱去除 " - Added/Rework/Removed" 後綴，改成標籤列
            const ents={}, tags={};
            ls.forEach(l=>{
              const i2=l.indexOf("｜");
              const t=chgNameTag(i2>0?l.slice(0,i2).trim():cat); if(t.tag)tags[t.nm]=t.tag;
              (ents[t.nm]=ents[t.nm]||[]).push(i2>0?l.slice(i2+1):l);
            });
            Object.keys(tags).forEach(nm=>{ if(ents[nm]&&!ents[nm].includes(tags[nm]))ents[nm].unshift(tags[nm]); });
            const list=Object.entries(ents)
              .filter(([nm,bs])=>!q||nm.toLowerCase().includes(q)||bs.some(l=>l.toLowerCase().includes(q)))
              .sort((a,b)=>dirRank(a[1])-dirRank(b[1])||a[0].localeCompare(b[0],"zh-Hant"));
            if(!list.length)return;
            divider(`${cat==="道具"?"🛡️":cat==="符文"?"🔮":cat==="機制"?"⚙️":"✨"} ${cat}`);
            list.forEach(([nm,bs])=>{
              const zh=cat!=="機制"&&typeof assetZh==="function"?assetZh(nm):nm; // 英文/歷代名 → 官方中文名（Cinderhulk → 附魔：餘燼）
              const tip=cat!=="機制"?` data-tip="x" data-name="${esc(zh)}" data-sec="${esc(cat)}"`:"";
              secs.push(`<div class="chgPatch"><span class="heroname"${tip} style="font-weight:bold">${cat!=="機制"?itemImg(zh):""}${esc(zh)}</span>${renderChgLines(bs)}</div>`);
            });
          });
          box.innerHTML=`<div id="dexHistPage"><div class="card"><h2>📦 ${pk} ${T("版本改動")} <span class="sub">${LANG==="en"?`${nCh} champions｜<a class="pTag adj" href="${esc(url)}" target="_blank" rel="noopener">${pk} official notes</a>｜switch via the Patch dropdown above, search to filter`:`英雄 ${nCh} 隻｜<a class="pTag adj" href="${esc(url)}" target="_blank" rel="noopener">${pk} 官方公告</a>｜上方「版本」下拉切換、搜尋可過濾`}</span></h2>
            <div class="chgBody">${secs.join("")||'<span class="meta">此版本沒有符合條件的改動。</span>'}</div></div></div>`;
          bindChgTips(box);
          box.querySelectorAll(".chgBody .heroname[data-key],.chgBody .heroname[data-name]").forEach(el=>{ el.style.cursor="pointer"; // 點名字跳到該英雄/道具/符文/召技詳情(不再顯示問號游標)
            el.addEventListener("click",()=>{ if(el.dataset.key)dexGo("champ",el.dataset.key); else if(el.dataset.name)dexGo("item",el.dataset.name,el.dataset.sec); });});
          return;
        }
        if(V.dexSec==="符文"){ // ── 符文圖鑑：依符文系（精密/主宰/巫術/堅決/啟迪）一欄一欄列 ──
          // 符文樹版本＝「賽季代表版」（X.18＝世界賽版），不用年末版——年末已含次年季前賽改動
          // （如 2019 年末 9.24 已移除竊盜高手 → 用 9.18 才是 2019 賽季真實的樹；同天賦樹用賽季中版本的邏輯）。
          // 2017：Runes Reforged 於 7.22（2017 末）上線，DDragon zh 最早 8.1.1（≒上線時的樹）；2026＝現行版。
          const RUNE_VER={2017:"8.1.1",2018:"8.18.2",2019:"9.18.1",2020:"10.18.1",2021:"11.18.1",2022:"12.18.1",2023:"13.18.1",2024:"14.18.1",2025:"15.18.1"};
          const ver=RUNE_VER[+curYear]||yearVer();
          window._RTREE=window._RTREE||{};
          if(!(ver in _RTREE)){
            // localStorage 快取：重新整理後不再重抓（歷史版本永不變；現行版跟 DDV 走，DDV 變了鍵就不同）
            try{const c=JSON.parse(localStorage.getItem("rtree_"+ver)||"null"); if(c)_RTREE[ver]=c;}catch(e){}
          }
          if(!(ver in _RTREE)){
            try{_RTREE[ver]=await(await fetch(`https://ddragon.leagueoflegends.com/cdn/${ver}/data/${DDLOC}/runesReforged.json`)).json();
              try{localStorage.setItem("rtree_"+ver,JSON.stringify(_RTREE[ver]));}catch(e){}}
            catch(e){_RTREE[ver]=null;}
          }
          const trees=_RTREE[ver];
          if(!trees||!trees.length){
            if(+curYear<=2016){ box.innerHTML=oldMasteryRunesHTML(curYear); return; } // 2016 前：改列舊制天賦＋符文頁
            box.innerHTML=`<div class="card"><h2>🔮 ${T("符文圖鑑")}</h2><span class="meta">${T("符文資料載入失敗。")}</span></div>`;
            return;
          }
          const TCOL={"Precision":"#c8aa6e","Domination":"#dc4747","Sorcery":"#6c75f5","Resolve":"#a1d586","Inspiration":"#49aab9"};
          const dim=n=>q&&!n.toLowerCase().includes(q);
          // 符文碎片（Stat Shards）：不在 runesReforged.json 內，用 DDragon StatMods 圖示；三列各選一。
          // 依年份呈現當年配置：2018 賽季（碎片 8.23 才加入）→ 整卡不顯示；
          //   2019-2020＝冷卻縮減版；2021-2024＝技能加速版（10.23 CDR→急速）；2025+＝現行（14.19 大改 彈性/防禦列）。
          const SB="https://ddragon.leagueoflegends.com/cdn/img/perk-images/StatMods/";
          const _AF={n:LANG==="en"?"Adaptive Force":"適應之力",ic:"StatModsAdaptiveForceIcon.png",d:LANG==="en"?"+9 Adaptive Force (5.4 AD or 9 AP)":"+9 適應之力（5.4 物攻或 9 魔攻）"};
          const _AS={n:LANG==="en"?"Attack Speed":"攻擊速度",ic:"StatModsAttackSpeedIcon.png",d:LANG==="en"?"+10% Attack Speed":"+10% 攻擊速度"};
          const _AH={n:LANG==="en"?"Ability Haste":"技能加速",ic:"StatModsCDRScalingIcon.png",d:LANG==="en"?"+8 Ability Haste":"+8 技能加速"};
          const _CDR={n:LANG==="en"?"CDR (scaling)":"冷卻縮減（成長）",ic:"StatModsCDRScalingIcon.png",d:LANG==="en"?"+1–10% CDR (by level)":"+1～10% 冷卻縮減（依等級）"};
          const _AR={n:LANG==="en"?"Armor":"物防",ic:"StatModsArmorIcon.png",d:LANG==="en"?"+6 Armor":"+6 物防"};
          const _MR={n:LANG==="en"?"Magic Resist":"魔防",ic:"StatModsMagicResIcon.png",d:LANG==="en"?"+8 Magic Resist":"+8 魔防"};
          const _HPS={n:LANG==="en"?"Health (scaling)":"生命（成長）",ic:"StatModsHealthScalingIcon.png",d:LANG==="en"?"+15–90 Health (by level)":"+15～90 生命（依等級）"};
          const _HPS2={n:LANG==="en"?"Health (scaling)":"生命（成長）",ic:"StatModsHealthScalingIcon.png",d:LANG==="en"?"+10–180 Health (by level)":"+10～180 生命（依等級）"};
          const _HP65={n:LANG==="en"?"Health":"生命",ic:"StatModsHealthPlusIcon.png",d:LANG==="en"?"+65 Health":"+65 生命"};
          const _TEN={n:LANG==="en"?"Tenacity & Slow Resist":"韌性與緩速抵抗",ic:"StatModsTenacityIcon.png",d:LANG==="en"?"+10% Tenacity & Slow Resist":"+10% 韌性與緩速抵抗"};
          const _MS={n:LANG==="en"?"Movement Speed":"移動速度",ic:"StatModsMovementSpeedIcon.png",d:LANG==="en"?"+2% Movement Speed":"+2% 移動速度"};
          const RN=LANG==="en"?["Offense","Flex","Defense"]:["進攻","彈性","防禦"];
          const shardsFor=yy=>{
            if(yy<=2018)return null;                                    // 2018 賽季全年無碎片（8.23＝2019 賽季才加入）
            if(yy<=2020)return [{row:RN[0],items:[_AF,_AS,_CDR]},{row:RN[1],items:[_AF,_AR,_MR]},{row:RN[2],items:[_HPS,_AR,_MR]}];
            if(yy<=2024)return [{row:RN[0],items:[_AF,_AS,_AH]},{row:RN[1],items:[_AF,_AR,_MR]},{row:RN[2],items:[_HPS,_AR,_MR]}];
            return [{row:RN[0],items:[_AF,_AS,_AH]},{row:RN[1],items:[_AF,_MS,_HPS2]},{row:RN[2],items:[_HP65,_TEN,_HPS2]}];
          };
          const SHARDS=shardsFor(+curYear);
          const shardHTML=!SHARDS?"":`<div class="card" style="margin:var(--gap) 0 0"><h2 style="color:#c8aa6e">🔻 ${T("符文碎片")} <span class="sub">${LANG==="en"?`Offense / Flex / Defense — pick one per row (${curYear})`:`Stat Shards｜進攻／彈性／防禦 三列各選一個（${curYear} 年配置）`}</span></h2>
            ${SHARDS.map(row=>`
              <div style="display:grid;grid-template-columns:56px repeat(3,1fr);gap:16px;align-items:center;padding:11px 0;border-top:1px solid var(--line)">
                <span style="font-weight:bold;color:var(--gold)">${row.row}</span>
                ${row.items.map(s=>`<div style="display:flex;align-items:center;gap:10px;min-width:0;${dim(s.n)?"opacity:.22":""}">
                  <img src="${SB}${s.ic}" style="width:38px;height:38px;flex:0 0 auto" onerror="this.style.visibility='hidden'">
                  <div style="min-width:0"><div style="font-size:15.5px;white-space:nowrap">${esc(s.n)}</div><div class="meta" style="font-size:12.5px">${hiNum(esc(s.d))}</div></div>
                </div>`).join("")}
              </div>`).join("")}</div>`;
          box.innerHTML=`<div style="display:grid;grid-template-columns:repeat(5,1fr);gap:var(--gap);align-items:start">${trees.map(t=>`
              <div class="card" style="margin:0">
                <h2 style="display:flex;align-items:center;gap:8px;color:${TCOL[t.key]||"var(--tx)"}"><img src="${runeImgOf(t.id)||('https://ddragon.leagueoflegends.com/cdn/img/'+esc(t.icon))}" style="width:28px;height:28px" onerror="this.style.visibility='hidden'"> ${esc(t.name)}</h2>
                ${t.slots.map((sl,si)=>`<div style="display:flex;flex-wrap:nowrap;justify-content:center;padding:12px 0;${si?"border-top:1px solid var(--line)":""}">${sl.runes.map(r=>`
                  <div style="text-align:center;flex:1 1 0;max-width:${si===0?124:112}px;min-width:0;${dim(r.name)?"opacity:.22":""}">
                    <img data-tip="x" data-name="${esc(r.name)}" src="${runeImgOf(r.id)||runeImgOf(r.name)||('https://ddragon.leagueoflegends.com/cdn/img/'+esc(r.icon))}" style="width:${si===0?68:50}px;height:${si===0?68:50}px;cursor:pointer" data-rgo="${esc(r.name)}" onerror="this.style.visibility='hidden'">
                    <div class="runeNm plink" style="font-size:${si===0?16.5:15}px;line-height:1.3;margin-top:4px;white-space:nowrap;cursor:pointer" data-rgo="${esc(r.name)}" title="${LANG==="en"?"View detail":"查看詳細資訊"}">${esc(r.name)}</div>
                  </div>`).join("")}</div>`).join("")}
              </div>`).join("")}</div>`+shardHTML
            // 2017：7.22 才把天賦＋符文合併成 Runes Reforged → 同時列出「上半年的舊天賦」供對照

          box.innerHTML=`<div class="card"><h2>🦸 ${T("英雄圖鑑")} <span class="sub">${LANG==="en"?`sorted by ${curYear} pick count｜hover a portrait for abilities & passive`:`${curYear} 年選用次數排序｜滑上頭像看技能與被動數值`}</span></h2>
            <div class="dexGrid">${list.map(c=>`<div class="dexIt${(!c.pk&&!c.ban)?" dexGone":""}">

          box.querySelectorAll(".dexNm").forEach(el=>el.onclick=ev=>{
            ev.stopPropagation();

        }else{
          if(!EXTRA_INFO){box.innerHTML=`<div class="card"><span class="meta">${LANG==="en"?"Loading…":"資料載入中…"}</span></div>`;return;}
          const ys=await yearSet(curYear);
          const isSumm=V.dexSec==="召喚師技能";
          const isRune=!isSumm&&V.dexSec!=="道具";
          if(isRune&&curYear<2018){box.innerHTML=`<div class="card"><span class="meta">${curYear} 年為舊符文／天賦系統，DDragon 無資料；2018 年起才有現行符文。</span></div>`;return;}
          const want=isSumm?["召喚師技能"]:isRune?["符文","符文系"]:["道具"];
          // 名稱查集合時新舊譯名互通（剔除鐮刀↔汰除品）
          const names2=n=>{const a=[n]; if(ITEM_ALIAS[n])a.push(ITEM_ALIAS[n]);
            for(const[o,c]of Object.entries(ITEM_ALIAS))if(c===n)a.push(o); return a;};
          const gone=n=>{const g2=ys&&(isSumm?ys.goneS:isRune?ys.goneR:ys.goneI); return !!(g2&&names2(n).some(x=>g2.has(x)));}; // 年中被移除
          const ySet=()=>isSumm?ys.summ:isRune?ys.runes:ys.items;
          const inYear=(n,i)=>{
            if(i&&i.x&&i.f&&i.f[0]) // 轉化裝：本體當年存在就算存在

          // 道具階級：成裝→中間件→基礎件→消耗品/守衛/飾品→年中已移除(灰)；同級內價格高→低
          // xu=轉化升級本體（水滴系）：仍算成裝，但集中排在成裝末端
          const tier=i=>i._gone?4:i.c?3:(i.xu||!(i.u&&i.u.length))?0:(i.f&&i.f.length?1:2);
          // 家族聚集：元件家族／標籤家族／效果家族，各自成塊排在成裝末端（小道具打頭、水滴系壓軸）
          const DEX_FAMILY=["海神之斧","幽魂面具","最後耳語"]; // 元件家族（小道具本身＋其成品）；最後耳語=物穿家族
          const TAG_FAMILY=[["MagicPenetration"],["GoldPer","Vision"]]; // 標籤家族：魔穿系／輔助任務裝（世界地圖＋五件終極）
          const EFF_FAMILY=["重創"];                     // 效果家族（掃說明內文）
          const secTxt=i=>((i.sec||[]).map(s=>(s.h||"")+(s.t||"")).join("")+(i.d||""));
          const famId=(n,i)=>{
            if(i._gone)return 0;                          // 已移除的維持灰區
            if(i.xu||i.x||n==="女神之淚")return 99;       // 水滴系（含女神之淚小道具）壓軸
            let k=DEX_FAMILY.indexOf(n); if(k>=0)return k+1;               // 家族小道具本身
            const fk=(i.f||[]).map(f2=>DEX_FAMILY.indexOf(f2)).filter(x=>x>=0);
            if(fk.length)return fk[0]+1;                                    // 家族成品
            const tk=TAG_FAMILY.findIndex(tgs=>tgs.every(tg=>(i.tg||[]).includes(tg)));
            if(tk>=0)return DEX_FAMILY.length+1+tk;
            const ek=EFF_FAMILY.findIndex(kk=>secTxt(i).includes(kk));
            return ek>=0?DEX_FAMILY.length+TAG_FAMILY.length+1+ek:0;
          };
          const isComp=i=>(i.u&&i.u.length&&!i.xu)?0:1;   // 家族內：小道具(還能合成者)排最前
          // 搜尋涵蓋效果內文；分類用 Riot tags
          const hitQ=(n,i)=>{
            if(!q)return true;
            if(n.toLowerCase().includes(q))return true;
            if((i.sec||[]).some(s=>((s.h||"")+(s.t||"")).toLowerCase().includes(q)))return true;
            return (i.d||"").toLowerCase().includes(q);
          };
          const tag=V.dexSec==="道具"?(V.dexTag||""):"";
          const list=Object.entries(EXTRA_INFO).filter(([n,i])=>want.includes(i.t)&&EXTRA_IMG[n]&&inYear(n,i)&&!ITEM_VARIANT[n]&&!ITEM_ALIAS[n]&&!bootEnchOf(n)&&!NON_SR_LEGACY.test(n))
            .map(([n,i])=>({n,i:Object.assign({_gone:gone(n)},i)}))
            .filter(c=>hitQ(c.n,c.i)&&(!tag||(c.i.tg||[]).includes(tag)))
            .sort((a,b)=>{
              if(V.dexSec!=="道具")return (a.i._gone?1:0)-(b.i._gone?1:0)||a.n.localeCompare(b.n,"zh-Hant");
              const fa=famId(a.n,a.i), fb=famId(b.n,b.i);
              const ta=fa?0:tier(a.i), tb=fb?0:tier(b.i); // 家族成員一律視為成裝區
              return ta-tb||fa-fb
                ||(fa&&fa===fb?isComp(a.i)-isComp(b.i):0)  // 同家族內小道具最前
                ||(b.i.g||0)-(a.i.g||0)||a.n.localeCompare(b.n,"zh-Hant");

          // 升級關係（合成來源只有一件成品，如鞋子升級）→ 升級件緊排在本體後面
          const upBase={}; // 升級件 → 本體（卡片顯示升級辦法用）
          if(V.dexSec==="道具"){
            const byName=new Map(list.map(c=>[c.n,c]));
            const upsOf={}, isUpg=new Set();
            for(const c of list){
              const f=c.i.f||[];
              if(f.length===1){
                const b=byName.get(f[0]);
                if(b&&b.i.f&&b.i.f.length){(upsOf[b.n]=upsOf[b.n]||[]).push(c); isUpg.add(c.n); upBase[c.n]=b.n;}
              }
            }
            if(isUpg.size){
              const arranged=[];
              for(const c of list){
                if(isUpg.has(c.n))continue;
                arranged.push(c);
                (upsOf[c.n]||[]).forEach(u2=>arranged.push(u2));
              }
              list.length=0; list.push(...arranged);
            }
          }
          box.innerHTML=`<div class="card"><h2>${V.dexSec==="道具"?"🛡️ "+T("道具圖鑑"):isSumm?"✨ "+(LANG==="en"?"Summoner Spells":"召喚師技能"):"🔮 "+T("符文圖鑑")} <span class="sub">${LANG==="en"?`${list.length} entries for ${curYear}｜hover an icon for details`:`${curYear} 年共 ${list.length} 項｜滑上圖示看詳情`}</span></h2>
            <div class="dexGrid">${list.map(c=>{
              // 升級件：顯示升級辦法而非價格（鞋子升級需豐功偉業）
              const base=upBase[c.n];
              const isBoot=base&&EXTRA_INFO[base]&&(EXTRA_INFO[base].f||[]).includes("鞋子");
              const sub=base?(LANG==="en"?`Upgrade${c.i.x?" (stacks full)":isBoot?" (quest)":c.i.b?` (+$${c.i.b})`:""}`:`升級${c.i.x?"（疊層疊滿）":isBoot?"（豐功偉業）":c.i.b?`（+$${c.i.b}）`:""}`)
                        :c.i.g?`$${c.i.g}`:"";
              // 年中移除：顯示「該版本移除」（如 26.09 移除），版本取自 ITEM_REMOVED；查不到才退回「本年已移除」
              const _maj=String(+curYear<=2024?+curYear-2010:+curYear%100);       // 該年 major（4..14 / 25 / 26）
              const _RMB=(window.ITEM_REMOVED_BY||{})[_maj]||{};                     // 逐年移除版本表（精確版本）
              const _RM=(typeof ITEM_REMOVED!=="undefined")?ITEM_REMOVED:null;
              let rmVer=c.i._gone?(_RMB[(typeof xKey==="function"?xKey(_RMB,c.n):null)||c.n]||null):null;
              if(!rmVer&&c.i._gone&&_RM){ const v=_RM[(typeof xKey==="function"?xKey(_RM,c.n):null)||c.n]; if(v&&parseInt(v,10)===+_maj)rmVer=v; } // 全域表僅在版本屬於該年時採用
              const goneLbl=c.i._gone?(rmVer?(LANG==="en"?`Removed in ${rmVer}`:`${esc(rmVer)} 移除`):(LANG==="en"?`Removed in ${curYear}`:`${curYear} 年移除`)):"";
              // 圖片優先用「當年版本的正確圖檔」（yearSet 抓 item.json 時記的，檔名＝當年 id）；查不到才退回現行圖改寫版本
              const yImg=ys&&(isSumm?ys.imgS:isRune?ys.imgR:ys.imgI);
              const iconU=(yImg&&names2(c.n).map(x=>yImg[x]).find(Boolean))||itemVerImg(EXTRA_IMG[c.n])||"";
              const _alts=[...new Set([...(ys&&ys.imgAlt?names2(c.n).flatMap(x=>(ys.imgAlt[x]||[])):[]),itemVerImg(EXTRA_IMG[c.n])||"",(typeof assetImg==="function"&&assetImg(c.n,+curYear))||""].filter(Boolean))]; // 賽季中→年初→年末→現行 級聯備援（5.1 檔 404 換下一個）
              return `<div class="dexIt${c.i._gone?" dexGone":""}"><img loading="lazy" data-tip="x" data-name="${esc(c.n)}" src="${_alts[0]||iconU}" data-alts="${esc(JSON.stringify(_alts))}" onerror="const A=JSON.parse(this.dataset.alts||'[]'),i=(+this.dataset.i||0)+1;this.dataset.i=i;if(A[i])this.src=A[i];else this.style.visibility='hidden'"><div><span class="plink dexNmI" data-n="${esc(c.n)}" title="點擊展開歷年改動">${esc(c.n)}</span>${sub?`<div class="meta">${esc(sub)}</div>`:""}${goneLbl?`<div class="meta" style="color:#c66">${goneLbl}</div>`:""}</div></div>`;
            }).join("")}</div></div>`;
          box.querySelectorAll(".dexNmI").forEach(el=>el.onclick=ev=>{
            ev.stopPropagation();
            V.dexDetail={type:"item",name:el.dataset.n};
            saveState(); render();
          });
        }
        bindChgTips(box); bindHoverTips(box);
        // 名稱單行塞不下就動態縮字（粉圓等字體較寬時「海克斯科技火箭腰帶」這類長名不折行）
        const fitDexNames=()=>box.querySelectorAll(".dexNm,.dexNmI,.runeNm").forEach(el=>{
          el.style.whiteSpace="nowrap"; el.style.display="block"; // block：名稱維持在圖下方一列
          el.style.fontSize="";
          let fs=parseFloat(getComputedStyle(el).fontSize), guard=0;
          while(el.scrollWidth>el.clientWidth+1&&fs>10&&guard++<14){fs-=0.5;el.style.fontSize=fs+"px";}
        });
        fitDexNames();
        document.fonts.ready.then(fitDexNames); // 自訂字體晚載入時重新校一次
      };
      paintDex();
      const dq=document.getElementById("dexQ");
      if(dq)dq.oninput=(()=>{const d=deb(paintDex,150);return e=>{V.dexQ=e.target.value;d();};})();
      const dt=document.getElementById("dexTag");
      if(dt)dt.onchange=e=>{V.dexTag=e.target.value;saveState();paintDex();};
      const dct=document.getElementById("dexCTag");
      if(dct)dct.onchange=e=>{V.dexCTag=e.target.value;saveState();paintDex();};
    }else{
    // ── 戰隊縮寫：當年分賽事列出；隊伍參加過哪些聯賽/盃賽就出現在哪些卡 ──
    // part[隊名][聯賽] = {d:最後出賽日, n:場數}
    const part={};
    for(const o of GAMES){
      for(const side of[0,1]){
        const t=o.raw[side?C.red_teamname:C.blue_teamname];
        if(!t)continue;
        const p=part[t]=part[t]||{};
        const e=p[o.league]=p[o.league]||{d:"",n:0,pn:0,reg:0};
        e.n++;
        if(o.split==="升降賽")e.pn++;

    const allTeams=Object.keys(part);
    // 同縮寫視為同隊改名 → 合併（用 / 隔開）；但同縮寫跨不同聯賽＝不同隊(RoX/CIS vs ROX Tigers/LCK)→ 不合併，顯示「縮寫（聯賽碼）」
    const merged=new Map();
    allTeams.forEach(t=>{
      const ab=abbrOf(t);
      const coll=ab&&_TC_SET&&_TC_SET.has(String(ab).toUpperCase());
      const clg=coll?((_TC&&_TC.names[normT(t)])||""):"";
      const key=ab?("AB:"+ab+(coll&&clg?"|"+clg:"")):("T:"+t);
      let m=merged.get(key);
      if(!m){m={names:[],ab,disp:(coll&&clg?ab+"（"+clg+"）":ab),lgs:{}};merged.set(key,m);}
      m.names.push(t);
      for(const[lg,e]of Object.entries(part[t])){
        const g=m.lgs[lg]=m.lgs[lg]||{d:"",n:0,pn:0,reg:0};
        g.n+=e.n; g.pn+=e.pn||0; g.reg+=e.reg||0; if(e.d>g.d)g.d=e.d;
      }
    });
    const byLg={};
    [...merged.values()].forEach(m=>{

      for(const[lg,e]of Object.entries(m.lgs))
        (byLg[lg]=byLg[lg]||[]).push({names:m.names,ab:m.ab,disp:m.disp,date:e.d,n:e.n,
          promo:e.pn>=e.n,                    // 只打過升降賽=升降隊
          guest:e.pn<e.n&&e.reg===0});        // 無例行賽、只有季後賽=外隊參賽（如 PCS 2024/25 的 LJL/LCO）
    });
    const LG_ORDER=["LCK","LPL","LCP","LMS","LEC","EU LCS","LCS","NA LCS","CBLOL","LTA","LTA N","LTA S"];
    const lgs=Object.keys(byLg).sort((a,b)=>{
      const ia=LG_ORDER.indexOf(a), ib=LG_ORDER.indexOf(b);
      return (ia<0?99:ia)-(ib<0?99:ib)||a.localeCompare(b);
    });
    const noAb=[...merged.values()].filter(m=>!m.ab).length;
    box.innerHTML=`
      ${(()=>{
        const rowHTML=m=>`
            <tr data-n="${esc((m.names.join(" ")+" "+m.ab).toLowerCase())}">
              <td><input class="abbr" data-t="${esc(m.names.join("|"))}" value="${esc(m.ab)}" placeholder="${LANG==='en'?'Abbr':'填縮寫'}" maxlength="8"></td>
              <td>${m.names.join(" / ")}</td>
              <td class="meta">${m.date||"—"}</td></tr>`;
        const INTL_SET=new Set(["FST","MSI","EWC","ENC","WLDs","RR","IEM","MSC","KeSPA"]);
        // 隊伍的母聯賽＝該隊當年在「非國際賽」中出賽最多的聯賽（找不到＝其他）
        const homeOf=m=>{
          if(m.names.some(nm=>/\(national team\)/i.test(nm)))return "國家隊"; // (National Team) 一律歸國家隊
          let best=null,bn=0;
          m.names.forEach(nm=>{Object.entries(part[nm]||{}).forEach(([l,e])=>{
            if(INTL_SET.has(l)||String(l).startsWith("EWCQ"))return;
            if(e.n>bn){bn=e.n;best=l;}
          });});
          return best||"其他";};
        const cards=lgs.map(lg=>{
          const all=byLg[lg].sort((a,b)=>b.n-a.n||a.names[0].localeCompare(b.names[0]));
          const isIntl=INTL_SET.has(lg)||lg.startsWith("EWCQ");
          const main=all.filter(m=>!m.promo&&(isIntl||!m.guest));
          const guest=isIntl?[]:all.filter(m=>m.guest&&!m.promo), promo=all.filter(m=>m.promo);
          // 國際賽卡：依母聯賽分組——聯賽標籤一列、底下列隊伍，換聯賽時畫線
          let mainRows;
          if(isIntl){
            // 國際賽卡：第一欄直接顯示賽區（縮寫請到母聯賽卡修改）；依賽區分組、組間畫線
            const rowIntl=(m,h,j)=>`
            <tr data-n="${esc((m.names.join(" ")+" "+m.ab).toLowerCase())}" style="background:${(LGC[h]||"#8a93a6")}${j%2?"26":"0d"}">
              <td>${lgChip(h)}</td>
              <td>${m.names.join(" / ")}</td>
              <td class="meta">${m.date||"—"}</td></tr>`;
            const g2=new Map();
            main.forEach(m=>{const h=homeOf(m);if(!g2.has(h))g2.set(h,[]);g2.get(h).push(m);});
            const order=[...g2.keys()].sort((a,b)=>{
              const ia=LG_ORDER.indexOf(a),ib=LG_ORDER.indexOf(b);
              return (ia<0?99:ia)-(ib<0?99:ib)||a.localeCompare(b);});
            mainRows=order.map(h=>g2.get(h).map((m,j)=>rowIntl(m,h,j)).join("")).join(""); // 賽區間不畫線、不留空列，直接接續
          }else mainRows=main.map(rowHTML).join("");
          return `
        <div class="card"><h2>${lgChip(lg)} <span class="sub">${main.length}${LANG==="en"?" teams":" 隊"}${guest.length?(LANG==="en"?` + ${guest.length} guest`:`＋外隊 ${guest.length}`):""}${promo.length?(LANG==="en"?` + ${promo.length} promo`:`＋升降 ${promo.length}`):""}</span></h2>
          <table class="ov"><thead><tr><th style="width:110px">${mLabel(isIntl?"賽區":"縮寫")}</th><th>${mLabel("戰隊全名")}</th><th>${mLabel("最後出賽")}</th></tr></thead><tbody>${
            mainRows
          }${guest.length?`<tr class="promoDiv"><td colspan="3">── ${LANG==="en"?"Guest teams":"外隊參賽"} ──</td></tr>${guest.map(rowHTML).join("")}`:""}${promo.length?`<tr class="promoDiv"><td colspan="3">── ${LANG==="en"?"Promotion":"升降賽"} ──</td></tr>${promo.map(rowHTML).join("")}`:""}</tbody></table></div>`;
        });
        // 主題分欄：1=中韓(含KeSPA) 2=LCP系(太平洋/東南亞/大洋洲/日本) 3=歐美 4=國際賽與其他
        const COLMAP=[
          ["LCK","LPL","KeSPA","EWCQ韓國","EWCQ中國"],
          ["LCP","PCS","VCS","LJL","LMS","LCO","OPL","GPL","LST","EWCQ太平洋"],
          ["LEC","LCS","LTA","LTA N","LTA S","CBLOL","LLA","LLN","CLS","TCL","LCL","EU LCS","NA LCS","EWCQ歐洲","EWCQ北美","EWCQ巴西"],
        ];
        const colOf=lg=>{for(let k=0;k<3;k++)if(COLMAP[k].includes(lg))return k; return 3;};
        const colArr=[[],[],[],[]];
        lgs.forEach((lg,i)=>colArr[colOf(lg)].push(cards[i]));
        return `<div id="tmGrid">${colArr.map(c=>`<div class="tmcol">${c.join("")}</div>`).join("")}</div>`;
      })()}`;
    document.querySelectorAll(".abbr").forEach(inp=>{
      inp.oninput=()=>{
        const v=inp.value.trim();
        inp.dataset.t.split("|").forEach(name=>{ // 合併列：同時套用到所有隊名
          const k=normT(name);
          if(v)USER_TABBR[k]=v; else delete USER_TABBR[k];
        });
        localStorage.setItem("user_tabbr",JSON.stringify(USER_TABBR));
        // 同一隊出現在多張賽事卡（如 TSW 在 FST 與 MSI）→ 其他卡的輸入框即時同步
        document.querySelectorAll(".abbr").forEach(o=>{
          if(o!==inp&&o.dataset.t===inp.dataset.t)o.value=inp.value;
        });
      };
    });
    // 戰隊全名塞不下就縮字（不裁字鐵則）
    const fitTmNames=()=>document.querySelectorAll("#tmGrid td:nth-child(2)").forEach(td=>{
      if(td.colSpan>1)return;
      td.style.whiteSpace="nowrap"; td.style.fontSize="";
      let fs=parseFloat(getComputedStyle(td).fontSize),g=0;
      while(td.scrollWidth>td.clientWidth+1&&fs>11&&g++<12){fs-=0.5;td.style.fontSize=fs+"px";}
    });
    fitTmNames();
    document.fonts.ready.then(fitTmNames);
    document.getElementById("tmFind").oninput=e=>{
      const kw=e.target.value.trim().toLowerCase();
      document.querySelectorAll("#tmGrid tbody tr").forEach(el=>{
        if(el.dataset.n===undefined){el.style.display=kw?"none":"";return;} // 分隔線列：搜尋時隱藏
        el.style.display=!kw||el.dataset.n.includes(kw)?"":"none";
      });
    };
    } // 戰隊分區結束
  }
  else{ // AI 問答
    // 官方定價（USD / 百萬 tokens）
    const PRICE={"claude-sonnet-4-6":{i:3,o:15},"claude-opus-4-8":{i:5,o:25},"claude-haiku-4-5-20251001":{i:1,o:5}};
    // 匯率每日自動更新（快取當天值；抓不到用上次的，最後備援 31.5）
    const twdRate=()=>{try{return JSON.parse(localStorage.getItem("twd_rate_auto")||"{}").r||31.5}catch(e){return 31.5}};
    async function updateRate(){
      const today=new Date().toISOString().slice(0,10);
      let c={}; try{c=JSON.parse(localStorage.getItem("twd_rate_auto")||"{}")}catch(e){}
      if(c.d===today&&c.r)return c.r;
      let r=null;
      try{const j=await(await fetch("https://cdn.jsdelivr.net/npm/@fawazahmed0/currency-api@latest/v1/currencies/usd.min.json")).json(); r=j.usd&&j.usd.twd;}catch(e){}
      if(!r){try{const j=await(await fetch("https://open.er-api.com/v6/latest/USD")).json(); r=j.rates&&j.rates.TWD;}catch(e){}}
      if(r){localStorage.setItem("twd_rate_auto",JSON.stringify({d:today,r}));}
      return r||twdRate();
    }
    const loadHist=()=>{try{return JSON.parse(localStorage.getItem("ai_history")||"[]")}catch(e){return[]}};
    const saveHist=h=>localStorage.setItem("ai_history",JSON.stringify(h.slice(0,200))); // 保留最近200題
    const escH=s=>String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;");
    main.innerHTML=`<div class="filters" style="justify-content:flex-end">${TAB_HELP["AI 問答"]?`<button id="fHelp" class="sqbtn helpBtn" title="本頁說明">ℹ️ ${T("本頁說明")}</button>`:""}</div>
      <div class="card"><h2>🤖 ${T("AI 問答")} <span class="sub">${T("讀取本頁全部選手＋戰隊數據（不受上方篩選限制）作答，不會上網查資料")}</span></h2>
      <div class="row">
        <input type="password" id="apikey" placeholder="Anthropic API Key（只存本機）" style="flex:1;min-width:260px">
        <select id="modelSel">
          <option value="claude-sonnet-4-6" selected>Sonnet 4.6（推薦）</option>
          <option value="claude-opus-4-8">Opus 4.8（最強）</option>
          <option value="claude-haiku-4-5-20251001">Haiku 4.5（最省）</option>
        </select>
        <span class="meta" id="rateShow" title="每日自動更新">匯率 ${twdRate().toFixed(2)}</span>
      </div>
      <div class="row" style="margin-top:10px"><textarea id="question" placeholder="例：LPL 哪個中路對線期最強？GEN 的 BP 有什麼傾向？（Enter 送出）"></textarea></div>
      <div class="row" style="margin-top:8px"><button class="primary" id="askBtn">送出</button><span id="askStat" class="meta"></span></div>
      <div id="answer"></div></div>
      <div class="card"><h2>🧾 ${T("問答紀錄")} <span class="sub" id="histStat"></span><span style="flex:1"></span><button id="histClear">${T("清空紀錄")}</button></h2>
      <div id="histBox"></div></div>`;
    {const hb=document.getElementById("fHelp"); if(hb)hb.onclick=e=>{e.stopPropagation(); toggleHelpPop(hb);};}
    const keyInput=document.getElementById("apikey");
    keyInput.value=localStorage.getItem("anthropic_key")||"";
    keyInput.onchange=()=>localStorage.setItem("anthropic_key",keyInput.value.trim());
    updateRate().then(r=>{
      const el=document.getElementById("rateShow");
      if(el)el.textContent=`匯率 ${(+r).toFixed(2)}（自動）`;
      renderHist();
    });
    const MNAME={"claude-sonnet-4-6":"Sonnet","claude-opus-4-8":"Opus","claude-haiku-4-5-20251001":"Haiku"};
    function renderHist(){
      const h=loadHist();
      const total=h.reduce((s,x)=>s+(x.twd||0),0);
      document.getElementById("histStat").textContent=`${h.length} 題｜累計 NT$${total.toFixed(2)}`;
      document.getElementById("histBox").innerHTML=h.length?h.map(x=>
        `<details style="border-bottom:1px solid var(--line);padding:6px 2px">
          <summary style="cursor:pointer;display:flex;gap:10px;align-items:center">
            <span class="meta" style="min-width:118px">${x.t}</span>
            <span style="flex:1">${escH(x.q)}</span>
            <span class="meta">${MNAME[x.model]||x.model}</span>
            <span class="scorebar" style="background:rgba(245,185,66,.15);color:var(--gold)">NT$${x.twd.toFixed(2)}</span>
          </summary>
          <div style="white-space:pre-wrap;line-height:1.7;padding:10px 6px;color:var(--tx2)">${escH(x.a)}</div>
          <div class="note">tokens：輸入 ${x.in}／輸出 ${x.out}（US$${x.usd.toFixed(4)}）</div>
        </details>`).join(""):`<div class="note">還沒有紀錄，問第一題吧。</div>`;
    }
    document.getElementById("histClear").onclick=()=>{if(confirm("確定清空所有問答紀錄？")){saveHist([]);renderHist();}};
    const plain={pct:v=>!_fin(v)?"–":Math.round(v*100)+"%",int:v=>!_fin(v)?"–":Math.round(v),
      d1:v=>!_fin(v)?"–":d1s(v),raw:v=>v==null||v!==v?"–":v,score:v=>!_fin(v)?"–":Math.round(v)};
    const pmap=f=>(f===fmt.pct||f===fmt.leadPct)?plain.pct:(f===fmt.int||f===fmt.sign)?plain.int:(f===fmt.d1||f===fmt.sign1)?plain.d1:f===fmt.score?plain.score:plain.raw;
    const toCSV=(cols,rows)=>cols.map(([c])=>c).join(",")+"\n"+rows.map(r=>cols.map(([c,f])=>pmap(f)(r[c])).join(",")).join("\n");
    async function ask(){
      const q=document.getElementById("question").value.trim();
      const key=keyInput.value.trim();
      const stat=document.getElementById("askStat"), ans=document.getElementById("answer");
      if(!key){stat.textContent="⚠️ 請先填 API Key";return;}
      if(!q){stat.textContent="⚠️ 請輸入問題";return;}
      stat.innerHTML='<span class="spin">⏳</span> 思考中…'; ans.textContent="";
      const model=document.getElementById("modelSel").value;
      // AI 問答讀全部資料：暫時清掉 league/split/patch/minG 篩選再算，算完還原（不影響其他分頁）
      const _F={league:F.league,split:F.split,patch:F.patch,minG:F.minG};
      F.league="ALL"; F.split=""; F.patch=""; F.minG=0;
      const pl=calcPlayers(""), tm=calcTeams("");
      F.league=_F.league; F.split=_F.split; F.patch=_F.patch; F.minG=_F.minG;
      try{
        const res=await fetch("https://api.anthropic.com/v1/messages",{
          method:"POST",
          headers:{"content-type":"application/json","x-api-key":key,
            "anthropic-version":"2023-06-01","anthropic-dangerous-direct-browser-access":"true"},
          body:JSON.stringify({model,max_tokens:1500,
            system:"你是 LOL 職業賽事數據分析師。你沒有網路查詢能力：所有數字與結論只能來自使用者提供的 CSV 數據，先仔細閱讀並思考數據再回答；資料裡沒有的就明說「資料中沒有」，絕不用你的既有知識補數字。用繁體中文（台灣用語）。評分滿分100（攻擊70%+防守30%加權百分位）。輸出風格：像資深分析師跟朋友講話——先一句結論，再用自然短段落帶依據，不要寫成報告。需要比較多筆數據時可以用一個 Markdown 表格（僅此而已）。嚴禁：#標題、---分隔線、emoji 編號（1️⃣）、粗體濫用（整段最多粗體一兩處）、巢狀條列、「指標：值」式的機械條列。你無法畫圖，別嘗試 ASCII 圖。",
            messages:[{role:"user",content:`資料範圍：${curYear} 全年、全聯賽、全賽段、全版本（資料時間 ${D.fetched_at}）\n\n【選手數據】\n${toCSV(PCOLS,pl)}\n\n【戰隊數據】\n${toCSV(TCOLS,tm)}\n\n問題：${q}`}]})
        });
        const j=await res.json();
        if(j.error)throw new Error(j.error.message);
        const text=j.content.map(b=>b.text||"").join("");
        // 輕量渲染：表格→真表格、**→粗體；裝飾性殘符（#、---、emoji編號）清掉
        const mdHTML=s=>{
          s=esc(s).replace(/^#{1,6}\s*/gm,"").replace(/^-{3,}\s*$/gm,"").replace(/[0-9]️⃣\s*/g,"");
          const lines=s.split("\n"), out=[];
          for(let i=0;i<lines.length;i++){
            if(/^\s*\|.*\|\s*$/.test(lines[i])){ // 表格區塊
              const rows=[];
              while(i<lines.length&&/^\s*\|.*\|\s*$/.test(lines[i])){
                const cells=lines[i].trim().replace(/^\||\|$/g,"").split("|").map(c=>c.trim());
                if(!cells.every(c=>/^:?-{2,}:?$/.test(c)))rows.push(cells);
                i++;
              }
              i--;
              if(rows.length){
                out.push(`<table class="ov" style="margin:8px 0"><thead><tr>${rows[0].map(c=>`<th>${c}</th>`).join("")}</tr></thead><tbody>${rows.slice(1).map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join("")}</tr>`).join("")}</tbody></table>`);
              }
              continue;
            }
            out.push(lines[i].replace(/^[-*•]\s+/,"• "));
          }
          return out.join("\n")
            .replace(/\*\*([^*]+)\*\*/g,"<b>$1</b>").replace(/`([^`]+)`/g,"$1")
            .replace(/\n{3,}/g,"\n\n").trim().replace(/\n/g,"<br>")
            .replace(/(<\/table>)<br>/g,"$1").replace(/<br>(<table)/g,"$1");
        };
        ans.innerHTML=mdHTML(text);
        // 計價（官方牌價 + 快取 tokens 若有）
        const p=PRICE[model]||{i:3,o:15};
        const u=j.usage||{};
        const usd=(u.input_tokens||0)*p.i/1e6+(u.output_tokens||0)*p.o/1e6
          +(u.cache_creation_input_tokens||0)*p.i*1.25/1e6+(u.cache_read_input_tokens||0)*p.i*0.1/1e6;
        const twd=usd*twdRate();
        stat.textContent=`✅ 完成｜${u.input_tokens}/${u.output_tokens} tokens｜NT$${twd.toFixed(2)}（US$${usd.toFixed(4)}）`;
        const h=loadHist();
        h.unshift({t:new Date().toLocaleString("zh-TW",{hour12:false}).slice(0,16),q,a:text,model,
          in:u.input_tokens||0,out:u.output_tokens||0,usd,twd});
        saveHist(h); renderHist();
      }catch(e){stat.textContent="❌ "+e.message;}
    }
    document.getElementById("askBtn").onclick=ask;
    document.getElementById("question").onkeydown=e=>{if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();ask();}};
    renderHist();
  }
  penResize(); // 內容高度變了，畫筆畫布跟著撐大
}
// ---------- 啟動 ----------
document.getElementById("yearSel").onchange=async e=>{
  curYear=+e.target.value; saveState(); syncRankedTab(); // 積分只在當年可見
  const ov=document.getElementById("yload");
  ov.textContent=`⏳ 載入 ${curYear} 資料中…`; ov.style.display="flex";
  try{ await loadYear(curYear);
    // 換年份：先把所有分頁的篩選列參數清成預設，「再」 initData（舊年份的無效篩選如不存在的賽季/賽區，會讓 initData 出錯而中斷）
    Object.assign(F,{split:"",league:"ALL",patch:"",d1:"",d2:"",minG:0});
    Object.assign(V,{pos:"",player:"",heroTeam:"",heroSel:"",tpSel:"",teamSel:"",vsTeam:"",bpTeam:"",bpHero:"",bpHeroMode:"both",bpPlayer:"",bpWin:"",bpFirst:"",search:"",r1:"",r2:"",r3:"",t1:"",t2:"",t3:"",
      dexQ:"",dexTag:"",dexCTag:"",dexVer:"全年",jgSort:"",jgCamp:"",tierTeam:"",tierQ:"",rosterTeam:"",tpSel:"",teamSel:""});
    V.bpSim=null; // 換年份：模擬BP 的模擬局(BAN/PICK)也全部清空、回到單一空局
    curView="總覽"; V.heroDetail=""; V.rankDetail=""; V.dexDetail=null; V.dexSec="版本"; // 換年份一律回到總覽（清子頁詳情）
    document.querySelectorAll("nav .tab").forEach(t=>t.classList.toggle("on",t.dataset.view==="總覽"));
    initData();
    try{vcInvalidate&&vcInvalidate();}catch(e){}
    saveState(); render(); }
  catch(err){ main.innerHTML=`<div class="err">${err.message}</div>`; }
  finally{ ov.style.display="none"; }
};
// 全域返回鍵：包裝 render，繪製後「同步」補上返回鍵到篩選列(不用 microtask，避免延後注入造成篩選列跳動)
{const _origRender=render; render=function(){const _r=_origRender.apply(this,arguments); try{ensureBackBtn();}catch(e){} try{if(window.fixZoomHeight)window.fixZoomHeight();}catch(e){} try{applyT2S();}catch(e){} return _r;};}
// 簡體中文：MutationObserver 攔截「動態新增」的節點(tooltip/說明浮層/非同步填入)也轉簡體，補 render 後 applyT2S 之外的漏網
if(LANG==="cn"){ try{
  const cjk=/[㐀-鿿豈-﫿]/, t2sNode=nd=>{ if(nd.nodeType===1)applyT2S(nd);
    else if(nd.nodeType===3&&window.T2S&&nd.nodeValue&&cjk.test(nd.nodeValue)){const M=window.T2S;let o="";for(const ch of nd.nodeValue)o+=M[ch]||ch;if(o!==nd.nodeValue)nd.nodeValue=o;} };
  new MutationObserver(ms=>{for(const m of ms)for(const nd of m.addedNodes)t2sNode(nd);}).observe(document.body,{childList:true,subtree:true});
}catch(e){} }
(async()=>{
  try{
    if(!M.years.length) throw new Error("尚未產生資料");
    if(!M.years.includes(+curYear)) curYear=M.default;
    await loadYear(curYear); initData(); render();
  }catch(e){
    main.innerHTML=`<div class="err"><b>${e.message}</b><br>請先雙擊 update.bat 抓資料（第一次會下載全部年份的 Oracle's Elixir 資料，需要幾分鐘），完成後重新整理本頁。</div>`;
  }
})();
</script>
